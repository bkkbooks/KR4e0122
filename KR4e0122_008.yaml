body:
  text: 康齊集卷八明吳與弼撰奏疏辭左春坊左諭德第一本天順二年五月十六日臣吳與弼謹奏為薦賢事於天順元年十二月初四日欽䝉差行人曹隆齎捧敕書禮幣降臨衡茅以臣為才而徵聘赴闕聞命驚惶恍然自失罔知攸措竊緣臣雖幼承父師之訓粗涉書史而弱冠沾疾加以立志不堅是以虛名雖出實學全無逮夫暮年疾病愈深夙志彌怠自愧虛度此生付之長歎螻蟻微軀何意復䝉聖明齒録夫卑辭厚幣惟賢可以當之而臣何人敢膺曠古所稀之盛典哉恭惟皇帝陛下睿知聰明聖神文武四方風動萬國歸仁而崇儒重道之盛心圖治濟時之美意實與天地同大日月齊明凡有血氣者莫不欣忭況在於臣敢不踊躍恭命謹於當日望闕謝恩祗受訖日陪鄉鄰老稚謳歌舞蹈伏惟大得民之盛何幸逢於今日而負且乘之譏實難免於輿論於是肅將敕幣謹用緘封俟春氣和暖扶疾隨使齎赴闕廷以圖辭免臣於三月十六日上道五月十五日至京十六日引見䝉聖恩授臣左春坊左諭德臣以菲才既未經辭免禮幣之榮又安敢冒昧以受寵擢之重謹將原賜禮幣進上伏望聖慈矜臣愚戅憐臣見患兩足風痺大施曠蕩之恩特回所命放臣歸田少全微分日歌頌雍熙於水邊林下以畢餘齡不勝萬幸第二本伏䝉十六日聖恩授臣左春坊左諭德臣尋具本辭免十七日奉聖旨不允所辭兼䝉過假褒詞益令孱薄不任震驚伏念臣所以懇辭者非敢有高世之心潔身之意亦非敢有矯激沽名之妄實以學德荒踈疾病纒繞苟不自量冒昧供職必有曠官之譏又必有失儀之罪非惟貽玷於聖明亦且取笑於後世是以不避斧鉞冒瀆天威至於廷對之餘賁以紗羅勞以羊酒分雖難當不敢有孤至恩即踴躍拜賜矣伏望聖慈哀臣愚誠聼臣辭免容臣儒衣儒冠日近清光以圖報稱於萬一臣無任懇切待罪之至第三本伏䝉聖恩授臣左春坊左諭德臣再具本辭免二十二日奉聖旨不許辭免伏念臣一介庸夫材非令器誤䝉聖明甄録初徵赴朝待以不世之寵授之美官而促令供職此急於用才之盛心曠古帝王之希典實千載之竒逢正臣子報效之秋也緣臣學識踈謬素多疾病見患痰咳頭風及兩足風痛苟不自量冒昧供職徒速罪疾無補明時臣聞漢蔡雍嘗見異書唐李雍願一見祕書臣僻處山林異書固未嘗相接祕書尤難得見叨遇聖明何幸如之伏望聖慈哀臣愚誠聽臣終辭俾於下處暫且調攝俟疾略蘇乞賜一接祕閣羣書少益䝉見或備顧問圖答涓埃於萬一不勝幸甚干冒天威無任懇悃惶懼待罪之至第四策欽䝉聖恩授臣左春坊左諭德已三具本辭免天意未回不䝉俞允臣竊思豈惟學識踈淺委是弱質早衰新病雖除而舊疾仍在且犬馬之齒已幾致仕精神血氣皆非可以鞭䇿之時伏望聖慈哀臣愚懇聼臣終辭不勝幸甚無任懇切惶懼待罪之至陳言十事臣吳與弼謹奏為陳言事臣竊伏念臣學術踈謬器識庸凡誤䝉聖明甄録至京以來日夜惶懼戰越無地且聞士大夫清議謂臣至京日久全無建明大失朝廷寵拔之意責臣當矣待臣厚矣臣固嘗伏讀敕書天語諄諄渴欲臣來臣心豈不欲再仰天顔一進芻蕘之言上酬清問萬一顧臣草野鄙人初赴闕廷茍不自量冒昧有陳必千非分是以倣徨怵惕心雖切切而意更遲遲也竊思臣犬馬之年已幾七十丹𠂻徒在宿疾彌纒誠恐涓埃未答而一旦身先朝露上孤聖明眷注下負士大夫屬望罪不勝誅矣是以忘其鄙淺輒敢撰次先聖賢格言竊附已意條為十事僣擬進呈粗備瞽御之針非有所建明也今者欽䝉聖恩放臣歸田俾全愚分天地覆載日月照臨捐軀殞命曷足云謝謹冒死以所言上塵睿矚少致感恩戀闕拳拳之萬一謹具如左其一曰崇聖志臣聞顔淵曰舜何人也豫何人也有為者亦若是公明儀曰文王我師也周公豈欺我哉程頥曰莫說道將第一等讓與别人且做第二等言人便以聖為志言學便以道為志朱熹曰要須做人難做底事孟子又曰責難於君謂之恭周惇頥曰伊尹耻其君不為堯舜伏願陛下斷然以堯舜自任雍熙自期天下幸甚臣初至京師聞輿人之誦曰我皇睿知我皇仁聖我皇勵精圖治日不暇給太平之盛可坐而待矣然則願陛下納天下於泰和之中躋生民於仁夀之域者豈獨微臣之私為然舉京師皆然臣自鄉里至於道途萬姓莫不然也書曰天視自我民視天聼自我民聼陛下躬上知之資膺天人之眷際承平亨嘉之運而當春秋鼎盛之日誠大有為之機㑹千載一時也程皓曰志不可慢時不可失司馬光曰時乎時乎誠難得而易失朱熹曰時乎時乎不再來如何可失伏願陛下奮乾綱之雄斷順天應人任重致逺勿二勿疑天下幸甚其二曰廣聖學臣聞聖雖生知未嘗不好學孔子學不厭文王望道而未之見是也或問於程皓兄弟曰生而知要學否答曰生而知固不待學然聖人必須學朱熹垂拱奉劄陳大學之道曰清閒之燕願博訪儒臣知此道者講而明之考之於經驗之於史而㑹之於心以應當世無窮之務伏惟陛下聰明睿知固不假學習而能然於萬幾之暇日召儒臣講讀經典一二條未必不少益聖聰而增輝聖政之萬一也聖明留意焉天下幸甚其三曰隆聖德臣聞湯武於盤盂几杖刀劒户牖莫不刻銘以致戒是以聖德日躋孔子贊易之辭曰日新之謂盛德書曰德惟一動罔不吉又曰惟德動天無逺弗届孔子曰為政以德譬如北辰居其所而衆星共之又曰德之流行速於置郵而傳命子思曰君子篤恭而天下平伏願陛下法成湯不自滿假之心體大易終日乾乾之意將見聲名洋溢乎中國施及蠻貊舟車所至人力所通天之所覆地之所載日月所照霜露所墜凡有血氣者莫不尊親而配天矣惟聖明留意焉天下幸甚其四曰子庶民臣聞書曰亶聰明作元后元后作民父母夫子之生也饑欲食而寒欲衣疾痛疴癢之欲其安逸皆於父母乎是賴父母愛子之心無所不至焉是以文王視民如傷也孔子贊易之辭曰先王以茂對時育萬物程頥釋之曰王者體天地之道養育人民以至昆蟲草木使各得其宜乃對時育物之道也孟子曰王者之民皥皥如也又曰君子所過者化所存者神上下與天地同流朱熹釋之曰聖人德業之盛乃與天地之化同運並行舉一世甄陶之書又曰衆非元后何戴后非衆罔與守邦又曰民惟邦本本固邦寧孟子曰保民而王莫之能禦也伏願陛下篤父母斯民之心而不已焉何皥皥之不可致哉惟聖明留意焉天下幸甚其五曰謹命令臣聞管仲曰出令當如流水謂順民心也孔子贊易之辭曰擬之而後言議之而後動書曰慎乃出令令出惟行伏願陛下命令之施必詢謀僉同得其至當之歸然後執此之令堅如金石行此之令信如四時致丁寧之戒以諭其始驗從違之實以要其終必令行禁止而後已又必諄復成湯祝網之意以致拳拳欽恤之心焉惟聖明留意焉天下幸甚其六曰敦教化臣聞張載曰為天地立心為生民立道子思曰修道之謂教門人問於孔子曰既富矣又何加焉曰教之朱熹曰此道理雖人所固有若非聖人如何得如此光明盛大人不曉得我說在此教人曉人不㑹做我做下樣子在此與人做原是要持守此道理教常立在世間常如此端正才一日無人維持便顛倒了所以說天佑下民作之君作之師惟其克相上帝寵綏四方天只生得人付得此道理與人做與不做却在人所以又為之立君師作成之既撫養之又教導之使無一夫不遂其性如堯舜之時真箇是寵綏四方世間不好底人不定疊底事才遇著堯舜都妥帖平安了所以謂之克相上帝蓋助上帝之所不及也自秦漢以來講學不明世之人君固有因其才智做得功業然無人知明德新民之事君道間有得其一二而師道則絶無矣吕祖謙說思齊之詩曰聖人流澤萬世者無大於作人所以續天地生生之大德也程頥曰古之盛時未嘗不教人任其自生自育只治其鬬而已又釋重坎大象之辭曰夫發政行教使民熟聞聽然後能從故三令五申之若驟告未喻遽責其從雖嚴刑而驅之不能也伏願陛下頒誥吏民俾天下曉然知朝廷意之所在然後庶幾吾教易得而入焉惟聖明留意焉天下幸甚其七曰清百僚臣聞書曰無曠庶官又曰百僚師師伏願陛下於人才之際精加鑒别無曠官之失而有師師之美天下不足平也茍賢否混淆雖有良法美意孰與行之而膏澤豈能下於民哉惟聖明留意焉天下幸甚其八曰齊庶政臣聞書曰德惟善政政在養民又曰庶政惟和萬邦咸寧又曰六卿分職各率其屬以倡九牧阜成兆民然則六卿者庶政之原而九牧之表也萬國賴以咸寧兆民賴以阜成昔仁宗鋭意太平開天章閣召宰輔賜坐給筆劄俾條陳所欲為者伏願陛下誥敕六卿各詳所司利當興害當除悉條呈進陛下博采羣議議定頒行而責成於六卿焉庶政和而太平不難致矣惟聖明留意焉天下幸甚其九曰廣言路臣聞舜闢四門明四目達四聰聖人以天下聰明為聰明也朱熹曰為政不在於用一已之長而貴於有以來天下之善伏願陛下廣延視聼洞照八荒將見嘉言罔攸伏而萬邦咸寧矣惟聖明留意焉天下幸甚其十曰君相一德同心臣聞天氣下降地氣上躋天地交泰而萬物生君臣之間必誠意交感而治功成是以聖人感人心而天下和平書曰后克艱厥后臣克艱厥臣政乃乂黎民敏德杜甫曰上有明哲君下有行化臣君臣交盡其道而治功不建者未之有也然圖治非艱致治惟艱毋急近功毋規小利必處之以裕持之以漸而後可是以聖人久於其道而天下化成也夫然後將見四時調風雨順百榖豐登而四靈畢至矣惟聖明留意焉天下幸甚謝恩表撫州府崇仁縣民人臣吳與弼謹奏為薦賢事臣以菲才誤䝉聖明徵聘於去年五月十六日欽授臣左春坊左諭德凡四具本辭免乃䝉俞允賜臣歸田以其年十月十二日抵家臣誠歡誠喜頓首頓首伏以臣猥以愚庸起自草萊遽登臺閣龍顔春煦聖德淵微曠古之竒逢固大有光於名教非常之至渥豈宜叨被於凡流臣誠惶誠恐頓首頓首臣直以早衰犬馬之齡懇辭鵷鷺之署何意涓埃未答於萬一雨露洊降於無涯宸翰昭回榮逾黼黻金帛璀璨重比丘山過憫餘生特領月廪仍勞軺傳重辱皇華凡在斯文咸歆盛美顧兹微喘愈益慙惶雖君父之慈曲賜全於生成而臣子之私實難勝於負戴瞻望宸極答謝無由無任感恩戀闕激切屏營之至謹差學生車泰奉表陳謝以聞書上嚴親書辛丑三月二十八日見丘彥庸知大人復職回合家皆平善不勝喜幸初只想老奶奶先生外祖母春月回鄉及見丘彥庸言未有回日男遂於二十九日給引前來省視日夜痛自咎責思為兒時未省人事而大人逺赴太學十二嵗方隨伯父至京父子初見皆不相識居京時大人常夜卧語男云吾昔在外時思爾不見淚下多少矣今爾在傍宜努力進學期於成人當時男未知此言之切也及年十八九雖略知讀書志氣太鋭自謂古人不難到每輕前人忽慢行事大人雖時時切責之而其狂妄之心終不能改年二十一回鄉粗涉人事然後漸知力行之果不為易又天之所以拂亂其所為者恆極其至兼以疾病纒綿茫然不知道路所由安得而順乎親哉身雖隔千里之逺而夢魂無一日不在於親之側也每中夜痛心罪不容於死去年六月來侍冀得一面親顔盡告十年所歷思自奮於後日而罪惡貫盈親心未回抱痛還鄉天下豈有無父之國信如窮人無所歸也去嵗古崖不知以何事拒先生先生負罪引慝早暮號跪纍日終不納是年冬先生復往省古崖感先生純孝父子如初今年重欲來省就迎老奶奶回徘徊悵怏欲進復却男不孝之軀何足恤惟益大人之憂耳本欲為悅親以來而返重親之憂豈人子之心哉於是舟至湖口既不敢下又不敢回遂至湖廣自湖口至湖廣凡一月遇人未嘗敢言家世惟恐纍大人之德今以禾熟附舟回家偶遇四川朋友遂拜字奉報男自今年正月來多看四書頃刻不離頗覺身心粗有所得於聖賢分上用工亦似有下手處方知天之所以窮苦於身吾親所以責備於行者恩何至哉噫男雖進德有日而大人年向晚矣惟大人善自解為祖宗念萬幸萬幸六月初四日寓武昌舟中男與弼百拜與徐希仁訓導書僕聞天下之至美者莫如聖人之道昭明易見簡易易行然世鮮能之者不學故耳原其故有二焉懵然無知而不事夫學者庸人也學焉而弗克者未誠也惟其未誠也是以事物交前理欲互戰順理乎繫纍於欲從欲乎有所不屑撓乎其中悶乎其心茍一念之或失則聖人之道斯逺而習俗之溺彌深幾何不并其少有所得者而亡之惡在能有充哉是雖曰學與不學同也僕坐此患十年餘矣抱悶朝夕亦云至矣今年從春來一以大學語孟中庸熟玩一日恍然似粗有所見乃喟然歎曰聖人之道果易曉也果易行也而今而後吾知免夫朝夕之悶而有以超然樂乎羣物之表矣因益加力焉所見益似親切於是又歎曰世俗固吾棄吾庶幾以自與世俗固吾笑吾庶幾以自得吾方聖賢之親而遑恤其他乎哉僕辱厚於足下有年古人重於交友者資以輔仁僕敢自私哉足下嘗向僕稱道慨慕人之善則知聖人之道之為美又向僕致自不足之歎則豈非同於僕之悶耶今將釋子之悶而進子於樂地不難矣蓋為之之機在我而為之之方則具於聖賢之書胡為而不勉之也僕近走江湖歸得風疾艱於步往來得罄所言於左右惟尺書不惜時賜逺臨幸甚與章士言訓導書近閲舊稿得足下往來詩數幅重感故人之誼因憶去年僕赴京省親時辱贈言引堯舜周公孔子為我標的而期我造焉噫此大賢所宜希者豈區區小子所敢妄意竊僕嘗觀古人道德著於一身而事業光於千古者豈無其由不自小其量而用心純也足下之云蓋所以廓我之量而純我之心輔仁之功一何大也夫聖至於堯舜周公孔子無以復加矣而其量豈自足而心豈少息哉後之英雄之士卓然特立者其量蓋期於堯舜周公孔子而其心亦以堯舜周公孔子之心為心一念慮一動作數聖人常在目前道德視數聖人為未克事業視數聖人為未大用力孜孜而不足量詎容小而心敢不純哉故能卒有所就降及其次則以先進大賢自期而用力於德行事業者亦無不至而亦各得其效夫期於聖人雖未至不失為大賢期於大賢雖未至不失為賢者世俗見其磊磊落落以自表見於後者乃謂天生非勉可至語古人則置之度外語時人則曰某吾過之某猶吾也某雖過我猶不能甚凡百一以時人自局靡然以古人為難企而毅然安於小藝之易成不𢎞其量而雜用其心小有所得志驕氣盈以為人生所事止於如此嗚呼此古人之所以為古人而今人之所以為今人也與僕雖不敢當足下之所期亦不敢不以習俗為戒而奮志乎古之大賢也犬馬之年三十有一矣六嵗入小學七嵗而學對句十有六嵗而學詩賦十有八嵗而習舉子業十有九嵗得伊洛淵源録觀周程張邵諸君子出處大槩乃知聖賢之學之美而私心慕之於是盡焚應舉文字一以周程張邵諸君子為心而自學焉學之纍嵗而行與時違或以為古而不達時宜或以為迂而闊於事情或謂之僻亦謂之怪笑讓兼極僕雖不敢盡忘初志亦不能不少徇於時徇時之心日深而初志日懈兼以疾病相纒居恆戚然不悅茫然無措感今懷古於風晨月夕蓋有不勝其愁歎者矣今年自春初専玩大學語孟中庸覺漸有所得舊疾稍減而精神稍益沈潛晝夜反覆身心然後知聖賢之道豈獨古而不達時宜豈真迂而闊於事情豈誠僻而且怪向之轗軻齟齬於十年之間者於聖賢之道見之未明行之未力也時議豈欺我哉賴天之靈祖宗之澤父兄師友之教今得少有所持循以進何其幸也然日月逝矣少壯不再過時之失不無憾焉以足下之明了此素矣而僕復瑣陳於足下者誠謂令嗣震才美少年冀足下善誘之至於道毋使其他日有如僕過時之悔也非足下之舊故不敢以此瀆非令嗣之可學不敢以此勉惟裁處之傅婁諸生進學有益可愛可敬勉之勉之僕近容歸得風疾不能逺出末由良覿頻頻示教幸甚與傅書區區數月惟看四書比與足下别時所見似不同矣客歸重訪一丘軒足下教學未回見士望知潯陽書皆到向承足下送至江滸言自今當從新用工不識别後果如何得區區書後又如何聞區區回鄉又如何若只欲糊口似衆人則可謂云耳已矣欲更向上一步做好人以光祖宗以大門户以垂後昆則宜偕令嗣至山中有以相告區區居家逺俗事外日與二三子讀書窮理樂堯舜之道而已此外非所敢知也與傅秉彛書别後日新如何區區自正月初一日至十五日玩得論語一周十五夜誦大學并或問亦一周身心似少有長進人能如此接續用工去何患無益祗是或作或輟則終不濟事耳昨日讀真西山大學衍義觀其叙堯舜三代之盛君之所以為君臣之所以為臣皆本於大學格物致知誠意正心修身之功漢唐之治君之慕學雖或甚篤臣之輔導雖或甚切然於大學之道不明是以卒於漢唐而已然則人之為學而不本於大學皆非也足下之志果何如耶令嗣前日臨别言或四月至吾山中今方正月而待四月其惰慢不立為何如且或之一字尤可見其惰慢之實噫其不可教也明矣足下亦踵覆車之跡乎夜來又看衍義叙經史所載兄弟之事宜親近而不宜踈逺宜忠厚而不宜刻薄痛快深切讀之令人悚然毛髮皆竪念不得與士望兄弟一共觀之與九韶書别後兩奉書想皆達聽區區客城十餘日假館牛千户宅意甚適也有人自京師回言吾親正月到家復職長幼皆安又一樂事但賤體半月來病瘡苦人亦順受耳早晚多看中庸似有小益凡人宜以聖賢正大光明之學為根本則外物之來有以燭之而吾心庶得以不失此心一失幾何不為水之流蕩雲之飄揚莫之據哉吾之所恐此而已所慕此而已汲汲若不及茫茫若有亡不知日之夕昏之旦也詠懷數詩乃餘事云耳不審吾友奉親理家之餘用力於四書所得何似少壯難再得勉之勉之大丈夫毋為習俗所溺也不具答九韶書十二日共談半夜翼日餘樂猶妙正先賢所謂學必講而後明道誼由師友有之惟聖人知朋友之取益為多故樂得朋友之來也此數語雖恆能道之必親得其效然後知聖賢言語有味十四夜玩月待足下不至十五夜與豐城鍾生東陂王生二三人月下鼓琴觴詠甚快而足下又不與深令人相憶厥後莫聞消息恐足下滯於疾今日辱書果如鄙憶宜善養心以自調理來書謂把捉不定動與心違此豈真足下之患乃區區之常患也足下今始知耳人患不知己病能略自知正好刻苦用工子顆令弟欲相從甚善敢不如教但自己要立志耳使回匆匆奉答不具與傅秉彛書人不可以不聞道而道亦未嘗不可聞也用一時之力則有一時之功用一日之力則有一日之功積之之久氣質自然化矣近與足下談數日觀足下豈懵然無知者比哉茍能從事於斯他日得賢父子一助其為幸也莫大焉昔有人見濂溪先生甚慕其道而自惜年已老矣先生曰無害也但能聼吾說則庶幾其後果有所得由是觀之人患不為耳豫雖不敢希濂溪先生之萬一而足下之年則少於濂溪先生之所誨者可不勉哉與黃景章教諭書久别而一見暫處而即别豈直足下情有不釋而區區亦奚能恝然哉然人生出處自各不同離合亦其常耳惟相期於斯道愈久愈固則雖逺近異處而此心未嘗不親慰也别來又半月思足下之誼每增感激則知足下之與僕矣近無便舟因鄉人而至大冶寓於普濟寺寺極幽曠學中師友日相往來永嘉朱廣文老成可親諸生亦多純朴寺僧能禮儒者亦客中一勝事進修新益何如有便可以字示途間所得拙文三篇附上見日未期保愛不宣與九韶帖近别後深思人生只如此碌碌混衆度日義理俱無所知孤負降𠂻何異羣物嵗月如流强壯能幾可勝歎哉數日讀四傳將畢昨日溫燖春秋左氏傳及榖梁傳至夜看得一公粗有意思而賤婦病甚敢煩賢友相過明早偕往種湖問醫幸甚與子端帖子端遭人倫之變而能不為習俗所移可謂難矣敬羡敬羡吾讀書人深增惶愧専此奉賀與族兄伯廣帖嵗裏讓一哥相過言老兄目下顧賤地欲遣子來學拜聞不勝欣忭仕敬兄亦欲教子甚盛事也合族能如此祖宗幸莫大焉不宣與吳宗謨帖癸卯嵗邂逅道途承眷眷同姓之好邀話市祠得挹清風至今感感屢欲一訪貴里遍拜宗親以多故久未遂所願也前嵗承致中下顧得詢動履曽屬以奉勸各房子弟讀書未審近來何如也良覿何時冀順序保愛復萬叔璨書伻來喜審逺道寧家合宅納福為慰重拜厚貺兼承佳筆感愛多矣賤子自春多病近來尤甚學德荒踈無足道念去嵗䝉遣令郎相過不勝欣躍惟不才無能啓迪貧家寂寥缺禮尤甚方自愧悚而令郎尋以家務歸寧弗得從容共學至今怏怏幸賴春融勿深責也尊堂姑姑亟欲拜庭少致問安之誠多事遂爾蹉跎并乞寬恕為禱與胡忭夜來㑹鎖生途中話久夜半方别意思甚好此公言自别許久稍能循序讀書漸學把捉身心可敬又言節省家務用志稍専近欲買屋鑿池今皆罷念此又可敬話間志甚踊躍擬與足下頡頏而進得渠如此衰懶有望矣與友人書壬寅去嵗小孤奉書已達且聞不以鄙言為妄戒酒進學非喜聞過而勇於行者能如是乎可喜可敬近㑹吳德讓言足下忽有虛弱之疾此讀書過苦所致最宜善自調攝區區向時不曉事其進太鋭往往盡力於書且高大其聲耗喪元氣極為大害居京時得疾已不敢大聲讀書居鄉曽於友人家講大學數日精神疲甚舊疾復作自此不敢過用精神每讀書但隨力所到為之少倦則止惟此心不可間斷為學本當日就月將優遊涵泳方能持久若要急迫速成徒自苦耳終不濟事大抵聖賢授受緊要惟在一敬字人能衣冠整肅言動端嚴以禮自持則此心自然收斂雖不讀書亦漸有長進但讀書明理以㴠養之則尤佳耳苟此心常役於外四體無所管束恣為放縱則雖日夜苦心焦思讀書亦恐昏無所得脫講說得紙上陳言於身心竟何所益徒敝精神枉過嵗月甚可惜也此區區平昔用功少有所見如此足下其諒之上嚴親書癸卯與弼田圃之餘書籍雖不敢廢然學漸覺長而德覺愈難修矣鄉村僻處無師友之資兼以多病家務無可委託不得大進而嵗月不延卒墮小人無由少望聖賢籓籬時發浩歎無所容身諸弟正好用工萬望大人善養之俾不才而才不中而中甚幸甚幸所讀書宜只以小學四書為急次及諸經本文其子史雜書切未可輕讀男少有所得渾在小學四書語略近思録言行録時先生尚未見程氏遺書朱子語類於此數書苟無所深得則他書易壞心術其害非淺鮮也大人常以訓男今漸覺之而用力晚矣可勝歎哉十月書云今年田圃之餘惟玩心論語集注其有得處直不知手舞而足蹈也自八月來又覺大長一格孟子所謂四端逐日省察體驗而凡所以持身所以處家所以接物似各有所持循所恨者獨學寡陋無師友以講明之耳曰讓言大人的發諸弟回鄉此誠逺慮實不肖男之深願素志也蓋不惟鄉里純朴清儉可以為進學德之資抑早有以知稼穡之艱難則他日可不流於放逸惟大人斷之無疑急急遣行是禱所儲書籍并大人平昔親筆諸藁及親友書札亦望發與曰讓至誠護回為妙乙巳閏六月書云深懼不能大進於學上玷先世近辱父師日夜痛心不遑起處又曰晦庵先生文集千萬發回近來覺得文公先生言語愈深切著明但用工不逮耳十二月書云十一月初八日訪鄉親黃于霄季子自京歸伏聞大人萬福合宅均安愁容頓破歡意曷勝繼聞明春大人有祭掃之歸骨肉有完聚之期此一大樂又何幸也與弼居鄉循常晚榖稍登但恨困於疾疢書籍荒蕪身心彌怠不敢擬於人列嵗月駸駸血氣日減弱冠奮拔之志今安在哉孔子曰年四十而見惡焉其終也已豈不然乎諸弟於學初猶未嗜覆車之轍誠不願其蹈也士友自京來者深言其富貴相習後難處於鄉男默自惟念生長於飽暖之中居養所移無足怪者伏望大人善教俾裁損舊習素淨來歸漸親稼穡日與鄉里士友漸磨其進其成實未可量祖宗積纍宜必獲此而男日夜之所深望也與九韶書丙午别後多病侵陵甚苦亦順受耳知行新功逐日有進近承送朱子經濟文衡至每日敬觀正如溪澗恰漲繼以驟雨也意緒儘多非筆所悉兼足下不曽有積纍著實工夫難一時驟語也大要入門只在撥置他書一以四書及伊洛關閩諸子専心循序熟讀勿忘勿助優柔厭飫於其間積久自然有得不可强探向上此味真難知之正文公所謂雖淡而實腴也不肖亦何幸而忽臻斯境痛快痛快來諭謂較前去年差勝甚善但用心不宜太苦進鋭退速實非虛語足下精神甚短體弱致然宜倍加保養以圖萬全復曰讓書山椒一别不覺經年懷想之情彼此共之不肖自去冬來學之功不謂不苦日用亦不敢謂不得其力但病體衰憊家務相纒無由猛進而日月不延企仰古人相去萬萬此朝夕所甚痛心者也今秋忽得教帖乃知進德之志不怠如此豈勝欣躍書忩展玩以慰别懷因以自激書尾欲令寄言猥䝉不鄙惡得而默但足下已自言之矣來書云嘗肆力於四書此可謂不枉用其力而得學之本矣僕雖欲言奚言哉豈惟僕也雖聖賢復生教人又豈出此僕與足下别後工夫亦只此書而已足下又云雖能一時理㑹紙上陳言於身心竟無所禆此語尤有意味正好商量蓋人患不知反求諸已書自書我自我所讀之書徒為口耳之資則大失矣今足下既自知無益身心則當漸向有益惟専心於此篤信之固守之深好之讀以千萬而不計其功磨以嵗月而不期其效優柔厭飫於其中則日新之益自有不期然而然者矣與曰讓書念昔奔喪初還鄉時以情事未申罪逆深重不遑寧處而百憂俱集其於賢妹及吾子曽不能少盡恩禮雖達者不芥於意寧不大自歉於中耶閣下之官之日正不肖穫稻黃柏遙望去塵豈勝愧感恆欲東訪一寫所懷奈困憊之餘未得少蘇此志未易可遂而尺牘之敬且闕如也知罪知罪中蒙疊寄佳貺拜領祗益慚悚耳與年云閣下能祗勤所職可喜可敬嚮黃柏途中所言四書五經本文循序俱下遍數讀過之志尚能爾乎不肖於去臘遷居小陂庶事草創俱屬艱難祗隨分耳惟血氣益衰學德不前無以洗不孝不弟之罪之萬一重纍父兄師友屬望日夜驚懼無地自容新嵗鄉里間有子弟相過共學日以多病少能與之精進益加惶懼徐妹夫近承訪且有意來此亦美事也令郎在侍宜篤教之熟讀小學四書五經本文養其德性毋令踈放閣下課程亦不出此大要小學書尤不可不痛加工夫須逐篇逐條玩味入心見聖賢教人之意昭然見於言外如此庶幾有進愚意常以為後世萬事之不逮古先者闕此以為之基也小學既熟方好用工四書五經須令成誦使其言如自已出則味自别古人云讀書千遍其義自見非虛言也四書五經本文既熟方可讀注旁及子史讀書如不循序致精只欲泛然雜看終不濟事徒敝精神枉過嵗月大可惜也區區平生陷此病痛悔無及矣以閣下之年之資千萬日䟎向上毋忝所生學者某近年全然惰了役於利欲罔克自持原其所由正以平昔小學功踈讀書鹵莽根本不立故外物易以動搖可戒也可戒也徽州及各縣有何書籍幸一一惠及為感末由盍簮惟兾保愛不宣與九韶子濡帖今日承家兄帖示䝉諸親鼓樂導葬不勝感懼已奉字託家兄告免再煩二賢友宛轉於諸親友一言務必得免則幽明俱拜大德不淺也與傅秉彛書承遣令嗣逺辱送葬兼貺賻儀不任哀感之至第二令嗣有志於學此誠美事愚意欲賢友今嵗田暫與人佃種分榖長嗣早晚照顧家務今中子來學明嵗又作主張賤子襄事後只有讀書最切擬整理些書籍須得數學者抄寫交遊中有的當者可擇與令嗣偕來嗣裘亦間來受學不宜苟且因循嵗月如賤子此時嵗月已去百病侵陵難得向前日夜痛恨徒自苦耳悔何可及心事萬萬何由一面又云幼令嗣尚未知學須用拘束令其熟讀小學四書五經本文足下亦宜痛加努力庶後人有望也回憲司經歷書僕以不才誤蒙憲司列位大人以為可用特垂褒薦致屈尊嚴枉顧蓬門一聞車馬之音驚惶戰懼汗流浹背無所逃罪竊惟僕幼受國恩未答涓埃正當踴躍以繼清塵少圖微效然僕自二十一嵗沾疾一向纒綿有加無愈全然不能進學是以虛名雖出實學全無誤蒙齒録徒增愧赧兼以見患頭風等疾動作艱阻雖欲奮身實不能得此皆大人親目所見者伏乞回司於列位大人前申此下情乞賜别選英俊以副朝廷求才盛意貸僕嵗年使得逐漸醫治但身一健凡有指麾即當欣抃趨事冒瀆尊嚴無任悚懼俟罪之至回清漳王太守書正統己未與弼不幸早嬰多病晚益纒綿竊伏山間苟延喘息而已其於學德有弛無進重玷父師抱愧萬萬方措躬之無地尚奚有於四方之志哉近者伏蒙誤愛以與弼可以驅䇿特辱褒薦遣使臨門聞命震驚受恩感激不知所措夫嘉善而矜不能固大人君子為政之體顧僕何人敢膺兹寵伏望鈞慈察其無似哀其疾病俾得以遂其畎畝之私不勝幸甚謹遣學生黃節奉書申覆兼致謝懇干瀆尊嚴無任恐懼俟罪之至上石憲使書庚申撫州府崇仁縣百姓吳與弼見患風氣等疾謹遣弟與性稽顙拜書於憲使河南大人鈞座前與弼輒布腹心仰干造化與弼自幼隨親宦遊於外家山丘墓曠於祭掃年嵗既久不免為人占侵盜葬已嘗遣弟與疇具訴於官人頑健訟慢延至今不遵遷改伏惟大人性行安潔學識高明德政洽於羣情威刑服於衆志凡抱寃負屈得以見直於秋霜烈日之表者幾千萬人矣而吾祖獨懷羞於九泉何哉蓋為之子孫者怯懦逡巡不能伸情於上而然耳不孝之愆其何以逃竊謂禮莫貴於重本罪莫大於忘先與弼幼承父師之訓粗知自守曷敢僣踰今日冒昧瀆犯威重而不避斧鉞之誅者誠以本不敢不重而先不敢有忘也伏望鈞慈俯垂聼察矜其衰悃特賜施行俾公法明於上私情申於下則死生受賜子孫難忘干冒尊嚴無任戰栗俟罪之至與黃鐸書胡生齡望者區區祖居種湖鄰友胡子熙之子也充臨川邑庠生欲於曰讓處請春秋之學煩吾友館之待彼葬事畢引去求見凡百於賢伯仲青眼為禱答周圻書承喻諸葛武侯治蜀服罪輸情者雖重必宥理則然矣然所謂必宥者謂如律之自首法也自首欵內有云其損傷於人於物不可賠償云云並不在自首之律若無斟酌之宜而一槩從輕正朱子所謂只見所犯之人為可憐而不知被傷之人尤可念也鄙見如此漫以奉復不宣答陸參政友諒書不肖奔喪時䝉倡義裒賻周旋偹至豈勝哀感自是而後常於稠人廣坐稱揚盛德聞者莫不悚然起敬起仰今年春正慕想間忽辱教帖拜聞榮膺大藩之寄南服之民幸莫大焉兼拜寶楮佳紙美味尤深感感兹又拜書獲知蒙備厚禮於先人之墓繼惠以胙益歎仁人君子之高風雅度邈乎其不可及也其於師友之誼厚矣於風俗激昂多矣顧小子曷足以承下風之萬一哉祇增愧感而已使回謹此申覆無任哀感恐懼之至答族人宗程書許生來承書問知足下拳拳於學深以為慰邇者因念吳族近代以來不勝衰替而吾宗種湖為尤甚不肖早既慆慢中益病苦萬不如人悔莫追矣父兄宗族無德以動之鮮有一人能以振起後昆光顯祖先為意者惶恐惶恐楊溪彭澤二族不能不深有望於士彰與吾宗程也勉之勉之與黃季恆書行李往來知貴恙安愈不勝為慰賤子到此病體不佳兼苦於瘡四月初方少緩痛逺人事養病觀書頗為自在雖居市不異山間也諸生授業皆略有緒但恨吾友隔逺耳子顔勵節二親契同此申意未㑹間各兾保愛不宣奉頥庵胡祭酒先生書近别伏想尊候起居萬福為慰與弼十二月十三日南浦問舟十四日早行十八日抵家諸生及璿慶席尊庇皆獲粗安竊伏惟念與弼率意拜造少申謝懇瞻仰門墻負罪戚恧特䝉鈞慈緩其逋慢之誅備沐欵教之至仁人君子之心固如是矣璿慶雖幼均拜隆愛何感如之贈言過許內省欿然雖為閭里之榮實重父師之辱愧悚愧悚擬明春來親德音携數生拜假程氏遺書及三禮諸書抄録但未知家事如何行得否也今因王生行便敬此申覆企仰西山無任瞻戀激切之至不具與伍伯遜書得假華館辱愛良多重承厚贐尤所不勝近别想動履清勝為慰不肖十八日抵家諸生及小兒皆席庇粗安每於親友話次未嘗不樂道賢主人伯仲和樂之意以為薄俗勸敬羡敬羡今因王生行便専此馳謝不宣答黃季恆書伻來辱茶肉之貺甚荷承諭牛租俟面奉其詳令郎往質固知太幼然區區絶跡公門高明所素悉者雖愛莫能助也答任教授書同安舊遊風流雲散音問寥闊二十年矣周圻到山間忽知閣下來教敝邦慶喜之餘恍然如夢繼王常至則教鐸已施出人意表敬仰敬仰鄒觀來辱華箋及筆墨書籍之貺兼承吾師以保楊先生逺命尤以為感細詢泮水新政不覺撫掌歎賞無已實吾邦之幸而斯文之光也與弼離羣索居舊學荒涼懶病日向衰憊負我良朋多矣陽春白雪稱道過情何敢以當萬一祗益愧赧耳鄙句奉酬漫爾備禮無復思致幸恕昏惰種湖之行必有一日承問冀以道自任益堅雅操至誠樂育榮膺天寵不宣答郡侯王仲宏帖衰卧衡茅光陰徒謝日切負愧平生知己是惶是恐風雨中忽承命使頒胙何感如之拜貺之餘愈增悚懼耳使回謹此申覆無任激切屏營之至復建昌郡侯謝士元帖侯遣諸生習鄉射禮岑寂中猥䝉使介書幣駢臻披雲霧而覩青天何快如之第恨學術荒踈無能奉答儀章萬一為歉引領南雲有懷罔既使回謹此奉復與上饒婁克貞書久不聞問辱三月十二日書審侍奉吉慶為慰又知令弟髙升賢友進學不已二郎讀書尤以為喜於小兒友分責善輔仁之功至矣大矣同諸生捧誦之餘快哉快哉豈勝傾感謹書置壁間朝夕以為盤盂之戒示及所疑當俟面講謁杜祠之作非區區所望於賢者棄而勿治可也蘄春王侯正懷想間忽聞動履何喜如之且承惠書事雖中阻意已領矣齊夀之屬樂於受簡但年來衰病益昏無好語耳姜友譜文安敢食言惟是秃筆寫字有孤盛意也良晤未期下學上達日進無疆是所禱也雜著吳節婦傳節婦諱某航溪黎友和女也聘為處士吳彥升婦歸未幾而處士殁時節婦年二十一有子一人曰通才四嵗節婦以節自誓清儉謹畏處人所難人亦無不敬羡之也子通於與弼為族兄弟嘗謂之曰吾母孀居今四十餘年矣志節凛如一日育我教我報恩無所宜得文以識庶昭於後嗣抑少慰人子惓惓之心吾弟其成斯美乎屢諾而未就今以春正月重以族叔父仲學先生命乃感而言曰人之大倫五曰君臣父子夫婦長幼朋友是已五倫各有其理而理具於吾心與生俱生人之所以為人以其有此理也必不失乎此心之理而各盡乎五倫之道庶無忝於所生若節婦者自少至老守志不渝教育子婦以振其家是謂能不失此心之理而能為人婦能為人母矣噫是亦人道之當然固無足深歎然人欲橫流良心斫喪而人道不虧者鮮則節婦之行惡得不表暴以勸於世哉洪熙乙巳正月丁亥族子與弼謹識觀湖說崇仁東四十里有坪曰白沙吳氏所居之坪有大小五湖湖之主人孟晦翁走書謂豫曰元孫淡軒著觀湖說亡於兵燹復求其說於豫且有屬乎全體大用及洗心滌慮之云豫尚翁之志乃為之說曰觀湖之瑩然瀞緑物無遁形則知不可以一私纍乎吾心之高明觀湖之不息則知委之有源而吾心不可不加㴠養之力觀湖流之必溢而行則知進修之有其漸而助長之病不可有是皆湖之朂吾志者如此其月到天心處及風來水面時之樂則在乎其人焉若夫藉湖之風月以流連光景則詞客所為非吾儒所尚亦非翁之請也勸學贈楊德全人之所以異於禽獸者以其備仁義禮智四端也四端一昧則失其為人之實而何以自異於禽獸哉然蜂蟻之君臣虎狼之父子豺獺之報本雎鳩之有别則以物而猶具四端之一人而陷溺其心於利欲之私流蕩忘返反有不如一物者矣欲異於物者亦曰反求吾心固有之仁義禮知而已欲實四者於吾身舍聖賢之書則無所致其力焉豐城楊德全逰太學歸覲與豫同舟談論纍日慨然有志乎此而慮其還鄉或汨於人事且俗染未易革也徵言為進修之方復以為戒豫曰天下之事公私理欲義利善惡兩端而已其勢常相低昻此重則彼輕彼重則此輕輕重分而利害判矣知者不患彼勢之重顧吾所以積纍增益吾勢之力何如耳子歸淨掃一室置古聖賢格言於几事親之餘入室正襟端坐將聖賢之書熟讀玩味體察於身一動一靜一語一默之間必求其如聖賢者去其不如聖賢者積功既久則其味道希賢之勢日重而舊習夙染之勢日輕不患不造古人門庭矣凡親友相見一以是忠告而善道之則秉彛好德之心人所固有吾見其相與踴躍共進於此又何患乎人事之汨哉勉之勉之無怠學規庚戌一須用循序熟讀小學四書本文令一一成誦然後讀五經本文亦須爛熟成誦庶幾逐漸有入此箇工夫須要打捱嵗月方可苟欲早栽樹晚遮隂則非吾所知也一學者所以學為聖賢也在齊務要講明義理修身慎行為事如欲涉獵以資口耳工詩對以事浮華則非吾所知也一古人讀書皆須専心致志不出門户如此痛下工夫三五年庶可立些根本可以向上如或作或輟一暴十寒則雖讀書百年吾未見其可也勞諸生禦水患時溪水泛濫將及屋諸生築堤禦之諸生用心力救水甚善此之謂盡已也事雖莫濟分則盡矣遣晏海黎普使金溪早晚所讀書及視聼言動得失應事接物當否途中人家宿泊凡交遊姓名皆須逐日札記歸日要看凡交處之際務要禮貌從容恭謹不可傲忽康齊集卷八
