body:
  text: 康齋集卷五明吳與弼撰詩新正重沐縣侯賁臨茅舍敬裁二十八字充一笑耳戊寅誤辱明時降玉音賢勞吾宰嵗寒心前溪遇雨春流駛試問恩波深幾深贈太守林侯匪才焉敢厠儒流光寵頻煩誤我侯從昔斗筲何足算願均慈造遍林丘迎恩橋詩并序天順丁丑十有二月甲午郴陽曹侯奉詔枉聘與弼辱經青石橋門生吕邦翰屋以表焉與弼名曰迎恩之橋而詠歌以詩云青石流傳亦有年迎恩於此慶堯天山呼北闕晴雲表玉燭祥光正煜然皇華亭并序天使郴陽曹侯辱臨神嶺閭閻老稚莫不交慶門生金溪車用式表亭其上僕名曰皇華之亭嶺曰皇華之嶺恭裁小詩以紀盛事云皇華勝嶺舊名神使節遙臨雨露新草木從今皆可敬一亭晴映萬山春天使亭詩并序天使郴陽曹侯辱臨聶家尖門生金溪車用正表亭其上僕名曰天使之亭尖曰天使之峯恭裁小詩以紀盛事云伊昔竒尖號聶家名峯今喜屬皇華誰人領得峯頭趣舜日霓旌拂曉霞集慶亭并序天使郴陽曹侯大參山東談侯僉憲同安程侯旌節暫駐於大園之上門生陳庸李章亦侍語次庸作亭以表其遇僕名曰集慶之亭而詩以詠歌焉拜罷天書使節歸徽音暫此駐旌麾閭閻荷慶何多也共仰文光焕璧奎綵雲亭并序天使郴陽曹侯辱臨馬鞍山門生陳子球表亭其上僕名曰綵雲之亭山曰綵雲之山恭裁小詩以紀盛事云旌斾騰輝鼓吹雄青山盡屬綵雲紅羣黎奔走矜竒遇滿路謳歌日正中奉陪天使重遊皇華亭前日風雲擁護多兹晨氣色倍清和遙空一矚春無涘共聽重歌勝嶺歌天使臨胡氏族譜亭喜添勝迹詩以紀焉華亭雄構野塘濱天秩昭昭篤大倫品彚一經時雨化山川出色境增新天使遊山歸旌斾暫停戴祿氏喧天笳鼓踏新晴踏遍春山幾處亭旌節暫停歸興好梅花溪上問諸生天使歸五峯綵旗聮句綸綍夙傳丹闕表旌麾遙賁翠微中四民瞻仰乾坤大萬竈歌謠雨露濃競託皇華人似玉頓令白屋氣如虹祖筵簫鼓騰三市驛道風雲壯五峯徐廖二友承天使命來戊寅車輿燈火遞相譁互認前村處士家欵欵細傳天使語春風早約上京華題饒氏祖德亭并序饒安用中者豫故人也僉憲陜西有聲諸孫循者豫子壻也嘉乃祖之才重循能仁其先故樂為書之男兒能不負儒冠贏得功名萬古看幾度懷人吟不寐梅梢殘月五更寒棠溪道中細雨新泥江路長忙衝暝色急投裝筍輿非忍長鬚困爭奈先塋不敢忘南原道中茅屋石橋西行行日未低地名時問訊春興入新題吕中良引拜羅源岡李氏夫人墓馬鬛巍巍久已平狀元空憶舊時名若無故老殷勤意徒有慈孫繾綣情葛藤科先隴蓬科不見當時葛馬鬛猶傳舊日名星火程期京國夢春風花栁故鄉情經方升氏難兄客邸共鄉心令弟高居辱愛深問訊若逢南鴈使春風早寄白頭吟贈石井黃徐二生愛爾黃徐二秀才重逢故意倍悠哉他日松楸勞夢寐頻期魚鴈到金臺天使曹侯枉顧金石臺一上名臺百慮消況承使節在青霄黃徐預擬忘憂物程李同歌擊壤謠羅原岡詩并序上下羅原岡先塋所記蕪沒已久得復舊物者周氏孔文吕氏本誠中良邦翰數公之力也欣幸之至情見乎辭冷派衰宗各渺茫荒山寒溆久淒涼東風為我回春色衣被羅原幾處岡贈廖良齋崇傑行人歸樂安馬嘶芳草正清明高下風花逺近亭他日金臺談舊雨青山總是故鄉情贈鰲溪茂宰林侯秋月窗前天似水春花縣裏日如年民謠若達觀風使處處流傳茂宰賢寄張璧雙塜遙依鳳水傍朝煙暮靄久荒涼維持曽荷尊公愛重喜如今得令郎次白旰李大章贈行韻髣佛當年暫接顔忽勤縞紵辱柴關何曽實行出人上空惹虛名在世間樗散豈宜私雨露駑慵只合老雲山誤蒙明詔乘春去嫩蘃濃花滿目斑同程庸諸生遊集慶亭皇華嶺畔又竒峰峯上新亭結構雄亭子主人良得意來遊多侣共春風承判簿戴侯掌教陳君下顧聮轡儒冠顧匪才春風揖别話金臺殘書數卷青山曲滿賴餘光燭草萊承天使遣胥余二生枉顧茅舍暫坐清溪暢病身又瞻聮轡兩儒紳行裝自促無勞迓定在旬餘躡後塵奉别鄉鄰親友流傳遐邇盡虛聲君子從來耻過情惜别誤蒙鄉里敬匪才何以答升平贈李晏諸生我承明詔遠觀光付爾琴書與雪窗好篤男兒燈火志莫隨浮俗一般忙外孫瑞康索詩明日朝天去今宵索我詩莫添離别感喜有盍簮期金臺往復藁西津舟中口占授同宿諸生停舟西日四三生共宿津頭風雨情須信萬緣皆有命肯將行止問君平發張家石黃昏西北浮雲斂清曉東南霽月明紅日滿窗春睡穩拍天新漲棹歌聲貴溪道中懶慢宜間不得間衰齡却事道途間曉程匆遽嚴牽路晝夢依稀在故山奉寄臨川傅二令令聞宜民夙所欽琅玕欲報愧微吟更煩細問南來鴈日夜天涯念萬金周文婁諒徐綖棹舟逺迓暫親鉛槧向清流忽遇波心蕩漾舟老去久於浮世淡重逢端似夢相求草萍驛暫息草萍驛心安即我廬萬山新雨霽半枕黑甜餘白石鋪道中早稻青青小麥黃杜鵑聲裏野花香好山遞送程程秀咫尺雲帆是浙江寄龍遊洪茂宰沙頭傾蓋重青年别後重歆單父賢好看嵗寒氷雪表管教松柏轉巍然贈梁布政尊公諱潛與先君同官翰林曽陪崇禮南京衛名少年遊一隔江湖五十秋碌碌那堪今日會空憐嵗月白人頭寄嚴州劉太守我愛霜松託趣深殷勤特表嵗寒心贈霜松二大字當年縞紵休相訝還所贐遙寄新詩詠斷金贈伍御史與君共飲西江水却向錢塘話舊鄉拙筆正直二大字漫持雖偶爾男兒從古貴流芳王憲副順德堂錢塘江上接珠璣顧我何堪順德題思遍古人無健筆斷雲殘照畫橋西楊太守雪艇同郡楊彥魁以名御史知姑蘇之明年豫往京過貴邦辱扶疾兩顧驛館蓋誤知我之過者也一艇寒凝雪滿窗棹歌聲裡鐵為腸把君詩卷摩挲久人在氷壺月似霜次楊太守見贈韻承家曽讀魯春秋多病因循漫白頭野性只應木石侣道心深愧聖賢儔萬緣久分同春夢束帛何期賁晚丘畫舫濫為偕計客偶陪高興一登樓贈畢王二進士丹桂亭亭兩妙齡相逢江上話詩情氷霜自是男兒志穩步青雲萬里程姑蘇驛館即事驛官置酒鳴琴尊酒為歡偶共斟江清地逈夜沈沈感君流水高山意暢我光風霽月心桐鄉舟中兩日勞勞晝夢長斜風細雨度桐鄉卧薪自是男兒志何事寥寥數越王贈鄭御史江上相逢話舊知與故人徐希仁同學兼姻姻門蘭雪豫所贈徐二大字共心期行春大展經綸手碌碌何煩索小詩陸主事紫微庵先隴所在一庵遙託紫微坡馬鬛巍巍事若何惆悵孝思維則處始終名教為君歌皇華館即事沈沈臺館緑隂濃一榻高眠詠午風時止時行皆樂地夢魂依舊白雲中陸大參宅成均高誼古人儔江右仁風播更優今日德門恭一拜白雲埋玉幾春秋滸墅鋪舟中一席中流快好風平疇時喜看吳農推篷細話園林趣總在乾坤生意中白鶴溪鋪舟中我愛佳名白鶴溪客情舒處又題詩分明畫得無懷世楊栁家家賣酒旗次羅憲副見贈韻蹉跎夙志久隨流到處逢人愧白頭濫奉天書趨魏闕猥蒙春酒醉常州聖門道逺良難進賢轍風高不易儔安得魯戈回白日重將舊業共君修邗城丹陽古渡接瓜洲萬傾黃雲麥正秋一榻午風清夢覺又題新句過揚州高郵湖圖經旋展認邗州童稚傳聞老始遊一曲倚樓懷古調煙空漠漠水悠悠渡黃河次唐人昨夜微霜初渡河韻平生蹤迹半樵歌嵗晚昏眸始識河名姓誤叨天上薦琴書端似夢中過洲連碧水浮埃少自瓜州來水穢濁之甚至清河口清矣席滿薰風逸興多却憶青山同學侣可勝名教兩蹉跎憶家獨吟沂泗向黃昏漠漠雲天逺近村前月小陂今夜思細分詩帖與諸孫杜主事榮壽堂乃尊受封贈堂上嚴親八十強天恩厚處錦袍香多才令子方騰踏百福如川日正長徐州前月兹晨别小陂通宵風雨泊西陲看山問水何鄉客帆指彭城薄暮時贈宋知州蘄水人名誠字彥實沙頭載酒話蘄州勝水名亭悵舊遊聞道彭城多善政盤根正屬有為秋即事一灣未盡一灣連處處垂楊蔭道邊高纜勢寬夫力緩行行喜帶夕風牽王錦衣望雲思親詩卷使節馳驅南復南高堂華髮夢毿毿一杯春酒歸心切指日雲邊落錦帆曹天使重慶堂餘慶重重見老萊斑衣華髮映春罍青山門巷時時掃待領天邊紫誥回平野望鄒魯次少陵韻問士人此去魯城九十里古意千秋上孤蹤九夏初高山方仰魯洪道已過徐慈教三遷外雄韜百戰餘堪輿頻悵望風日共躊蹰望魯山閘水仍相阻河堧又獨行兹山含萬態於我故多情夢家百體衰慵兩眼花雲山久已隔紛華宵來魯水橋邊榻一片離魂只在家濟寧道中時阻淺登陸一逢勝地憶平江夾河楊栁隂隂皆平江伯遺愛緣道薰風滿緑楊豈獨隂涼人共惜助豫詩興更無疆濟寧南城驛庭前多種椿與白楊庭樹隂隂轉嫩涼琴書喜博濟寧航短歌不盡悠悠興泰嶽峯前送夕陽夏至晝雨聊城逢夏至暮雲江右憶儂家東林新籜知成蔭南畝香粳想俵花録詩後作無事偏宜白晝長薰風多送午窗涼思家恐有南飛鴈預寫新詩待寄將王錦衣贈梅聖俞集早自歐編慕聖俞晚從汶水得明珠殷勤欲表將軍愛又向思親錦卷書端午前一日作端午明朝是鄉園此際思南歸人未上北去日隨時道逺諸孫弱家貧老母慈榮枯自有分無使淚空垂寫詩後又題新詩寫就即封題只候河邊鴈字飛消息定於何日達夢魂夜夜大江西臨清端午王錦衣饋糭且食將軍糭休論故國情離家從兩月挈榼任諸生碧艾仍懸户香蒲可泛觥稚孫嬉作隊誰念日邊行盜名實若虛兮有若無如斯方表聖門徒盜名似我真堪鄙愧爾昂藏一丈夫武城對月一鈎清照故園心獨倚薰風又一吟惆悵麥秋今夜宿諸生共聽玉山琴泊武城長年捩柁棹謳停淡月疏星泊武城若使九原人可作絃歌聲裡拜先生陪天使及王錦衣登陸間眺取徑徐步坐滕家鋪緑隂候舟小兒陪二使習射見説行逢對摺灣相招取徑縱遐觀河山指罷仍留射好似雩壇春服還登德州梁家莊驛樓一賞薰風瞰水樓樓頭清興暫相留明朝知隔幾程驛緑樹人家記德州題德州梁家莊驛館粉壁四牡聘賢二圖左是皇華右聘賢苦心於此豈徒然中原萬里能無孕不在商巖即渭邊書薑米巷壁雲山萬里去吾廬萍梗那知此寓居晝夢每便風帳靜夜懷幾共月窗虛樂天知命憂何在安土敦仁愛有餘他日多情時北望殷勤却憶壁間書客夜即事庭户沈沈夜未央碧天如水月如霜一星為幸何多也獨許寒芒伴耿光得小陂消息辭家三見月團圓幾望南雲路渺漫忽報遙臨桑梓客曉窗倒屣問平安移寓宗人建一素佩行雲流水詞一枝何處不堪依殷勤況有吾宗子小閣虛窗懶正宜題南薰閣玲瓏傑閣面南城滿座薰風解我情玉軫朱絲秋月夕幾回清興繞虞庭題南薰坊寓居一柏亭亭傑閣西婆娑厚蓋未經題他日哦吟南斗外時時夢想與雲齊贈王醫士杏林春色滿窗紗好是當年董奉家我借餘光輝客邸神功特向衆人誇奉呈忠國公翠柏蒼松幾嵗寒菊窗竹牖共平安百年勳業寰中滿萬古聲名鼎上看奉别文安伯彤墀執手話綢繆雙硯殷勤誼更優明發青山白雲裏龍樓鳳閣夢神州奉别李尚書學士神交尺牘比南金況復雄文重盍簮錦繡欲酬何所禱和羮慰滿四民心奉别彭吕二學士幾陪鴛鷺肆愚言玉趾頻煩坐客氊歸夢已隨秋興逺寸心猶在五雲邊奉别主客諸公聖賢事業細曽論别語諄諄問所存尚友軒中銘座處紛紛慎勿惑多門奉别孫黃二姻舊客裏情親孫與黃夜來歸夢繞秋江西風黃菊青山曲細把平安報舊鄉孫氏叢桂堂莫説當年竇十郎君家叢桂互流芳靈臺更有天然妙不待秋風也自香孫氏更造八里橋改名通濟八里新更通濟名乃知仁者用心宏誰人更續生生德好共千秋萬載馨十友餞别城東五里曹天使孫郎中秦員外倪員外張主事陳主事孫主事黃員外劉都事王進士疏頑無以答升平況辱羣英逺餞情明日青山回首處五雲遙憶讀書聲重宿通州驛館五月蓬窗觸熱多清涼臺館此調和故人重進杯中物獨酌燈花一放歌細數燈花事短歌南歸魂夢白雲窩獨憐葵藿微私切惆悵何心製芰荷别二孫生客裏過從喜二生雲和夜夜玉壺氷長河寄得臨分語莫把靈臺泥俗情中秋新橋驛次去年詩韻何處中秋對月圓新橋旅泊近人煙西江皓彩阻千里北闕清光隔九天畫舫獨吟河水曲銀燈高照驛樓前時逢鄉友談萍梗華髮添明又一年登陸偶成曠望晴蕪外聊為曹濮吟靜觀浮世事端合付無心奉謝都水車主事爭奈舟人貪利涉寧知見險却當需指麾非仗仁人力顛沛洪濤尾盡濡崇武即事一舸秋風晝枕清樓臺時見博平城思家欵欵南歸夢戀闕依依北望情獨倚滄浪懷古調細論輿地閲圖經明朝放犢晴嵐塢遍憶琴書水上萍古城舟中朔風微雨櫓和鳴已度鍾吾問古城北路漸遙南路近伊誰一寫箇中情贈金通判名鎬字孟周尊公名砥國子典籍與先君官舍隔壁而甚相得於不肖過蒙與進孟周在官亦有聲豫為大書氷壺二字以貽之少小為鄰今老夫淮隂重喜話氷壺男兒肯負平生志正好明時展壯圖經蚌殼湖前月兹晨濫寵嘉恭承天語侍文華片帆容易幾千里獨詠西風野水涯高郵湖長空漠漠水雲平北極風高一舸輕菊有黃花歸夢切青山日計撫州程孟城驛高栁收帆處平蕪縱目餘都將今古興盡向驛樓書即事船頭船尾富歡聲高挂雲帆四體平免牽纜之勞時見南陲山隱約明朝定擬到金陵發儀真埧上停篙立柁樓江邊解纜别真州滿懷秋思無心寫獨看岷峨萬古流舟中見紅樹船頭時作望鄉吟難寫浮生去住心忽忽不知為客久誰家紅樹報秋深白螺磯柔櫓和鳴人力齊急流競渡肯遲遲試將衆理依斯看萬事心同不足為牽路宿上元地江北郵程晝夜貪寒蘆已喜屬江南青山門巷無勞夢消得東風幾日帆題淡然卷子東風紅紫競芳菲萬葉千葩恐後時誰道太羮玄酒味却能醫得兆民彛發石頭城舊遊歷遍問歸程晴色東風一舸輕楊栁堤邊吟望處青山猶是石頭城板石磯紅葉黃花歸興濃青山夜夜夢巴峯磯頭記得蕃昌路西日一帆蘆荻風次荻港漠漠寒蘆一港通衣冠迎候禮從容已陪徐步鳳凰嶺更與遙談獅子峯晴蕪眺罷事霜毫點染秋雲散海濤餘興歸來眠未得蘆花寒月滿江臯十里青山與廬山相對羣岡聮絡接銅陵何代流傳十里名隔岸翠屏相映好片帆歸詠正秋清銅陵舟中歸心日日數郵程楚水吳山次第迎安樂有窩時有限只憐無計答升平梅根次辛丑嵗詩韻輕風疏雨送微寒淡月疏雲泝急湍年少舊題今白髮浮生猶幸一身安重修余忠宣公墓堂詩并序劉清廉文之參政四川也經同安付白金於懷寧丞胡詮助修余忠宣公之墓并敘禮之堂詮以訟之麗乎罪者役焉民不勞而事集云詩曰薇垣參輔隆風教花縣郎官尚典刑顧我疏頑何似者敢將名姓汚丹青胡二令索詩題尊府方伯公一曲軒畫省高車久已懸花封才子正青年鑑湖一曲幽棲處明月清風水拍天同安即事幾日扁舟繫淺沙獨吟夜夜夢燈花青山賸有平安侣頻説天邊客到家鄱陽舟中詩卷書來興轉佳好風應念客天涯明朝再假一帆力指日琴書可達家進賢道中詩思鄉心共落霞連村紅樹勝春花少年髣佛曽遊處獨立蒼茫兩鬢華蔗林夢回夜半候雞聲時聽舟人問水程明發揚舲過百里好山却看故鄉青謝家埠連檣金鼓氣飛揚共喜郵程近武陽詩興無端吟不徹霜林處處奠紅芳奉陪天使金陵王侯遊山十首皇華亭皇華曽喜見名亭使節重臨勝倍增愧乏長才歌盛美漫將下里頌升平集慶亭集慶當年衆所誇四民重喜拜皇華一壺春酒供多興歸從如雲擁鼓笳天使亭簫鼓喧騰日正融蒸黎滿路慶時雍旌麾隱映紅雲表天使重臨天使峰綵雲亭綵雲亭子碧雲岑舜日重霑雨露深紅樹溪橋春似錦髙吟細寫北來心駐節亭遙傳天語下青霄使節榮瞻駐此橋燕喜有筵供勝會舊家文物話唐朝塔山窮鄉誰道塔山名惟是樵歌牧笛聲豈意逺承天上使翩然下此駐霓旌石溪先隴石溪橋畔蔚松楸疊鼓清笳導勝遊好是丹青難狀處百年心事共春秋石原清明風日小春天旌斾翩翩會石原借問皇華輝映處升平文采萬人傳蘿溪重慶亭雪窗螢案飽儲書兩沐旌旗奉使車請賦新亭留勝迹畫簷髙映緑蘿居赤岡赤岡斜抱小陂南鄉邑流傳富美談紅葉清霜風日媚送迎天使此停驂送天使王侯回朝綵旗聨句九重雨露堯天大萬國衣冠舜日明草木光華南服重風雲慶會北歸榮康齋集卷五
