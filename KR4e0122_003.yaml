body:
  text: 康齋集巻三明吴與弼撰詩元旦枕上作壬戌升沉榮悴信由天莫以私心攪自然人事盡時須委命春風隨處詠新年奉寄家兄客裏屠蘇嵗又周詩成無使悵悠悠春風偶得家山鴈漫託鄉心達故丘寒夜有懷九韶同不肖奔喪金陵昨夜寒忩寐不成荒迷却憶舊遊情孤舟反側天涯夢千里勞君兩眼青洪都抄書藁發新莊渡雲天雨歇亂山青新緑添江一棹輕前後衣冠催上道春風共作寫書行船頭與璿慶閒眺江天冥漠艣吚啞雲樹烟村野鳥斜船頭驥子時同坐久話令人忘算沙宿萬石渡示璿慶及諸生枉渚平林烟雨昏一篙春漲泊柴門吾伊莫使新功緩共擬青燈入夜分舟中小立晴色微開逺近山倚篷閒看鳥回還數聲柔艣蒼茫外又載吾伊過别灣鍾陵城南江畔江城終日雨如麻病骨侵陵暖尚賒晴色忽驚春似錦偶從此地看桃花九蓮寺即事竹樹深深隔世機野人心事幸無違簡編隨意閒舒巻盡日春山獨掩扉承大司成先生惠豫章文集抄録已完偶成鄙句閩學淵源夙所欽遺編伏讀更沉吟餘生茍得分毫益總是先生嘉惠心南浦登舟漫託城南十日居禪窓松竹共清癯桃花晴漲移歸纜載得新抄幾巻書發南浦杳靄江山逺近樓桃花晴映緑楊洲滿船盡是青衿客誰道春風非勝遊豐城史郎中宅桃李春風訪郄林青燈猶記舊時吟圖書滿目人何在萬里淒涼瘴海心史以叅謀軍事殁于交趾宿龍潭微雨沾鞍風滿襟長途無使客愁侵天光雲影投裝處流水髙山是我心宿吉塘令弟遥迎自豫章難兄縁道候行裝春風共喜新晴好問水看山到吉塘宿樟鎮靈峯寺遥攜稚子訪名山多謝朋游伴往還幽意更便良夜宿光風霽月滿禪闗别吉塘數家春樹鳥闗闗幾處青青雨後山勝槩倚樓人欲别詩情多在有無間經天井晴指家山路時詢天井名春風迎馬首投轄二生情重訪傳秉彛日明風淡艣柔和紅樹村村逐望多笑指竹林曽宿處遥攜愛子抱琴過宿沙溪紅葉西風逺盍簪髙堂清夜共瑶琴長歌不覺詩狂甚一寫平生慷慨心宿龍溪燈火歡迎不憚勞夜深輿馬度江臯虚忩一榻平安夢人在春風醉碧桃宿金雞城前紅葉歸心剛似飛相逢尊酒别遲遲衣冠淳雅江山勝到處何妨一賦詩宿五峯歇鞍遥自客游歸寳篆蘭膏處處宜促席細聆眉壽話和風甘雨共忘饑重經彭源李原成先生之居舊德鄉邦夙所推爭誇玉葉映金枝風流雲㪚客來晩立馬平橋獨步遲自赤磵先隴後嶺循北原豐稔坑以出偶成絶句童冠嬉諧歸去遲山風淡淡日斜暉登臨自愜平生樂杖䇿摳衣忘渴饑游東山原成先生老年久教授于此貪看形勝不知疲徐步東山話昔時流水髙山人已逺尚餘清韻起遐思别湖田際曉晴開一葉舟故人髙誼共悠悠回頭却憶沙頭别寒菽糢糊烟樹稠宿山家隔嶺望叢筠方塘宿白雲客心清不寐絃誦夜深聞雲峯寺即事松竹禪房深復深雲和夜度玉泉音泠然共得惺惺法記取銀燈不寐心宿曰讓宅杖策歡迎荷老親候門稚子總欣欣獨憐霽月光風夜白雪陽春憶逺人訪楊德全致政歸罷郡歸時已白頭杖藜日看橘林洲客來若問浮生事明月清風酒一甌宿厚郭胡氏烟外微聞欵語聲馬前徐問二生名回頭喜接平生友擁道難勝盛族情緑酒歌酣霜夜月青燈人在玉壺冰巡簷更數髙居好勝水佳山眼倍明留别樟溪王大邦桑梓連隂三百春重來謝别訪髙門白頭相眷無他屬剰買詩書教子孫宿城南慈慧寺㝷梅問竹繞城南喜得幽棲寄此龕詩罷杳無塵土念怡然清夢入春酣城南識别滿寺衣冠霽色開青春華髮映蓬萊鴻爪雪泥他日夢江雲渭樹總悠哉題臨江寺霜蹄輕㨗快晴光古寺時耽野趣長乘興不知沙徑永題詩人在水雲鄉石井山家清溪詰屈逗雲蘿白屋青烟緑樹多散馬平岡人待㸑閒教稚子度雲和夢中題畵龍混闢乾坤動揺山嶽霧雨幾千年雲雷看一躍冬日拜五六府君墓二首斷續崇岡野渡傍朔雲寒日共荒涼刼灰容易成今古文獻凋零事渺茫郭五名存事已非斷畦荒塹一凄其黄成雖有衡茅在欲問前因總不知郭五前時吾家牧羊者黄成係近来看山者奉别族里舊鄉三載頼周旋歸興朝來已浩然莫怪迂踈臨别語人間萬事讀書先宿櫟原移居又喜入青山跋涉惟憐僕御難風雨凍途蓑笠憊茅齋烟火暫開顔復居小陂省墓歸來二載餘青山緑水復相娛兩鄉故舊皆青眼何處人烟不可居元日感懷山川依舊嵗華新又見紛紛拜節人昨日兒童今皓首蹉跎羞看故園春偶成病軀倦長晝出門俯清湍倚笻坐濃樾支頥不勝冠遥峯餘竒觀綌袖長飊寒呼兒授新句孤懷渺雲端遊羅山流水濺濺石峭稜天風嫋嫋景和平慇懃不惜躋攀力絶嶺須教一共登宿石橋宗人家遥遥西蜀出長垣具宣公居西蜀唐長垣縣男吳競之後奕葉青雲鄉名幾百年今日石橋樓閣話青燈緑酒悵前縁示兒病多自愈憊夙志竟成空所屬惟吾子云何不着功次任教授見寄詩韻獨憐樗㪚濫時名何意珠璣落玉京側喜滿城新教化男兒端不負平生奉寄族里琴劍南來接孟隣四橋桑梓託情親三年舘榖春風裏誰道今人乏古人贈别周圻欲寫離情久倦吟一尊聊向菊花斟懸知南北天涯夢總是平生舊好心次任教授倡義哀賻葬余忠母子詩韻兼輓生焉泮水横經屬老蒼餘波重被困窮喪位卑正憶兼山艮河廣俄驚一葦航白屋伊威從壁立浮名蠛蠓任天荒我歌漫答仁人利勉爾遺孤勿太傷除日祀先病骨支離不自任强將清酌共兒斟恍然今古淒其處老淚難勝罔極心除夜獨坐久坐寒爐頻自撥倦來嵗酒不成斟細看萬事無能處空憶平生慷慨心牧歸途中作乙丑夕陽歸馬正從容出峽時迎入峽風無數好峯羅逺近朗吟身在翠屏中贈王九鼎丹成還郡兼柬任郡博任以御史教授職歸騎翩翩大藥成野花啼鳥踏新晴繡衣時問衡門舊老鬢蕭疎學養生又贈九鼎離坎功成恊太和微軀偏幸得春多何由廣假回生手徧起羣生逺近疴雨後神嶺晚眺烟收雲歛夕陽殘髙下青松逺近山白鳥自飛人自度箇中真意憺忘還贈鄒丘王三生送送城西道踟蹰故意深一杯西廨酒聊贈白頭吟題牛氏慈侍堂予昔假舘牛氏皆未有子今子且冠矣髙堂綵戲壽如山簾幕春風燕語閒今日老萊頭復雪庭前依舊舞斑斕重宿寳應寺彛公房玩水看山偶獨來西風重厯舊樓臺光隂一紀如旋轂又聴晨鐘動老懷留贈胥經厯與先君向厚小子交亦深連礬錦里偶經過華髪青燈叙舊多更欲細聆先子夢何時飛斾碧山阿贈牛昇昨日追㝷今又來好懷端為故人開慇懃更有平生念羣從何時訪翠崖徐陂道中作客秋風百里歸重岡歇馬步逶迤觀生恰喜心無事緩數雲峯獨詠詩送陳庸從軍江浦慈母新成遊子衣離歌欲唱意遲遲四方總是男兒事忠孝惟應兩勗之遊西京赤岡故郡遺跡羣峯崒嵂走銅陵疊嶂蜿蜒落故城人去山空年自换十朝興廢一棋枰同王九鼎省石井先隴故郡城頭話幾朝飄然石井又聨鑣髙吟共得清秋興斜日不知歸路遥九月壬午承王九鼎同省石井先隴罷宿惠民藥局丙丁夜虚堂隠几偶思及之因成此句江山隨處倚髙秋一榻時從藥局留明月滿城更向寂緩攜兒子語街頭樟溪即事一上層軒味自涼虚明更得讀書忩泠然睡起閒開巻白雪陽春四五章重宿白楊寺䇿馬平橋又問禪萋萋春草月娟娟蕭然一榻平安夢夜半溪聲落枕邊宿旴江郡庠迢迢去鄉井長途日可畏朝辭白楊阪莫厯旴江涘一枝失所託行邁更靡靡挹此泮宫賔傾葢良偶爾舉觴叙前縁剪燭開新製古人誠我師匪難固匪易誦言曰惟熟析理尤宜細仁哉後獲心正誼寧謀利俛焉日孶孶汨汨川自至自慈明寺東遊龍安鎮靣靣春山涌翠華灣灣流水漲晴沙客懷却喜東游好髙下樓臺逺近花慈明寺即事倦客懷歸歸路難禪房起坐養衰殘忽驚青嶂嬋娟月拄頰微吟獨倚䦨宿南城邑庠風雨長途倦歸懷日浩然息肩芹水上端為廣文賢寄題程氏春風亭獨對寒檠事短吟有懷偏向故人深却因華扁生新感惆悵春風萬古心東忩獨坐有懷先友秦莊仲綸舊遊久矣悵晨星溪上梅花嵗又更寂寞柴門多病際平生雙眼為誰青擬錢塘懷古朔漠心旌日夜懸義旗遥駐此山川只疑春物芳菲處莫是人間别有天恩隆義重是君親忍着南冠一水濵頓首無衣誰氏子卧薪嘗膽迺何人題芸閣示小兒璿慶幽偏特啓芸香閣閣上工夫忙未忙從古共憂時易失前程誰進日無疆光風霽月濓溪上瑞日祥雲洛水陽户牖盤楹思有戒拳拳餘意託新章題雪忩示璿慶篤志宜師古深功貴自今弄丸元是熟添火戒非欽厯厯聖賢對昭昭上帝臨老懷何所禱細寫雪忩吟題立雪齋總總誰無無極真可勝師道日淪湮民生三事元如一何訝當年立雪人題樟溪書屋桑梓隂隂接種湖湖邊心事寄俞都從予授書風流雲散春光莫幾對溪頭夜月孤題烏岡别墅烏岡元與柘岡連卜得幽棲慨昔賢棟宇漫題新嵗月烟霞仍是舊林泉髙山仰止從吾好明德惟馨自古然勿藥㑹須乘興去為君細和武夷篇題耕樂軒風景依稀似有莘東臯榖雨滿春田箇中樂事人誰㑹日用由來總是天足成夢中絶句夢中成詩忘前聮放犢長村月正明歸來暫喜病魂清足成一衾幽夢春風裏又度良宵三四更夢牧江家坑殘經掛角日來遊邃谷青山處處幽積雨草肥黄犢飽吾伊聲裏一晴鳩江家坑偶成羣芳深處緑隂涼童冠相呼受講忙又與山靈添故事曽從此地説匡章遊山自二峯尖黄家坪至連珠嶺盤盤樵徑入雲叢選勝㝷幽到碧空不意羽翰生病骨翩翩歸袂又乘風東坑幽谷山翁去日下搆亭為牧者避暑之所崖傾谷轉水濺濺物外乾坤自杳然待得嶺頭幽搆畢時時來伴白雲眠東坑幽谷東坑有幽谷邈爾浮雲端隂林白日靜石溜寒潺潺蒼苔人跡罕好鳥時綿蠻我遊日心醉閒謡澹忘還大畬岡望撫州城奉懷任潘諸廣文及五峯親舊亭亭古木轉繁隂拂靣清風晝滿襟坐接水雲城郭近新詩聊為故人吟題潘氏潭江先址時從官舍夢家鄉先址依稀事渺茫欲託孝思知有在潭江烟雨樹蒼蒼奉寄族叔父仲學先生遊子歸時親倚閭斑衣華髪近何如生涯隨分田園好日課諸孫讀父書懷晏黎二生予居種湖時晏海黎普為使金谿今亡七年矣風雨淒其客路賒君心無事我心嗟玉樓人去春寥落幾對青燈念子華寄黄錦章教授同安人江夏教授初識同安再㑹江夏同安烟柳雜晴川江夏清風十丈蓮城中雨蓮池此日相思頭總白幾時重泛剡溪船悼少傅先生少小親仁長事師講帷無復再趨期不眠此夜相思處敢忘平生刻骨辭贈吳生歸覲鍾陵白髪慈顔日倚閭青燈遊子正劬書朝來黄色眉端動乾鵲聲中慶有餘郡庠潘梁二廣文辱載酒偕往石井先隴小酌金石臺而還石井朝聨二妙來提壺兼歴古名臺長空溟漠收新雨含笑江山暢一杯除夜書懷兼柬子貞九韶溪上㝷梅歸去遲虚堂剪燭坐題詩精神已是龍鍾後涉歴翻思少小時幸得簡編常滿眼敢辭塵土暫侵衣家山舊有良朋約試向東風一問之戊辰元日溪上㝷梅雪乍晴溪頭流水已春聲呼兒旋滌芸忩硯凖擬新詩頌太平訪子貞九韶同話胡二宅簾户沉沉午夢餘新晴天氣景舒舒和風細拂家山袂半日清談故友廬追次少傅先生夀日詩韻花盛春城錦萬枝九天化日正遲遲運符聖德超千古身幸儒冠際此時晨捧絲綸歸玉署夕陪鴛鷺泛金巵宿齊預擬明朝值又悉丹誠向赤墀輓盛山人當年卜築鎮闗心緑水青山幾訪㝷不有高人符往古何由勝槩見于今圖書映帯供多趣松竹週遭已茂林却念驛溪雲黯淡芒鞋何處覔登臨贈婁諒歸上饒并序上饒郡庠生周文婁諒承其府主命來學諒得寒疾先歸裁此且贈其行云稚志諄諄在廣居賢侯盛德逺吹嘘獨憐樗㪚空衰邁麗澤何時重起予壁沼以禦獺諸生咸用力焉詩以紀其成躬事胼胝少長同忽於平地見崇墉溶溶春碧歌於牣不日還應懋爾功贈周文東歸日講殘經味正竒告歸情急忽依依人生萬事無不有細誦前賢素位辭程庸以種湖所書拙字及鄙句見示悵然有作陳迹依稀慨昔游寒忩遥夜意悠悠他年萍水重相念何處西風獨倚樓贈王九鼎還五峯四年三度款柴荆更篤良朋永夜情每度九韶皆在㑹别恨又添他日夢生涯何處一浮萍溪上偶成偶爾閒行繞碧溪梅花開處詠多時固知道理平鋪在方寸何容半㸃私元日懷感己巳長風半夜巻頑雲霽色曈曨映雪分又感一元新惠澤微吟隨處詠洪鈞哭黃季恒髙誼真情三十年老懷何忍訣終天茫茫石馬江頭路凍雨寒雲倍黯然石泉開田風雨瀟瀟小滿天四山蓑笠事新田箇中㑹得艱難意細和豳風七月篇病中有懷子貞九韶老病懷思只故人故人疾病總酸辛如何得似平康步選勝㝷幽處處親訪表兄鎻秉端伯仲九韶同飲二人皆辛未生同里同年齋更同半生多故各西東清談偶得三人共兩鬢蕭疎總是翁訪表兄章二伯仲長憶先君念母家慚予小子近如遐幸陪花萼相輝好更喜螽斯世澤賒小兒鳴琴竹樹交加轉午隂衣冠秩秩夜沉沉雪泥鴻爪他年夢記得從容抱此琴贈李生歸覲并序正統辛酉予自鍾陵假道湖莽歸種湖瞻坡陀之麓有族居焉後七年李生勗來請序其族之譜乃知其為大陂也回思舊遊隠約如夢明年李生游學歸覲裁此以贈云曽於道上瞻喬木他日遺文話大陂弔古未遑重䇿馬西風先唱覲親詞牧歸馬上口號掛角殘經一解頤秋風淅淅日斜暉㑹心偶爾微吟好又向清流飲馬歸九日同九韶飲子貞宅平生佳節嗜狂吟中嵗方知學養心不問菊花開與未無端新興為君深寄李宜之城北南莊入夢頻嵗華偏感老懷新孤吟輾轉寒忩雨尊酒何時共若人客夜述懷輾轉纔安枕屢驚金雞忽送五更聲江楓細雨斜風夢總是衰齡悼古情大同原牧歸後坊道中口占授小兒及曽正斜穿香稻度秋山細講殘經午始還幸際時雍身少恙明朝依舊此開顔題小塘茅屋并序予昔侍親太學識李君元凱於上舍稠人中李君罷官歸劍江先施以朱子感興之詩而致其綢繆願交之意繼以族譜之故來訪小陂時年幾七十矣虚心進善每見益親晉伯可愛豈欺我哉近與其族孫恪談迺悉李君平生誤愛且請賦其小塘茅屋焉嘗觀其世譜知諱琮侍郎府君為小塘始遷之祖又觀其先文知府君為有德之士所垂既裕嗣之者賢宜乎詩書其族愈久彌彰也詩曰茅屋何年占小塘宋元甲子幾星霜清門種德髙徴士紫誥推恩秩侍郎快睹雲來䋲歩武能令山水益輝光一經從此尤珍重日向蘭階迓百祥遊禪峯庚午孟春時物泰條風應新律良辰豈重來嘉㑹那可忽膏車飭謝屐小子伊疇匹四人為疇兩人為匹幽賞厯嶇嶔勝覽窮崷崒慕陶得自然鄙殷怪空咄詠歸歡未央重遊更何日遊南岡及下陂山水朝出蘿谿阪夕返蓮塘曲烟樹眺參差岡巒媚重復道泰物本小慮澹意自足山人留酌斟舊侣論心腹歸來羙清夜雲和暢寒玉小憩覺溪徐氏昔誦前賢傳今即髙人居奉親賢子孫努力躬三餘登黄柏最髙峯由聶家峯李家山而下小兒及亨慶烈生從局促倦埃氛游衍稀儔侣驥子能娛人慕韓躭岣嶁青天巻片雲春山霽寒雨杖策不知疲魚貫何容與遂躋凌霄峯徘徊以延佇長空極遐矚松隂相欵語日昃憺忘歸清風助髙舉牧黄嵐坑朝來抱微疴殘編減新課出門悵何之言歸無所作忽乘谷口興偶此崇岡坐契彼造化微覺我頽齡惰振衣發嘯歌烟村夕陽墮遊黄嵐坑桃李薫太和晴光爛如許寧知明日花不有宵來雨芳原縱游衍呼童供笑語徘徊緑蘿峯悵望清溪溆皥皥固同胞熙熙盡吾與悟彼靜者心樂此動時趣烟村歸去遲瞑色迷雲墅遊黄嵐坑微雨霽芳原㪚步春溪曲歡呼及童豎策馬驅黄犢入崦竹翛翛靣岡杉簇簇展我懷中書坐向林間讀不有巢許心那知箕潁躅但得風日佳朝朝來此牧牧轉岡頭搴裳陟崔嵬沉吟不知去塵襟頓蕭㪚逸興迷雲樹梅殘誰氏花麥漲朝來雨隣牧左右來往事更相語預期明日晴重作青山侣遊龍門七寳寺病軀愜初景動息頗自由不息風雨倦來貪山水幽穿雲路窈窕摶空行遭週危峯傑筆卓疊嶂翠屏稠契我遺世想遂此物外遊素菴題正統辛酉冬予歸自鍾陵息肩湖莽李氏南溟飭其宗以迓禮于從子世熙之堂崔氏文瓛翁古服來臨酒數行懽然賦詩而别後七年南溟脩世譜話舊小陂索素菴大書以歸又二年持以求賦詩曰一㸃虚靈天地參忍將至貴墮春酣請看天澤初爻㫖是我蓍龜與指南題厲齋并序予寓種湖時將拜頤菴胡先生於豫章李生恪在舘下屬兒軰致其尊府世熙及其外祖黙菴崔翁願識之勤歸途乃遂其請明年二公冐風雨復予劍水至則予去矣屢有期於小陂而翁向髦近世熙過我翁則物故俯仰疇昔不能不為悵然也茲賦世熙厲齋之詞雖以朂李氏尚亦有激於崔云韋弦何用佩諸身矯枉扶偏各有因細向堪輿觀萬物反躬皆足熟吾仁不寐愁來不成夢夢回心耿耿定力嗟學微長夜誰予警同熊生渤牧後坊因登絶嶺節候適清和田家雨新足芳林牧馬來露草萋以緑乃有儒一生吾伊䕃脩竹暢我仁知心躋攀㪚遐躅一覽長天雲真趣良可掬同諸生遊隂源山水夙所歆朋游固其好風雨雖滯淫窮源竟須到幽意蔚沉沉歸懷晴浩浩良辰不可常更擬山隂棹新堂即事平生山水心於焉得休卜一堂雖甚卑素意良自足坐看風雨來已喜無霑漉賦詩紀吾成古人有芳躅題凝翠字後游衍趂良時歡心慕浴沂飽眈山水趣書罷更留詩登連珠峯閣中罷鳴琴芳筵謝斟酌捫蘿一褰裳竒峯酬素約天風起蕭條山雨來溟漠時馳千里目四際雲烟薄㑹當斯結亭勝覽翔寥廓同諸生遊倒桐塍東臯霽甘澤我心日悠悠出門玩時物因之白雲丘行行不知逺遂厯羣峯頭浩歌酣萬態斜景風颼颼眷言顧諸子去矣仍夷猶渺然出塵想竒功歸一游沼上編茅為亭取程子秋日之詩名曰自得夜坐其中因成此句幽懷不能寐攬衣造新亭曲池湛華月芳樹還𡨕𡨕羣峯逺映帯一水近回縈坐久歡未竟夜逈氣逾澄寂感𤣥化微伊洛歆餘馨夏日偶成卧疴止衡門何以娛長日巻舒架上書游戲閒忩筆南畝課農餘東園薙蔬畢務我分宜然無勞知難必道泰身自亨作徳心斯逸長歌書座隅庶用箴吾失遊石牛埠時止時行任自然離離香稻小春天微蹤何足符佳夢自是民彛篤好賢贈别熊崇義不憚風霜跋涉遥翩然來訪白雲橋嘉賔盛處歸懷好茂對良辰話久要題李章勉學齋浮生事業易蹉跎百嵗光隂定幾何不覺秋霜空滿鬢玩君華扁謾髙歌擕小兒方家坪拜先隴曽祖妣顔氏祖妣章氏方家坪側接連塘二代銘旌託此藏孱薄每慚荒世德閫儀空感孝思長寄朱孟真教諭青春桃李憶成均兩造髙門劍水濵聞説軒車能我顧無端舊夢欲書紳楊溪故居童稚長懷故里居顧瞻茂草向桑榆溪頭細接雲仍話勉爾重新教子書曲岡道中疋馬寒村偶獨過壯懷莫景悵如何梅花滿眼無人問謾對虬枝一放歌狹原洪氏芒鞋又作葛天民童冠追隨五六人緑樹池塘投轄處梅花如雪晝如春雪夜偶成四簷風雪夜漫漫獨擁殘爐對嵗寒細憶晏庭詩思切是知仁者敢偷安中原橋黄氏憶年童稚飽經過半百光隂奈若何萬事悠悠空白髮一懷慷慨為君歌溪上偶成萬縁由命不須嗟遮莫飛騰莫景斜偶度小橋流水曲緩從梅下玩孤花康齋集巻三
