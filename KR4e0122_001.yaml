body:
  text: 康齊集卷一明吳與弼撰詩即事永樂庚寅年十九吟斷難成調塵編重繹尋興亡今古事精一聖賢心新月何時滿寒蛩無數吟夜深雙過鳥猶自戀髙林感懷人嵗恆難百光隂苦易過身心須㸃檢事業莫蹉跎豪俊今寧少庸凡古亦多要知賢不肖擇術在如何自警辛卯讀書悟至言反躬屢紬繹頗謂無他岐立可超凡域云胡心自戕作事潛乖昔俯仰一長歎慚惶竟何極乃知真切功不可弛頃刻發憤矢自茲羣邪當逺迹聖途雖渺茫敢吝駑駘力誠當通鬼神志當貫金石族叔父仲學先生春月承訪弼時賃房方定茲别數月矣有懷寄詩壬辰憶昨烟花暖正繁逺勞玉趾到山間寓居蹤跡應方定入道工夫總未閒囊裏有書供月眼樽前無酒醉春顔别來新趣知多少透徹靈臺第幾關臘月望日作欲到大賢地須循下學工文章深講貫道德細磨礱春夜癸巳十年蹤跡寓神州故國歸來更百憂事業有期空仰古浮沉無計却隨流誰憐白日難停馭自覺秋霜易到頭多少殷勤孤負也欲從何處覔同游宿白梅洲道傍茅屋是誰家薄暮東來一稅車敗壁不堪題姓字時從籬槿看秋花題柏己未潤色還因帶雨榮柔枝未許拂雲橫風霜莫厭多經厯自古良材老始成過南康丙申迢遞見危樓家家枕碧流山髙雲氣近江闊浪聲浮事業懷先哲英雄慨昔遊幾多今古興斜日滿芳洲寄梁訓導未到都昌縣相思先計程連綿官舍飲浩蕩故鄉情柳色雨來長梅香霽後清極知期待逺别語細叮嚀聞笳扁舟晴泊枉渚沙葦苖滿目稀人家夜江漠漠星橫斜東風吹鬢憐春華隔江誰舫寂無譁數聲悲響空中笳響徹碧霄哀更加悠悠緑水天一涯元日丁酉淑氣已回春晴光遍八垠學須年共長德必日俱新自得顔淵樂寧論原憲貧兩間期不愧敢負百年身贈别王上舍旅館相逢日春風二月初看花杯共把對月榻同鋪禮樂沾清化風雲快壯圖願公多令譽綱紀在人扶與友人夜話話盡情難極中宵眠更興古人俱已逝後進竟何成世路應皆醉吾儕豈獨醒幾回靜想遍無以答平生夢洗馬先生先生天下士遇我獨情親剪燭論心夜焚香讀易晨已私須盡克天理必全純惆恨春宵夢分明笑語溫雙燕春日營巢憶昨初開桃李花銜泥飛傍小忩斜春風一去無消息何處歸來更作家山中歌次王右丞韻地寥敻兮山深聊棲遲兮林木欲寡過兮身輕日往來兮幽谷行愧今兮交疏心悲古兮趣獨理桔橰兮灌園更搴蘿兮補屋晨光淡兮觀魚夕陽收兮飲犢居從靜兮積塵嵗願豐兮登榖戒迂學兮徇名嫌荒志兮干祿惟造道兮是期何富貴兮可卜山行野水荒村僻雲林細路斜晴松張翠蓋秋果熟丹砂悵望淹鄉曲蹉跎改嵗華西風吹薄袂興緒繞天涯訪胡徴君館所行客林邊至髙人籬外迎逺乘今日興細話舊時情涼夜一樽酒清秋半壁燈相看驚老大蹤跡共浮萍雨中漫述違侍親庭逺遷居此地新往來多故舊問勞總比鄰屋破長防雨天寒早閉門卑棲聊自慰圖史共朝昏松下倦來更向山中憩滿徑松隂白晝長藉地不知孤坐久遺編又誦兩三行感興戊戌月到芭蕉影半斜好天良夜興無涯金風聲滿千竿竹玉露光生一砌花寫懷悠悠萬古愁瞑坐無一語志須自强持仁擬誰相輔蕭然環堵間沉吟寸心苦荒村秋思多斷續芭蕉雨登擬峴臺城據東南勝臺分襄楚名人烟縈近市竹樹雜長汀愁逐登臨散神因眺望清窮通看萬物未易達浮生贈戴錦舟先生尊酒黃城夜交期是偶然文章元共賞談笑劇忘年近臘梅初放凌寒菊正鮮同衾坐無寐髙興兩綿綿題四景畫草樹風暄翠欲浮洞門深處野花幽素琴不許間人聽山自巍巍水自流瀑洗層崖淨世塵隂隂苔徑足南薰日長誰是山中伴袖手前溪立白雲西風紅葉繞苔磯水冷烟寒鴈正飛浮慮盡消身寂寞得魚無意起竿遲村雪寒凝夜色浮清江如玉著扁舟風流自得天然妙心跡何曽泥去留墨梅寄同安李宜之學疏才薄諒何為牢落塵蹤閲嵗時秪有梅花共心事便風吹向故人知曉己亥曉夢初驚覺春禽已亂鳴北風半夜雨東旭一忩晴道在心偏逸詩成氣轉清行藏信隨遇庶以達吾生題歙雲詩卷歙雲南望逈親舍孝思深川陸幾年客晨昏千里心春風隨使節夜月照行襟養志古來重功名好自任送饒提舉之官廣東奉節承深寵之官過舊鄉親闈春廣大宦路日舒長嶺樹連雲合江流過雨涼倚門應有望鴈信好頻將讀罷隱几初收卷巡簷更出行晚雲隨雨散霽月近人明客久無違性身閒獨稱情榮枯何足問清白是家聲睡覺午枕睡熟餘情神喜宣朗忩含白日靜座納微風爽俯披聖賢書遺言如指掌至理諒易求良心貴有養安得同志人輔我加勉强送嚴府判考滿柳緑繞江頭薰風快壯遊萬山辭楚徼一水接皇州郡劇民俱化銓明課最優垂衣圖至治清問有嘉猷簡戴錦舟先生筆硯長為伍思深趣轉清看雲閒隱几聽雨獨挑燈俯仰求無愧窮通不繫情客邊微恙在襟抱貴和平山中即事水自幽偏山自深竹忩花牖晝沉沉逢人若問浮生事半是閒眠半是吟曉出際曉出柴扉清涼過雨時落花香滿徑芳樹緑成帷鳥哢有餘暇水流無盡期值豫道心長歸咏正相宜遊廣壽寺後園新竹多垂籜髙花正滿林雲蘿穿屈曲苔徑入幽深翠積叢茅暗青交雜樹隂劇便新結構端稱讀書心秋曉風來夜枕寒雲生曉忩雨旅思共秋清遙思故山侣夢友園林到何日羈旅念離羣擾擾一旬內依依兩夢君秋風黃葉下晴色白雲屯應有詩三百心期欲細論柬陳進士獨憑吟凡坐清朝閒看行雲靣碧霄忽憶故人秋寺裏西風琪樹雨瀟瀟彛公房入院先看竹逢僧不說經白雲方丈室清晝一孤燈積雨勻秋色殘陽報晚晴去留無定跡香盡拂衣行寄湖西族叔父仲學先生茅屋石橋西相親記舊時青燈近人早明月上忩遲物理推今古人情較是非笑談如昨日寒暑幾推移贈别友人惆悵一年别殷勤百里來冰霜苦節在宇宙壯懷開白雪傳新卷青春遞客杯紛紛楓葉下獨伴野人回閲九韶吟稿髙枕微吟罷西齊獨坐時閒澄病中思細看别來詩㸃竄非吾事漸磨貴自期靈臺宜有養孟子浩然師别湖西送送長村外新詩詠不休浮雲日色薄隨地露華稠曲徑緣林轉深溝帶葉流家山應暫住更得話綢繆同鎖秀才道中即事桑梓常留念蹉蛇今始還行行減客路望望近家山膠漆故人誼風霜游子顔何能謝塵鞅髙卧白雲閒題庸軒物理本平常人心自渺茫細袪今古惑多漱聖賢芳風月清江曲園林古縣傍悠悠百年興良與此軒長禪嶺即事傍險躋攀倦臨髙眺望賒天連蒼野闊樹帶小村斜晴靄山何處寒烟屋數家躊躇懷往事容易改年華與鍾生同宿東陂日落辭蓮塘東陂到已暝烟霧村徑微燈花茅齊靜細語夜卧遲月華發清興黃卷試一開琅然共歌詠夜訪九韶有客夜扣門微吟帶星立主人久青燈欣然肅而入勝境失追攀髙堂更歡集丈夫襟抱開塵絆嗟何及贈九韶我與生契家懇懇常告戒退而省其私立志能匪懈相逢索居後新知頗超邁深培仁義根勢利無芥蒂山居偶坐柴門下得與衆山友雨後已芳潤雲開更竒秀淡然忘我形不覺沉吟久却憶平昔居於茲幾翹首别九韶叔姪我心日悠悠喜與故人遇相隨更過村同遊讀書處研墨倩兒童頗得臨池趣青山一分手山留白雲去即事身外機事閒心地何優游晴行山水曲步遲境彌幽厯亂髙鳥過散漫輕烟浮遺編幸在手微意仍相侔遊南坑岡松邉涉幽徑天青雨新霽矯首立崇岡疊嶂羅迢遞塵慮都淡然二儀足清氣妙趣匪言傳飄飄離人世夜坐青燈夜已分遺編味方永一唱而三歎轉覺寸心炯麗水金最精藍田玉偏瑩云胡苦茅塞久未臻斯境即事風威遍野號雪花滿空墜誰謂惜苦寒正喜兆豐嵗紅爐坐終日黃卷靜相對至哉聖賢言妙契心自醉感懷孤燈讀已倦就牀聊偃仰平生所踐履厯厯時在想中道立苦難學問少勉强古人豈易期中宵獨惝恍讀孟子夜氣向虛朗剪燭更已深大哉仁義言沃我萌蘖心才質各髙下性命無古今聖賢懇垂訓而我何陸沉睡起庚子久客逢寒食芳年損病心幾時鳴雨歇終日落花深親夢凝官舍鄉魂繞故林晝長春睡起寂寂寫孤吟閒述靜裏生詩思閒中長道心自應尊櫝玉不省說籯金芳樹流春色空庭落午隂日和風更淡此樂有誰尋承葉别駕見訪奉柬二首忩下書生報門前使客臨形容驚喜定情話别離深風月江山趣氷霜松柏心平生覔同調幾處得知音白雪陽春調長吟莫厭多功夫既積纍律吕自諧和江海猶疏鑿圭璋藉琢磨人生誰不學志向各如何憶榮上舍江館春相遇鄉心晚益知青雲持節日短褐省親時髙誼能分祿空囊只贈詩别來消息斷幾欲到分宜買藥生涯惟病絆人事與心違嵗月一身晚江湖孤夢飛憂深多為道貧慣任無衣抱布街頭去新晴買藥歸即事欲識陽和景四時惟有春風光三月半霽色獨吟頻露葉渾如醉烟花不擇貧人心長自小寧解化工仁感懷易白顔回髮難升孔子堂常時思寡過終嵗未成章萬物人皆偹一心誰不良如何空潦倒甘讓昔賢芳絶句新詩盡日恣冥􅊧塵世悠悠任去留興到江山隨處覽不知身外有閒愁楊柳嬋娟楊栁枝烟雨涵芳姿託根近孤松蒼翠相因依頗謂顔色好可同嵗寒期豈知霜未墜素葉先紛飛圃內長夏日已晚歸鳥皆投林幽獨悅茲圃把書行且吟花竹流芳淨蔬果生意深兩間有妙趣長契靜者心四月四日客牀起復眠中心悵遐慕嗟我庭中親茲旦惟初度豈獨别離深鬢髮久垂素形留空役神迢迢滯江路宿章廣文館虛齊罷清話拂牀事枕席青燈滅餘燼斜月流素壁弟子富書聲感之增歎息沉痾久纒綿那由共茲夕贈章廣文俗情素寡合獨往欲無言伊誰寫湮鬱喜得章淡然絲蘿託世好金蘭契忘年青眼饒故意白雲多新篇顧茲蹉跎志懷古共勉旃茂樹古垣有茂樹婆娑廣成帷霜雪根本固雨露枝葉肥䝉密自昏曉靜愛衆鳥歸此物尚有容吾心諒何為月夜憶友人階除境向寂客思渺無依美茲風月夕正是懷人時欲叙平生心相見各未期百年若流水如何長别離題畫馬有客遣弟子持示雙馬圖丹青固妙筆所擬皆龍駒一龍嘶青雲一龍困鹽車逸氣含變態病骨森清癯既遭伯樂顧絶足乃得紓未遇善自保飽秣青山芻遊北禪寺入門聞花香傍砌看花色花香細而清花色潔以白薰風院深沉亭午人閒寂悠哉羲皇上著此忘機客棲鳳竹庭宇肅深沉蒼翠交梧竹衆鳥從紛飛時看鳳來宿送人赴春闈畫省身先達春闈氣正豪功名方自負關塞豈辭勞黃道中天近青雲北極髙臚傳知得意端笏繼䕫臯柬朱學正先生伊昔起豫深相逢久别心老成欣德重薄劣愧年侵夜雨添新思秋風憶舊吟正期談笑密還念欲分襟不寐寒鼓三更後孤衾未睡時無窮身外事逐一靜中思聖域何由入靈臺久自私疏櫺霜月白愁况漫裁詩覽舊遊髙樹春風花正開芒鞋曾記屢徘徊如今花落年光莫寒色斜陽又獨來山中見梅花茅庵深處路縈斜老樹遙看近臘花何事幽人吟未到遊蜂先已得春華述懷辛丑風雨春天曉江山客夢醒浮沉誰共慰出處獨含情得善慚顔氏傳經憶伏生經過人事略何意釣時名春夜千古興懷洙泗濱無由一接杏壇春自憐弱質生來晚空作紛紛世上人曉立靈臺清曉玉無瑕獨立東風玩物華春氣夜來深幾許小桃又發兩三花憶九韶春泥滑滑隂連朝出門跬步難逍遙陽和黯然舒藹藹風雨倐忽來蕭蕭客懷思見故人靣雲山阻絶誰相招故人隱居蘿溪曲殘書破硯甘寂寥奉親常懼歲月速學古不使子弟驕躬耕低頭秋榖熟擊壤皥皥歌唐堯平生於我誼不薄松柏寧向秋風凋愧我﨑嶇昧生理託身在處雲飄飄何時歸來葺茅屋與子共種黃精苖出城行行共吾姪誦詩出城郭白日皎青天風光勝於昨嶺外更峯巒村邊總花萼擾擾行路人誰識豫心樂新莊渡渡頭舟已發隨意坐芳洲白石聊為硯題詩蘸碧流道中作九首臨渠愛流水試硯涉還歇起看碎米花疑殘去年雪眺望覺日遲經過忘前後牧唱兒童閒黃牛滿丘阜叢竹夾桃花清池映髙下世上有丹青筆底誰能畫愛景時回立烟村淡相對惆悵百年人此心幾人㑹呼童汲清泚怡然坐臨池誰能知我懷細雨來催詩人生得丈夫萬一幸為儒寸心含宇宙不樂復何如紙筆不暫離琴書恆自隨欲憂身外事何日是閒時得詩萬事輕性達頻爵躍翹首吟未回松風度寥廓微雨已滑途行客未堪住遙問讀書齊正在花深處友人至獨繞烟村來共茲玩雲月細雨夜已䦨深意殊未歇曉起即事二首夜思經世務神倦方熟眠晨朝氣清爽良心還炯然條風暖雨來晨烟村𡨕漠北牖時獨開紛紛李花落録詩稿晴日鳥相喚輕風花亂飛紅塵休入户次第正抄詩客玩夜月靜來悟道機窔奧難言說但得此心安從處堪乘月縱步幽花發清香芳林漲新緑閒聽山中禽更倚籬邊竹友人至二首整屨欲有往故人忽西來盎然陽春懷共向東風開平生慕克己茫然靡所獲今日欣語君至樂頗洋溢覺後覺來氣宇澄開牖東林下缺月五更頭寒光皎清夜村中即事春光被四野行欣物華茂寂寂竹林邊幽禽語清晝胡十見訪客館值豫暫出承候迎村外遂相與叙舊同宿得詩六首歸步夕陽遲和風滿襟袖矯首清溪傍芳畦故人候梅花殘臘時訪豫五峯上詎知萍梗蹤春光此同賞我歸驚十年回首如信宿惆悵謫仙吟人生鳥過目憶子有立年曽與論耿介吾今越斯境事業憐安在既罷溪上遊復向籬邊坐夜景良可人誰能即髙卧交期相惠好青燈共斯閣話言雜今昔心事兼悲樂晝寢覺日淨風暄清晝遲緑隂啼鳥夢醒時間忩筆硯無塵雜幽事宜人又得詩讀中庸一理存乎靜萬事著於微是以君子心戰兢恆自持彈琴寂寥春夜間几閣孤燈照邈爾形役忘絲桐正清妙琴罷琴罷詩興來殘燈獨揮筆因識聖人心淡然何意必别鎖秀才覔渡臨清流故人更同舟細語昨日詩别懷總悠悠送送山之麓春花多躑躅長揖東風前浮生兩相朂夢嚴親江山久離居薄養那得及髣佛何處庭承顔夢中立天性良固有深愛成長泣涕淚泫莫收曉起衾猶濕牛氏東軒名花散竒香幽苔多淨緑清晝軒中人琴書自相續感舊遊石橋門巷落花深晴日光風鳥亂吟人事暗隨春夢换緑楊還似舊時隂柬徐廣文學問無少長立志夫何如勉强柔即强惰慢明亦愚光景勿云盛容易垂桑榆年侵勿自畫為仁果誰歟一私誠自窒蕩蕩斯廣居深切纍日月聖賢途豈殊勉旃黌宫彥勇往毋踟蹰莫嫌瑣瑣言素心不能諛上頓渡舟中驅馳年少未應勞萬事無心任所遭收拾琴書辭故郡江山隨處是詩豪夜坐雨滴空階響燈懸淨壁明掩書人獨坐性達正惺惺蘄春采芹亭同羅黃二廣文登名亭極虛敞英友携登臨石池湛寒水茂樹圍幽隂久坐得勝趣劇談延賞心薄遊慶佳遇因以書狂吟題一丘軒豫以客遊因訪故人傅秉彛于驛溪地甚幽僻林木森蔚翛然有塵外之趣豫極樂之秉彛亦陶然有以適其居也翼日相與翺翔村外既浴而歸指其居之東曰平生種田此一丘耳豫笑曰一丘固美宜以名軒秉彛亦笑而然之且請文以申其說鄙才不足以文聊賦小詩以復焉種此一丘田朝夕恆精䖍衆草不敢穢瓜瓞斯綿綿寄胡九韶去家已十日作客無盡期悟道達浮生浩蕩隨所之榮枯藐毫忽得失輕銖錙聞味聖賢道謾吟今古詩勝境多獨得佳興良自知寄言故鄉友身心善矜持謁濓溪晦菴二先生祠二首孔孟微言幾欲絶先生千載續真傳偶經靈宇增新感遺緒寥寥苦簡編平生慨慕古人深道味先生更所欽長恨無緣趨末席靈祠一拜儼如臨夢親欲寫離腸苦無言下筆難奉歡何日遂夢裏暫承顔登舟入楚步出湓城吊古餘前程又復即舟居客身到處無榮辱隨分蕭條兩篋書夢慈闈昊天罔極裂心肝遺冢荒涼不忍看魂夢豈知生死隔承顔浪喜得真歡即事吟覺多情坐不眠月光涵水水浮天櫓聲細與歌聲協又有西來夜泊船觀濓洛關閩諸君子遺像平生習迂僻人物常懷古自從堯舜來厯厯固可數降茲秦漢下無才繼鄒魯偉哉宋德隆夫子生四五日月麗中天逺近曷不睹人心一返正斯道朗以溥嗟我小子愚私淑豈小補偶從黃卷中瞻像慰渴慕因像以求心益自陶莽鹵不及猶恐失誰知此心苦㑹當寫斯圖頃刻恆敬負讀易夏日舒以長齊內深更靜正襟新浴餘肅容湛天性悠哉四聖心玩味頻起敬好風生坐隅竹色鮮相映淡爾絶外牽伊誰共佳興枕上絶句賢聖微言玩愈精夜分無寐獨惺惺十年醉夢迷南北一㸃寒山雪後青即事環堵蕭然隔世塵日長惟有簡編親青襟髦士時能訪出處諄諄話古人曉起即事人心秉至靈胡為自狼狽十年磨一鏡漸覺塵埃退清曉旭日升竹樹欣相對欲記丹青圖斯意恐難㑹黃廣文為僕趣裝客子去莫留故人情不淺離合焉足論事業宜加勉恆令此志存㑹見長材展賢聖以為師任重而道逺黃廣文城外送别迢遞步暑來髙情重為别匆匆話莫窮努力男兒節宿漸嶺漠漠暮林橫緑野澄澄秋水映紅雲逺來客舸依沙岸獨犬一聲何處村先生跋云此辛丑嵗歸自武昌詩也閲藁見之因感此景何處無之然必心中無事乃能見也赤壁懷古今日題詩處明朝迹又塵不知江漢水流盡幾多人大冶山中客路逢人問前程去已迷喚回琴劍侣斜度小橋西重訪盛山人舍館曽留宿園林今更過米嫌秋熟少苖歎雨傷多寄逺書應達移居事若何秋風涼冷後有待碧山阿謝家埠舟中即事憶昔扁舟久寓居客中風景自能摹重來幾换人間節佳興如今却勝初次梅根風色蕭蕭生暮寒月明催棹下奔湍孤舟繫穩更相勞又得長江一日安舟中即事緗帙收來霜夜分月中猶見打魚人始知各有平生分勤苦方能立此身荻港舟中寒蘆漠漠夜澄澄雲盡霜天月倍明欲問箇中深淺興青燈孤映讀書聲舟次蕪湖寄友地逈天清蘆鴈呼西風殘照泊蕪湖逺書不盡悠悠意努力人間大丈夫述懷平生蹤跡慣飄蓬短棹從教西復東借問鄉園從别後一旬清思屬中庸偶述十年勤苦學求仁品彚紛紜未識真惟有一般堪自笑行藏酷過古人貧舟中觀書憶諸生燈火夜常半工夫日又新濫追先進躅頻憶故山人凍竹那妨雪寒梅自有春此生何處達天地即吾仁别史儀部清譽聞來熟高情交更深青燈連夜話黃卷百年心斯道何難入深功貴自任匆匆慚贈紵惆悵託狂吟别李鳳儀途逢渾似夢驚定始開襟萬里又分袂幾時重盍簮詩書仍努力窮達莫殊心邈爾雲山外頻頻憶舊吟訪葉别駕消息猶難得逢迎更敢期寧知為客際重悉久要辭剪燭嫌更短連牀願别遲欲投迂闊分捨此復何之贈丁太常别駕僑居處頻過不覺疲喜通儀部好更辱太常知賤子慚何算明公貴有為聖途如指掌努力妙年時宿黃茅潭隔港日夕北風起停橈未有涯橫江欣得伴和月宿蘆花偶述欲遵君子業名教貴昭融能事參天地元基慎獨功板橋客夜達得浮生去住輕江樓遇夜旅魂清逺書作罷孤燈靜霜月淒涼鴈數聲除日書懷一嵗生涯不離書明年行止更何如男兒挺拔今猶古百倍工夫正屬渠除夜次唐人詩韻青燈幽户照無眠高興吟哦正浩然一嵗平安私自幸進修踴躍入新年西軒即事壬寅凍消殘雪早春回幽户條風任往來黃卷玩餘閒卧後滿忩春色數枝梅觀梅梅花滿眼感懷新正月俄驚十日春花落更開開更落小忩忙殺讀書人柬友人物物由來根太極等閒那得識其真浮生三十端虛度擾擾俱為夢裏人貧居盡日掩柴關黃卷青燈不敢閒克己轉知前日妄希賢愈覺古人難感興浮生嵗月易蹉跎交誼知心苦不多幾欲開懷難覔伴只應懷古獨高歌贈黃經厯先生竹屋長無鴈花封偶盍簮雨忩宵並榻雪案晝同吟往事渾如夢清歡暫稱心明朝踏晴色歸思各雲林題琴樂軒花縣東南里巷深髙軒清樂屬瑶琴緑隂簾幕閒中世明月階除靜裏心松韻正幽孤鶴唳海濤初定老龍吟山中亦有無絃趣茅屋何時肯一尋夢親癸卯夜夜春天夢依依只在親山中有茅屋何日泝歸津題三友圖桃李春晴錦萬堆蕭然誰數竹松梅不因處士開新畫雪裏何從表異材嚴親寄家譜至門外歡聲送喜來天邊家譜到山開音塵已隔半年後樂極猶疑是夢回南軒夜坐庭前詩已成雲間月未沒入户啓南軒無拘轉真率草木發天香遙夜清人骨奉寄黃浩中先生十年兩度侍西軒細語傾心夜不眠浮世别離疲野馬幾回懷古獨雲天月夜迢迢良夜月澄秋萬象清嚴風露幽安得人心亦如此廓然欲盡理周流題梅竹軒蓮塘南畔碧山連梅竹幽深著小軒接席好風晴滿徑隔簾香雪夜浮天題詩興繞賡歌際讀易心遊未畫前佳致幾時期我共為君細和白雲篇暫宿新居青山白雲裏曠然露平陸峯巒森逺近澗溪羅屈曲辛丑杪秋中相基䝉吉卜明年閏月冬於焉結新屋癸卯建未初移居遂所欲藩籬雖未稠斗室聊自足露坐天宇涼語笑偕僮僕共想古昔來誰人此曽宿東軒即事公事纒彌旬寸心靡敢放豈惟學古難人欲誠易蕩昨宵擬見官風雨不成往偶此東忩下暫然閒俯仰遍閲舊時吟靜思新志向疑似實自䝉伊誰一指掌洙泗跡既陳洛閩且絶響安得同志人靈臺期共養十一月朔旦枕上作立志成人自稚年中間鹵莾實堪憐如今轉覺人須學截日嚴程造白堅除夕慷慨臨除夕蹉跎又見春一年非不學何日是成人經事才還廣潛心理漸真微吟增感激名教定書紳傷農家甲辰秋榖應多減春炊固轉艱頻聞寒雨裏採蕨滿深山十二月十四日絶句弊廬風雨何曽蔽衣食田園給更慳積病寒忩塵滿眼始知無怨實為難始知無怨實為難至樂誰如孔與顔誤把古人輕昜看精修從此可容閒精修從此可容閒勘破當年義利關隨處動心兼忍性何憂不到古人班何憂不到古人班只把遺經子細看學久自然查滓化心斯廣矣體斯胖懼衰少壯空纒疾病過光隂况復迅如梭蹉跎容易入衰境此德此身將奈何寒疾未醒兼困於瘡廢書默詠朱子及陸象山兄弟鵝湖倡和詩僭次其韻先哲髙風悉所欽考亭朱子益留心滄溟浩浩吞諸水泰華巍巍失萬岑理極研精無窔奧形純踐履更深沉微軀每恨生來晚空慕聲容隔古今除夜一年程課更如何輕薄還因感慨多明日又逢新嵗月幾時能出舊巢窠元日乙巳回首流年一夢間靜思身世立應難工夫百倍須深勉莫把光隂當等閒正月十九夜枕上作自歎生來後聖賢下流入道苦難前何由養得中和性樂以忘憂理渾然樂以忘憂理渾然後生豈易造斯言斂然下學無他法一味深功克性偏書所得荆棘場中二十年中間回首實堪憐欲從何處求心性日用由來總是天舟宿陶婆灣夜半扁舟夢不成細將心緒繹平生人倫有道何能盡展轉無端感慨情贈九韶緑蘿溪上舊儒家修竹喬松去市賒南畝秋風多熟黍東園夜雨總肥瓜聖賢指示方應密師友相期路不差孝友一門斯是政讀書聲裏老生涯夜讀康節先生詩後作田圃工夫日破除小忩燈火夜詩書月華皎潔雲輕後夏景清涼雨霽餘百體無拘知氣泰一塵不纍識心虛從今莫惜殷勤學好古方能屢起豫夢傅秉彛一别那勝嵗月深浮沉世務阻相尋分隂痛惜平生志夢裡猶懸悵怏心午枕枕簟清凉午夢濃覺來鳩語太從容寸心似水無纎浪認取鄒書夜氣功夏夜月色嬋娟夜正涼偶然徐步稻花傍籬多竹樹饒清䕃池滿芙蕖有暗香寄九韶幽忩遺籍自朝昏盡日紅塵不到門頑鈍淬磨還有益新功頻欲故人聞月夜涼月清襟抱閒吟氣正和熟思剛暴性旦晝梏亡多夜讀後對月青燈讀倦閣遺編見月多情又不眠欲識此心虛妙處沉沉户牖嫩涼天省己希賢事業愧庸才煆煉磋磨志愈乖世澤厚深流慶逺道心連日得悠哉月夜雲盡天心月正圓可人清景屬南軒滿懷今古那能寐緩拭枯桐理舜絃變化氣質消磨習俗由來氣質已偏枯俗染彌深愈失初於此不加鏖戰勇却從何處著工夫觀舊稿十載飄零無定棲兩年幸隱此山扉詩書漸覺添新得心性還應勝舊時寄題戴氏水竹居勝日來良朋相招出茅屋壯觀窮名山所厯清心目山人白雲端蒼翠羅修竹鶴髮笑相逢坐談此君熟苔徑遞幽隂軒楹淨如玉塵慮蟬已蛻道心露新沐主賔偶一契題詩愜素欲徘徊話别遲夤緣看未足歸卧梅忩雲餘興猶可掬何當載酒來重尋詠淇澳有悟困窮拂亂力難勝天意分明增不能思到此心收斂處聰明睿知自然生除夜不惑無聞大聖辭如今秪有五年期譬猶萬里關山路駑足應須日夜馳駑足應須日夜馳丁寧莫枉一男兒工夫徹後開眉看萬里青天月出時康齊集卷一
