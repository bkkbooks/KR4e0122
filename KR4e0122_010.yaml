body:
  text: 康齋集卷十明吳與弼撰記厲志齋記事必有志而後可成志必加厲而後不怠蓋志乃心所向而厲則自強之謂也農之於耕工之於藝商之於貨莫不皆然況士之為學乎世之志於學者孳孳早暮不可謂不勤也其所求言語文字之工功名利達之效而已志雖蓋勤學雖益博竟何補於身心哉是則非聖賢志學之旨矣聖賢教人必先格物致知以明其心誠意正心以修其身修身以及家而國而天下不難矣故君子之心必兢兢於日用常行之間何者為天理而當存何者為人欲而當去涵泳乎聖賢之言體察乎聖賢之行優柔厭飫日就月將毋期其近效毋欲其速成由是以希賢而希聖抑豈殊途也豫年弱冠賦厲志詩曰夙興夜寐孳孳惟義矢有成人毋安暴棄當是時於聖賢為學之方頗得其萬一而自謂古人有不難到者不意多病侵陵與事乖忤而志益荒碌碌於衆人之中倐然十更寒暑此心一靈或興感於中夜成發憤於窮途日時既往悼道無成昔者之志回視如夢其悲歎之極蓋無復有意生於世也此無他志不加厲之過也友人傅秉彛名其子嗣裘讀書之齋曰厲志豫一日訪其齋命嗣裘請益豫感其齋名同豫詩也因告以自得之由與自棄之實而勉其不可不造厥極焉秉彛善豫言且請記諸壁云松濤軒記丙午臨川之屬境曰清溪山谷深邃泉石幽突於焉卜築者邑人胡伯恭也伯恭逍遙徜徉士田園足以供朝夕子弟足以服勤勞繞徑多松毋慮百株厥土肥沃而松益茂時天風驟興則竒聲異吹蕭颯林莽震蕩宇宙恍焉如黃河沸如碧海騰鏗乎咸韶奏鏘乎笙簧鳴揚揚遊遊而莫測焉聼之餘萬慮都消精神頓爽爰葺崇軒暢兹清致良辰美夕輒冥集明好而共其勝契軒中之趣者未嘗不心醉而忘疲起坐久而不知歸也軒未名或請於伯恭伯恭狀其似而命之曰松濤屬豫之以記之豫觀人心之感因物以宣感而正焉斯其美矣夫草木之鳴非不多惟松也不粗不厲不噍不悲是物之善鳴得聲之清者伯恭樂焉不亦宜乎雖然樂物者不徒耽其趣必有益於已也故淵明樂菊隱節以厲濓溪蓮藥君子是勗今伯恭於松濤尚思其清以潔乎心心潔而百行從可正百行正則人道備矣伯恭勉乎哉豫於伯恭有同郡之好而髙伯恭之所尚也於是乎言世美堂記武毅將軍伯崇寓書於豫曰先子暨崇皆不幸早孤賴祖母汪恭承先緒以至於今日奉養有堂願吾子名之且申其説以教我焉惟太夫人遐齡八旬而嬪居者五十載峻節凛然如一日柏舟之志亦何以加豫小子厠姻門之末尚仰餘光況子孫哉宜崇有以請也伯氏自元以來代樹武功詩書兼茂而太夫人繼以孤風逺操輝映後先奚啻景星慶雲之為祥麒麟鸞鳳之為瑞所以表著伯門非左氏所謂世濟其美者乎豫撮左氏之詞大書以復之而勉崇以修厥德敬乃負荷俾君子咸曰伯氏有子則所以孝太夫人者旨甘之奉云乎哉豫逮事先曽大父耆德之典刑先尊讀書太學忝侍筆硯之側太夫人養疾京師與給湯藥之役暮年多故江湖阻深無以寓其契濶之思逺書珍重何喜如之他日泊舟江浦拜慶稱觴於世美之堂又當為君賦焉唐山書閣記昔伏羲肇畫於龍馬之圖而文籍生列聖繼作紀載漸繁皆所以出治道立民極焉後世風氣日殊諸子百家雜出而塞聖途害人心者非一此文籍之弊世道之不幸也任道者每憂之所以正人心息邪説距詖行放淫辭者無所不用其極而後列聖之緒賴以不墜然自古有志者少無志者多知而信者恆寡能不為他岐所惑而卓然自立於斯道者尤難其人嗚呼世患不讀書讀書者又患不能以正而入於邪夫惟善學者必本之聖人之教居敬窮理以修其身真積力久然後知彼一切世俗之學舉不足為而吾所以參天地贊化育者其道𢎞矣唐山戴君子顒為閣於堂西子弟藏修其上而咨讀書之方於豫吳與戴世有通家之好而先君嘗事子顒大父於邑庠諸子姓又皆辱從遊其可無辭以對戴君不豫謬遂書以為唐山書閣記云饒氏世系堂記昔臨川饒迪功叔暘受春秋於朱子門人張主一氏遂世業焉彭原李中山氏壻於饒得是經以授先子而饒於吾外氏五峯陳為世契於不肖子為新好是以饒君景德命其中子烈長孫嶽之來學也豫不敢以常師弟子例視而烈情誼日洽告豫以其尊公將刻所續世系於石作堂於故址後嶺而奠焉於以致孝敬而合族屬願先生有以發之豫觀梅邊公之序譜也從論旴撫諸饒同出五代太守亮而旴有亮墓焉知未有亮墓時旴撫豈皆無饒氏邪又謂從兄楚林嘗之旴南象岸饒氏其老人語以塘坑乃其分派録譜歸而尋燬譜既無徵老人語未必可據為信且不聞始派之祖為誰事寥濶亦無足云云也惟曰遡而上可知者十一世而開迹塘坑者不可知是為的論又云族盛於建炎中微逮祖伯仲藏書萬卷譜云伯諱釜年十二中神童科仲諱鐆即叔賜年七嵗亦中神童科時號大小神童後之人粗知先緒者梅邊作譜之功也小神童公之曽孫熙壽俱事草廬吳文正公之門見草廬邵庵序記及伯宗吳公之志雪崖所續之譜而熙教韶陽時刻草廬所勉首尾吟於學之座右以敬勤師命云夫主一炙朱子性命之教而草廬亦聞朱氏而興者饒氏奕世師承若此孝子慈孫拜斯堂念厥祖寧不勃然以起邪殆必有以躡吳而企朱以侈塘坑之故事而感此心之同然於將來者不愈深乎哉麟經軒記昔孔子感麟而作春秋故後世目為麟經焉臨川饒迪功叔暘氏受是經於紫陽夫子高第弟子主一張公遂世業之迪功之八世孫烈遊吾門之三載懼先緒之或荒也乃偕從子嶽日與吾兒復討論焉豫嘉乃志為題其几硯之處曰麟經之軒先儒之説是經者有曰經世之大法又曰窮理之要有曰非理明義精殆未可學又曰必優遊涵泳默識心通然後能造其微嗚呼方䇿徒存師友非古安得神交心契聖人於千載之上以免於畫筆擬化工哉雖然豪傑之士固不以古今之異而二其心也刋落浮華一味道真俯焉日以孜孜惡知其不循至於灑然之域邪噫甚矣豫之無似而景則桑榆矣記此雖以勗烈而勵吾子抑以自訟云雙松堂記彭回者吾姨氏子也其奉親之處有二松並秀簷楹遊從之暇嘗求豫大書雙松之堂以壽其親親悅命來請記松之操稱於宣聖松之趣詠歌於古今賢士大夫固非庸草木可倫擬矣婭氏彭君敦謹謙信人也嗜朱子小學書居恆誦繹於斯堂之上焉回以從兄弟子來後愛教兼篤得代終之道者吾姨氏也恩禮媵侍復有小星之行焉不其賢乎哉以耽古訓之君子而配允賢焉無忝彼松矣是足書也彭君字九璋姨氏茶陵儒族王田推官玄孫云西廨彭氏祀田記彭君九璋修其世譜勒諸石而屋之為族譜之亭相厥成者賢配陳與胤子回也陳又以為亭成而無財則禮於何資乃贊夫子割田七畝供粢盛籩豆之費回以親命屬豫記蓋欲登降是亭者世守勿壞且益敦于禮以隆孝敬焉嗚呼世以賄徼福異端愚夫愚婦一轍也孰有若彭君祀田之舉哉記以為勸不亦宜乎孝思堂記人之生樂莫樂於父母之具存番禺陳生獻章方娠而嚴親棄世則不幸之大者也賴三遷之教中戊辰乙榜進士篤漆雕之信復淹吾館每痛鯉庭之永隔感孟機之多違聞者動心焉家僮之返豫為大書孝思題其白沙之堂而文以廣其意曰君子之於親跬步不忘于孝矧幽明之異侍養之曠哉然全其大必當略其小慈顔無恙伯氏綜家正自求多福之時也及是時悉其心以立乎已俾人知陳氏之有子先君為不亡矣陳生勉乎哉伯氏朝夕為我申其説於定省之餘亦足少慰倚門之況云一樂堂記豫讀孟子書至三樂章未嘗不廢書以歎曰嗟乎一樂之事君子所深願欲而不可必得衆人得之而不知其樂者多矣世衰道微甚至於父子不用其情兄弟相為讐者一何心哉善夫張子敬夫之言曰三樂中不愧不怍其本必有不愧不怍之樂而後有以全其二焉番禺何生潛其知言哉既以一樂名其戲綵之堂復承父兄命逺求不愧不怍之説於豫豫方愧怍之惟甚奚暇及於人邪無已則為申孟氏之旨與凡聖賢開示之方及踐履之實俾黃卷中自為師友以進也他日歸覲滿門和氣藹如春風一樂之勝天下孰加焉復為恕豫之無似而細道聖賢之心迹以為家慶壽未必不剨然撫掌於斯堂之上云麗澤堂記番禺謝生胖隨其舅氏何生潛鄉執陳生獻章來遊吾館資二生以輔仁豫嘉其氣相得而志相合也為講大易重兌之象而紬繹夫子體象之辭以掖其進焉兑之為卦陽實在下隂虛在上為澤之象重兑為二澤附麗之象二澤附麗互相滋益聖人謂天下互相滋益之大者惟朋友講習云然則講習云者辭章口耳乎管商老佛乎是蓋非徒無益而反害焉者豈聖人贊易之心哉乃若美在其中而暢於四支知周萬物而道濟天下斯其所謂益者與三生中謝年最少豫恐其受益二生多而先施或少焉故以麗澤大書於其筆硯之旁以勗之而特馳書其家山之堂以慰父兄之思云天恩堂記豫嘗題上饒周村周文氏之世譜先籍荐罹兵燹無所於徵當宋時莫詳何代有堂名天恩御為記亦復不存景泰丙子仲冬豫入閩迂道上饒訪文郡庠明日同造周村其族祖茂畿率諸子弟冒雨逺送森然舊家文采可愛也擁爐夜話僉請大書天恩後以顔其新構之堂蓋不忘乎君親猶元公周子之名溪焉元公之家廬道雖修阻而舊號乃著於所寓則故國池臺與夫松楸桑梓豈不髣佛乎朝夕而少慰戀本之誠哉周文氏距全盛時雖既寥闊猶幸傳聞故事得以名堂今日則夫先君典刑謦咳庶幾如在慨慕之餘又以起孝子慈孫之仰於無窮因微以致著推舊而為新其聞元公之風而作邪抑秉彛人所共而惻怛慈愛之意異世而同符哉是心也其天地生物之心乎驗諸日用之間凡非有所為油然以生者皆是心也充是心以𢎞厥德焉在周生固其所而族氏為咸宜惟繼序之益勤則流慶之益逺將見天恩之堂與周氏相為悠久豈直一時之光榮而已邪茍徒曰文具而已耳豈請者與記者之心哉雲居山房記左蜀安嶽之南有山曰雲居山之麓孫處士良迪居之居富良疇而家素裕處士幼孤事母孝克勤先業屋益潤焉讀書尚義濟貧者婚周窶者葬新大成之殿繕人里之橋能人所難亦處富之常道也彼嗜利之輩溺而不止者喪厥心焉耳處士之孫茂幼承祖訓賜戊辰進士今為春官郎中於吾妹壻為同寮且共西江之派以其故遇我特密春官子橘久豫寓館共兒輩學資性可冀繩武處士之積益足徵焉嗚呼世率有虛譽誣其祖者與不明不仁均乎不孝然則雲居山房之書可傳信耳矣山水之佳勝豫既未始遊固不得而書山房之細行亦在所略云浣齋記南陽李先生退食之所名曰浣齋自為記以浣心之説為答客之辭而下問浣之之方於豫非借聽於聾乎無已願有復焉竊嘗以謂身垢易除心垢難浣夫心虛靈之府神明之舍妙古今而貫穹壤主宰一身而根柢萬事本自瑩徹昭融何垢之有然氣稟拘而耳目口鼻四肢百骸之欲為垢無窮不假浣之之功則神妙不測之體幾何而不化於物哉豫幼承父師之訓嘗讀先儒釋日新之旨每恨洗滌工夫未聞焉又讀夫子贊易洗心之章聖人妙用未易窺測也於是退而求諸日用之間從事乎主一無適及整齊嚴肅之規與夫利斧之喻而日孜孜焉廉隅辨而器宇寧然後知敬義夾持實洗心之要法等而上之聖人能事可馴而入顧庸資滅裂弱志逡巡卒歸於廢弛自棄前功良可惜哉先生則不然才識學行既超等夷而遭逢聖明相吾君以永清四海者固平生抱負亦大丈夫分內事耳以豫之針為先生之禱且以就正云尚友軒記春官主客諸公名其退食之所曰尚友之軒屬豫記之豫假館是軒久資麗澤之益多可無言哉嘗聞覔名珠必巨海求良玉必名山君子欲成其德必先民是程也振衣千仞岡濯足萬里流卒之孤風逺操有以續前芳而激來世者非所志之大而能然邪是以人之生不患氣質之不美而患立志之不高豫也資既庸劣聞過甚晚年十八九時觀明道獵心而知迷途之當改讀孟氏卒章而知逸駕之難追每味聖賢言行於千百載之下而慨慕其精神風采於千百載之上恨不生於其時立於其門一蹴而造其域焉然志雖鋭未悟其方功雖勤未領其要中遭疾疹而定力不固事與願違矣回視夙心恍然一夢或食而廢或寢而興長吁永嘆不如無生逮夫血氣益衰精神益減時一動懷未始不痛心而疾首也此豫平生尚友之志止於如是而已嗚呼人無再少時無再來五穀不熟不如稊稗凡我同志亦有感於斯與羣彥不豫謬俾書軒之壁云軒之主人郎中孫茂員外郎秦顒倪讓主事孫曰讓張永也桑溪記桑溪周君子瓛學邑庠時豫嘗主於其齋又嘗一造桑溪而承親戚之歡蓋周乃黃倩而黃則吳出也後四十載恭攜兒子重上君子之堂拜先子手迹有云恨未一會又云惟力學以膺逺大末云甥女孺人粧次仁人君子於親親之誼固如是矣於時冬景融和盎然春候周君夫婦年皆七十而康寧子孫滿前細論疇昔琴一曲酒數行暢詠而别他日黃氏子良致二老殷勤謂不鄙桑溪而辱遊焉願為記之嗟乎雪山增重草木可敬豈欺我哉顧豫何人而足語此表桑溪者不在於周乎記以俟之節壽堂記界分截然之謂節文從竹可徵也人倫物理莫不有自然之節順之為貴凌則瀆矣世有節士節婦之稱非以其克順乎固有之天邪吾宗有字子堅者讀書俊拔人也配周氏同邑某人女年三十有三而嫠抱遺孤昂秉節不違天順甲申年九十而康寧昂請大書為壽豫以節壽名其奉養之堂鄉鄰觀者咸加歎賞為吳氏慶明年復屬族弟某請記洪範壽居五福之首是壽誠足貴也然躋其域者雖有康寧而壽者難節而壽者尤難記以慰孝子慈孫之心不亦宜乎墨池記傅君秉彛臨川驛溪人也永樂中豫訪君驛溪過於知我館穀歡甚間滌硯於池君躍然笑曰他日應謂吳先生嘗洗墨於斯也由是盛知驛溪之有墨池焉君逝矣嗣子裘欲立石池上求文鍥記之古之君子使高山仰止之心不能自己於數千百世之下者豈偶然之故哉或性命道德之純或文章政事之懿或節義之踔絶或遺愛之滂洋或功髙宇宙而不居或名揚竹帛而不有殘膏賸馥之沾溉流風餘韻之漸被冝乎入人之深而動人之切是以懷其人必有以重其迹覽其迹必有以得其心而歆嗟慨慕之無涯矣甘棠勿翦拜草木皆可敬豈欺我哉豫也立志弗堅為學無勇徒竊虛名以誑於世傅君不以靡薄玷斯也而反取其迹豈溺愛者不明乎然強顔受簡而不辭者所以表孝思之無窮而著金蘭之髙致抑使覽者知豫之不佞直以過情之聞誤友朋之辱庶幾反躬無蹈覆車之轍云恥齋記豫嘗慨古今人品之不同每若薰蕕之異氣冰炭之殊性隂陽晝夜之相反豈其才之故哉抑氣習然耶抑由其心之有通塞故臧否以之而判耶一有賢知非其生質之良必其務學之懿如江右僉憲吕侯是也侯之言曰厯官二十餘載事事不逮於人取孟氏之旨以恥名夫退食之齋日以自勵而下詢於芻蕘夫恥者吾所固有羞惡之心惟其梏之反覆而失是心也漫不覺知訑訑自廣人莫已若人欲肆而天理微矣惟侯之心其不自滿假檢身若不及之誠乎上而追友千古進善其有窮哉心一也勝於物則靈掩於物則昏人一也有恥則可教無恥大不幸企仰髙風恍然自失恨不痛䇿駑足遙攀逸駕顧兹歲晚徒傷噬臍古不云乎失之東隅收之桑榆尚冀抖擻餘魂迅改迷途以從事恥齋之後塵云蘭軒記羣草木非無香而蘭之香獨妙天下者非以其細而婉乎是曰幽香不類君子玄德哉稱尚古今冝矣永嘉吕公本讓種蘭以朂諸子善於為喻也夫子謂誰今巡按江西監察御史君洪也僕竊伏山林側聆餘韻喜而不寐近臨敝邦遣使辱書益歆風采可謂能子矣且以居竹㴠養大楷相命尤見用心之逺居竹先子故號㴠養今日良規念嚴訓之在目冝體蘭之加勉蘭之為卉稟二氣之清根既殊科香固絶倫吾人於學可不務厥本哉㴠養者立本之方也日新又新則積中者日盛發外者日著豈直播譽一時會應流芳百世增蘭故事為他日美談大丈夫當如是矣僕也舊學愈荒晚節彌怠悚望騫騰撫卷悵然坦齋記代淮府作水本平浪鼓於風道本平詖生於欲風恬浪靜而水得安流欲消詖去道得平鋪一補過之或吝則危機之是履矣善夫康節堯夫之言曰面前自有好田地天下豈無平路岐是以聖人之心如止水無適而非坦道焉君子之學舍聖何歸欲師於聖其廓然而大公物來而順應乎居敬窮理明諸體養氣集義利諸用而曰聖不可學吾不信也慈溪馮某伴讀於豫有志焉故以坦名齋致仕而歸也告豫言以為桑榆之警且以為記云省庵記無極之妙充盈宇宙而該貫吾心何可須臾離哉然事幾萬態大和難保不有精鑒以為權度難乎免於流俗架空之患矣甚則差之毫釐謬將千里安求其人心不死而天理常存也耶商書之省躬魯論之三省良有以哉竊謂動容周旋無不中理者聖隨事致省不敢違理者賢瞢不知省日趨小人之域如走者聖賢之罪人也不曰賢希聖士希賢乎大哉金侯希賢之志哉宜乎其民之多譽也俯省微軀資既庸志彌惰駸駸衰暮枉此生於醉夢企仰華菴徒增浩歎何顔受簡侯名銑字宇潤淮隂人今守上饒云思善堂記父子之道天性也其有不愛乎反是者喪其天耳是以孝子之於親視於無形聽於無聲況其顯者哉原闕其逝也嗣子永既屬題其墓文之蓋兼請贊其所寫之真皆未暇也復馳書千里俾記夫思善之堂仁哉其用心歟昔程叔子之於伯子也干志於持國干書於叔曼讀孫韓二簡令人三歎而不已張氏子汲汲乎惟親善之不傳是懼豈異世而同符抑秉彞人所共耶嗚呼流俗滔滔知德者鮮非徒忘先且辱親焉立身行道揚名後世幾何人哉張君早以髙科著聲郎署其為郡也澤加於民令聞旁達可謂嫓美前休矣然太山髙矣太山頂上不屬太山則君子之志固不可滿而事業豈有窮哉夫惟知周萬物然後道濟天下故君子貴乎仕而優則學公退必讀書也明公持英妙之姿當強仕之秋萬里鵬程髙舉在我黃卷新功數飛示焉蘭軒記蘭之産恆在幽逺而花葉淨素類君子暗然自修天香暗襲清人肺腑類君子德之及人心醉而誠服是以古今尚焉淮王殿下軒以蘭名厥旨微哉教帖逺臨髙辭典雅傑筆清嚴使者之誦曰乾乾朝夕羣經是耽其德與日俱新學與年俱積可不叩而知得於蘭也不亦深乎周惇頥曰道充為貴身安為富賢王之謂矣蘭哉蘭哉二而一者也中和齋記天順甲申四月庚戌淮王殿下遣使沐書幣命大書蘭軒梅月雪窠中和諸扁蘭軒既僣記之矣十有一月庚申復辱書幣不罪其粗鄙猶俾記夫中和之齋夫梅月之清味雪窠之雅操與夫蘭軒之德馨心融神會而收功於中和之極致穹壤之間何樂如之鋪張盛美宜有其人芻蕘之言何足形容萬一哉無任感恩激切屏營俟罪之至康齋集卷十
