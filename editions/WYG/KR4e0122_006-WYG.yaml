body:
  text: 康齋集巻六明吳與弼撰詩元生陪往寳塘小憇路口鋪己卯晴山聨轡日遲遲立春五日小憇郵亭啜茗時少長森嚴環侍好舊鄉細誦帝鄉詩宿下城丘孔曼先朝心事共春秋此日投裝話白頭莫把光隂牽俗態勉教孫子繼前修賜金墾田濫向文華辱賜金側身北望五雲深都將至渥歸南畝𤓰瓞綿綿萬古心親農歸途中次舊放水詩韻迎恩橋畔獨經過課僕西疇事早禾却憶去年今夜興淮隂去棹好風多坐沼上有懐京師冠葢倦抛鉛槧暫揮鋤浴罷觀魚聽鳥呼乘興不知吟坐久無端秋思繞皇都憶去年今日八月初四去年今日侍文華天語諄諄過寵嘉二度丁寧歸去後好書多做貢皇家憶去年今日八月初七去年今日拜彤墀天語温淳賜勅歸中使傳宣天使道好生看顧荷皇威憶城東寄餞行十友聨鑣接軫憶城東綺席珍盤别醑濃南北雲泥懸隔久髙情常在夢魂中奉寄夏官羣彦司馬羣英嘉惠深聨名錦軸重南金當時愧失摳趨禮别後難勝悵望心寄王經歴劉都事外氏零丁一轉蓬欲從何處問孤蹤盍簪得遂平生願總屬王劉雨露功奉題懷寧伯雙驥圖汗血俱曾成大功丹青凛凛著英風人間自有男兒事傑出方名世上雄競功雙驥大功成造父王良總擅名設使當年無伯樂何由千古著雄聲奉寄忠國公令郎君僑居幾欲拜蘭階多病因循愧夙懷翠竹碧梧霄漢逈五雲深處望三台奉寄廣寧侯二郎君曾接親庭花萼輝亭亭玉樹映金芝聖明文教超千古萬軸牙籖好及時寄太常高博士傑作鋪張天地心大音寥闊國之琛清風明月停雲處不信人間有古今寄太學鄭助教自古文章貴作家夫君當代富才華案頭夜夜增光艶留與兒孫仔細誇寄湯教諭麗句流傳衆所欽稱揚太過實難任雖云甚矣吾衰也餘齒猶宜座右箴奉寄南康郡侯一接沙頭金玉相時從舟子話龔黄幾時一鼓滄浪棹細和匡山白鹿章沼上芙蓉花開去年花盛客天涯今嵗花開人在家萬事只應隨分好不須憔悴對年華作逺書罷卧自得亭羣緘裁罷一身輕又向高秋卧此亭遥想故人天上夢可知衰病日伶俜拜表歸途中作記得重陽拜表歸乾坤清氣映晴暉紅黄山果驚新候又喜題詩野水湄青雲亭欲得靈䑓拔俗氛特將亭子倚青雲朝朝剰汲寒泉潤細㸃明時輔世文逰塔山去嵗兹晨發望江風㠶夜泊小姑傍來遊此地懷萍梗紅樹新晴候欲霜逰天使峯天使峯頭境絶竒重㳺恰近小春時晴明風景堯天媚安得情懷不賦詩逰綵雲山選勝歸時興未闌微吟更坐綵雲山出塵亭子休孤負湏把遺經日此攤寄郡庠陳廣文郡庠司訓陳先生兩辱枉顧山中有懐成詩敬以奉寄笑覽幸幸濫竊時名負愧多勞君兩辱碧山阿墨池泮水宵來夢紅樹西風寄短歌寄邑庠陳廣文不肖將赴金䑓時承判簿戴侯邑庠廣文陳君枉顧衡門不肖贈詩有滿賴餘光燭草萊之句别後辱陳君兩垂青眼久稽奉荅有懷成詩敬以呈上笑覽幸幸薦辱餘光燭草萊瓊瑶久矣負髙懷孤吟幾對黄洲月芹水清風不易裁至日嵗華又值一陽生豫汛庭堂賀太平萬壑金雞天欲􅍼四簷霜月雨初晴學隨年長嗟衰邁道與時亨荷聖明間傍溪梅尋嫩蕋新詩興緒繞虞庭逰三峯尖晴明又喜躡雲烟舊跡來㳺興浩然心事滿懷題不盡長吟囘首五雲邉賀吴營元氏駐節亭成積李崇桃燭令辰雙溪雄峙一亭新百年勝事光先躅千載清芬激後人題新齋壁莫懷端合惜年華莫枉閒工事筭沙收斂寸心歸寂寞芸編堆裡是生涯同邱孔曼㳺勝覽亭積雨初收逺岫明盈眸生意黍苖青偶乘佳興良朋共細詠新詩向此亭逰霓旌亭一歴青雲眼倍明羣峰聨絡自天成遲囘磐石忘歸去誰共斜暉俯仰情憶前年今日五月十六前年今日拜宸旒天語親承錫命優幾度忸怩疎薄質洪鈞浩蕩若為酬憶前年今日五月十七前年今日拜文華疎薄慙叨過寵嘉謝病曾無一字補可勝衰眼日添花憶前年今日五月二十二前年今日説中庸内閣羣英眷注濃分惠御桃嘗主客歸鞭姜米歩從容七月二十六日作流光一飛電夙志良堪羞末契何所託塵編日遮眸窻得竹林幽亭有荷池勝淺薄諒何為於焉託餘命車泰使歸喜而作山暝風高雨打衣敲門知自玉墀歸椿萱綵服千重慶䑓閣雲牋萬丈輝敬梅軒為楊侍講題雲塢瓊枝處士栽玉堂詩巻映三台肅焉敬止哦吟處難寫孤芳萬古懐憶前年今日八月十九前年今日急郵程時向街頭慨武城此際獨吟仍獨卧滿懷秋思向誰傾憶前年今日九月初七前年今日達龍灣人在滄江杳靄間夜傍石頭城繫纜舊㳺觸目是鄉關憶去年今日九月初九去年今日五更興旌斾翩翩度野亭精白一心懸北極肅恭拜表進虞庭覽戊寅日錄作竹窻時止亦時行誰共清風明月情忽憶前年今日興登髙人在石頭城沼上亭玩芙蓉花今嵗花開幸粗康雖貧却乃士之常秋亭玩罷歸來好竹影扶疎旭日涼憶前年今日戊寅十月十二日行李自金䑓抵家天使及郡侯臨川崇仁二縣官郡縣師生皆㑹於此前年今日荷皇恩冠葢盈庭客滿門霜鬢薦驚新嵗月涓埃未荅志空存逰山詩小春風景日清妍㳺衍鄉園又一年身幸平康心寡繫杖藜隨處詠堯天後逰山詩昨日登臨興未窮重㳺喜得數生同峯頭徙倚忘歸處詩在雲烟杳靄中寄萬叔璨赤磵松楸跡久荒薦勞青眼意何長瓊瑶未報身衰邁幾向南雲夢北堂北堂葢指叔璨母先生妻之姑也至日講堂朝賀金雞催曙鼓聲雄濟濟班行院肅雍迎福共瞻剛長日堯天歡舞萬方同即事偶傍溪頭詠落暉烟村清眺意遲遲低囘細憶前年興逐一閒歌驛道詩書鄭伉巻子畢偶成殘經講罷慨虞唐歩月歸來興未央詩巻寫闌吟更好又揮餘墨兩三行德政歌并序桐廬吕侯廷和宰洪之進賢期年矣甚得其民有儒一生相厥耆老顧予請頌歸率其子弟詠歌舞蹈於和風甘雨之中以服侯清化美事也重以吾邑令君李侯之命遂走筆以復焉陳子憲朱文貫吴志廣陳子寧者四老也傅海者諸生也歌曰我憶絃歌武城宰流風餘韻今安在懷古卓哉吕侯英妙年碧梧翠竹何娟娟念今却金海隅光使節寒露玉壺浸霜月形容清節牛刀小試鳴南州長天雕鶚横高秋丹誠烱烱慈仁父反風滅火并伏虎德政琴堂有教肅簪裾犴獄雖設期空虚省刑南隣北里童與冠含哺鼓腹相泮渙民安春郊桑柘漲叢叢秋原禾黍迷西東物阜隣封野人拜佳政樂與輿人共涵泳結上桃李隂隂清晝長牙籖玉軸森琳琅書籍列聖羣賢屹相向蓍龜指南如視掌聖賢示人之意無弗在𠂻河海何曾擇細流泰山固不辭土壤不自滿假百尺竿頭事若何濯纓一曲滄浪歌務造其極朱子云百尺竿頭更進一歩自求多福贈四老歸進賢花縣仁風日念兹黄眉衝雪到茅茨予攸好德何能爾信是人人共此彛重庵歌為陳子憲題借問仁者何樂山巍峩屹立天地間以木巽火是曰鼎君子正位以凝命浮生嵗月疾於飛庵中心事其奚為去斯二者將安歸蕭蕭華髪映黄眉不逺百里求新詩詠歌付與孫與兒奕葉仰止庵之楣除夜感懐曾賦山房一味清永樂壬辰除夜詩云誰家除夜無杯酒我獨山房一味清沉吟舊夢轉多情千山萬水迷歸路羞照秋霜鬢數莖同胡冕陳鳯宿路口鋪辛巳鄉情詩思共悠悠燭盡宵闌立未休記得丁寧簷際語好來芸舘話春秋晚坐自得亭春田課僕暫親農亭子閒來坐晚風幸得微軀能勿藥崇桃又見一年紅題程僉憲驄馬行春詩巻行行無用避桓驄霜雪何妨雨露功緣道生靈迎望處鐵冠遥在萬花叢題全歸詩巻為應公憲文題遍歴儒冠四十年榮膺上壽際堯天跬歩敢忘曾氏教臨深履薄日乾乾送原憲使考蹟赴天官清笳急管擁崇䑓萬里風雲接泰階花柳漫村春似海伊誰一訪少陵才重宿吕坊龍歸寺曾為松楸此寓居二旬風月體舒舒天上歸來重宿處青燈細看舊時書宿楊溪疾風飛雨宿楊溪虚室孤吟憶舊時不是本原深且厚雲仍何幸至於斯楊溪晩眺一水逶迤抱竹居羣峰稠疊映天衢遲囘獨散平橋歩二百年前是我廬拜山泉先生墓長從家集慨窮經述作尤深感至情巴岡遺隴低囘處飽挹山泉一味清立秋十七嵗立秋詩丈夫壯志須髙逺燈火辛勤貴自强茅屋秋風已滿林老懷却憶少年吟丈夫壯志今何似空感平生燈火心寄傅裘洗墨池邉佳問來月窻重感故人懷幾時池上翬飛好佇見新碑向竹開裘立墨池記碑覆以亭焉送傅裘北歸扶疾秋山百里來桑榆細寫别離懐式微歌罷情如海共喜新碑吉日開㳺羅原岡諸族姪咸在上下羅原岡上路西風斜日共躋攀新詩付與吾兒道奕葉當思繼述難重宿經舍寺重宿招提覔舊㳺百年心事在松楸江村送客歸來好明月清風詠素秋自楊溪過葛藤科港下歸鞭問葛藤名科山水總含情朋逰迎送秋江晚古渡寒流月影清曉枕偶成戊寅此日吟淮水辛巳今朝病故園時序暗隨生紀換寸心依舊五雲邊枕上偶成萬事隨緣不用憂好將行止範前脩當兹嵗晩尤宜惜獨對黄花咏未休戊寅此日九月初五戊寅此日度真州壩上閒書幾字留薄暮喜投揚子宿青山近接石城秋西逰藳辭家口占授諸生我去尋師適楚邦歸期應在日初長殘書破硯須深䕶跬歩分隂好自强先生擬拜舊師楊𢎞濟之墓狹原道中小春風雨路初乾又向名原話考槃却憶十年前勝事門前驥子蹤㳺觀宿北澤雲塢濛濛濕不開長途行李後先催前山寓宿詢名姓曾向龍潭問學來北澤道中濛濛宿雨又開晴僮御奔忙四體輕紅樹青山溪曲屈勝逰隨處是詩情湓源道中度㘭躡嶺一徐行囘首雙峰獨注清更出前村舒病眼時從牧竪得源名重宿墨池傅氏洗墨池邊正己堂問舟西去又投裝兒孫總解隆先執更把前題續兩行宿桂林冒雨衝泥宿桂林卑尊奔走事師心一壺春酒談經罷獨詠青燈坐夜深次前韻寄示兒到處虚名動士林平生孤負秉彛心過情却更憂吾子新造從兹冀日深贈進賢吕茂宰二首薄劣何勞誼薄雲野橋迎候度朝暾綿綿却憶宵來雨誰道荒村擁令君西去尋師學士家逺勞旌斾駐晴沙分岐細話男兒事珍重清芬百世誇題正心齋涵養工夫敬是宜鑑空之體本如斯須知道理平鋪在順應何容一㸃私宿三江口雨脚朝來又似麻問舟並午踏晴沙平林繫䌫推篷處星月交輝雜綵霞舟中獨坐次邵詩韻一棹初逢積雨晴客邊贏得寸心清地偏時喜北風軟天逈獨看西日明懐古正貪詩逸響可人更聽艣柔聲尋常自有無窮妙争奈浮生識未精舟中即事蓬户青燈照夜長觀星玩月水雲鄉候當小雪寒猶淺十月初旬始降霜風勁天髙夜已霜孤蓬閒倚面朝陽移灣細憶曾逰處静聽吾伊晝滿航萬石渡舟中抄書曾作豫章行記得扁舟夜此停異日重來頭盡雪不堪惆悵憶平生舟近豫章雙艣和鳴莫景横相將喜見豫章城病軀粗健何妨老隨處髙歌頌太平寄家書鄉人逢處話鄉心明發西歸送好音我在客邊安所遇家庭只管惜分隂船頭曉立檣頭曉對豫章城南浦西山是舊盟俯仰古今雲聚散新題何處獨凝情奉柬大司成先生令嗣未遂生芻一束忱白楊幾感老懷深金昆玉季停雲處攀折江東渭北情柬伍伯遜擬向髙軒一日留碧梧翠竹共綢繆覺來懶慢休相訝老病人扶不自由寫家書後作寄璿子二首今日慈顔值令辰滿門和氣想氤氲江山到處逢迎好不必多情憶逺人晏子傳書久達家諸孫親果任喧譁慇懃寄語青燈伴逐日新功好倍加又柬伯遜聞道高軒遲我過别離偏感老懐多片㠶豈不相思切其奈餘魂逆旅何不寐輾轉寒更夢不成細思時止與時行蹉跎徒有男兒志枉向塵寰老此生發豫章掛席西歸孺子亭小春陽煦快輿情滿懐今古憑誰問獨對寒山一帯青昌邑山舟中紅日銜山莫景明