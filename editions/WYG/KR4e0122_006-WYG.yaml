罷悠然對翠屏宿安定里昨日無所期今宵獲安定但教靈府虚隨處江山勝齊原道中偶逢澗石坐繁隂愜我平生習靜心風露不知勞逺役蜻蜓無數伴清吟題齊原嶺涼亭齊原嶺上架虹梁來往令人感意長嗣續更期諸好事好將名姓共流芳宿鵝湖寺疲軀暫息贊公房山雨蕭蕭午夢涼榮辱不驚清夜枕四更雲月吐寒光宿福生觀廣信城山郭逢時雨花軒納晩涼芙蓉隔秋水客子急行裝板橋道中玉山地遮眼避長風虛心省厥躬百年須為道萬事貴乎中草萍道中晨促行裝度草萍夜來微雨喜新晴望中總是雲山色吟處時聞野鳥聲白石道中白石當年曾有賦清秋此日更停輿囘頭火伴閒相語琴劍何時返故居蔣蓮舖當年曾此課兒詩擾擾臺輿渴飲時物候幾經新節序布衣猶是舊心期重宿徐氏村居曾此賦村居重來十載餘玉樓人久化蘭砌事堪書宿鄭氏村居依稀餘墨象湖傍堂扁拙筆存焉鶴去山空事𣺌茫嗣續喜看仁愛重燈前聨跪告新章宿毛村衢州上流三十里扁舟旅泊暫天涯一夜歸心又夢家行李但教西路穏東籬計日詠黄花舟子索詩蘭溪地欵欵鳴橈話會溪好留餘跡向新詩正貪綠水青山勝恰值風恬浪靜時贈嚴州張太守二首天順壬午十月十五日夜夢嚴子釣臺春色明媚一人軸一詩既覺只記結句賦詩頻三字明年七月晝寢書閣有懐金臺舊㳺因記主客張公誤加過奬之言惕然慚忸悵怏久之時張久知嚴陵雖佳問常聞而良覿靡由乃發興江東之行拜我文公􅄔源祖居遂一相求八月丙申果盍簪焉情見乎辭仍用夢中賦詩頻三字云江山隨處賦詩頻况此論心共故人遥傳尚友軒中譽為德兼誇更為民昔年曾託霜松趣戊寅為前劉太守寫霜松此日重為雪柏吟桃李任教春似錦高標依舊歳寒心宿資福寺歩月謁思范亭亭子何年沒荆榛老衲開羣公不日復諸傑四時來景行秋乘月吟詩夜歩苔會心香妙處晉簡文帝在華林園曰會心處不必在逺翳然林木便自有濠濮間趣不覺魚鳥親人杜詩心清聞妙香何必泥銜杯鍾潭舖建德地不必勞歸夢琴書已離東忽驚秋槿盛人在萬花叢鍾潭嶺東㳺舊友論心好西返新詩得趣頻又喜野花緣道涌嫩紅滿眼似迎賔下崖舖細攪羣峰秀閒吟一水清當街跪亭長新句幸留名蛇嶺頻坐羊腸坂仍思蛇嶺詩畏途看漸減歸計莫嫌遲分路舖午㸑來分路青山四靣圍憑詩記幽絶千里此中歸宿紫葢峯法照寺淳安地出嶺望竒蹤遥知刹在峯月階秋皎潔花砌夜玲瓏合橋舖二首俄辭紫葢峰行邁從迤邐尚懐棲鳯堂清風洒蘭砌為寫紫葢峯栖鳯堂清風亭額日日賦詩頻吟邊興有神秋花隨地好疑是夢中春懐張太守二首寄語文章守逰人去已遥新詩吟不徹春興一何饒一見尋歌歸去來寧能兩地不徘徊從今遇有東飛鴈剩寫新詩慰爾懐十二夜淳安邑庠彭羅二廣文對月良時已喜中秋近勝會難逢此夜清極口細談先聖道開顔共寫故鄉情贈淳安鄧茂宰山川迢逓行人倦舘穀慇懃茂宰賢借問琴堂深淺興雪中修竹正蒼然號雪竹宿向果寺一宿招提境歸心樂意濃東流碧沼靜西照夕陽紅此日留新墨他年憶舊蹤塵龕誰是伴明月與清風喜晴昨日雲生雨今朝月照人山川雖險阻徒御少酸辛黄栢道中細雨微沾處危橋穏歩時平安人自慶囘首詠漣漪五城道中曲澗泉孤溜高山雲四垂逢人承問訊長者是為誰磨石道中晴色催詩興歸期慰客懐朱鄉看漸近襟抱共誰開宿璜川細雨朔風寒揮毫墨未乾中宵頻出户微月露雲端塔坑莫道歸心切其如度嶺難萊衣勞夢想行李此看山樟木舖偶從樟木詢歸路亭長諒諄為指南他日有時懐勝覽筍輿曾此駐晴嵐喜晴漠漠秋雲合濛濛曉雨來正愁山脚滑俄喜日華開宿曉湖旋浸霜毫寫曉湖金尊美酒夜相娱綿綿細接隣封話明日青山指故都古坑擾擾征途客無非利是心嗟予何事者端為好賢深宿白石出原喜近故園疆度石來投逆旅裝夫婦俱能崇禮義弟兄總解重文章宿楗頭村茅屋烟汀一曲淡涵秋獨詠餘暉坐粟州東客倦時西路近度㘭歴坂不須愁寄安仁李茂宰㳺子歸時詩滿囊晨風吹動桂花香可知懐古登高處雲白山青東路長緣道多助夫力宿李章氏觀拙墨巻子老去仍逰越歸來偶合歡巻從燈下展墨在夢中看東㳺稿畢㳺園為客他鄉逺㳺園新興長畦蔬盈嫩翠林橘吐微黄題林茂宰橋東書屋幽棲籬落野橋東多種芸香與桂叢童冠沂雩春杳靄吾伊燈火夜玲瓏一從黄榜蜚聲逺幾度青山入夢濃幼學壯行男子事留傳氷蘗滿花封寒夜偶成示諸生塵窻寒夜正遲遲寂對殘燈獨詠詩小子學詩方避席諸生讀易俟摳衣飫聞𤣥聖從吾好須信文王是我師流俗汨人非一日昻藏莫負好男兒癸未除夜歳月如流又一年長更念舊轉悽然老懐欲共何人寫吟對燈花未忍眠吟對燈花未忍眠丁寧明日早朝天老懐有賦何多幸四海車書正晏然康齋集巻六
