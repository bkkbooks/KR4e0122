body:
  text: 康齋集巻十二明吴與弼撰䟦䟦伊洛淵源録永樂己丑冬姑蘇别駕李侯能白寄此集于先君與弼燈下閱之伏覩道統一脈之傳不覺心醉而於明道先生獵心之説尤為悚動蓋平昔謂聖賢任道之統者皆天實篤生非人力可勉遂置聖賢於度外而甘於自棄及覩此事乃知所謂程夫子者亦嘗有過亦資於學也於是思自奮勵竊慕向焉既而盡焚舊時舉子文字誓必至乎聖賢而後已辛夘冬與弼歸鄉里而京師官舎被火意此書必煨燼矣居常思一再讀而不可得今年春齎先君遺籍於蓮塘故址忽喜無恙遂奉至小陂茅屋日敬玩味以酬素願嗚呼與弼迷途少改實始此文於以見朱夫子纂集垂惠後學之功盛矣而李侯逺贈之勤其敢忘哉䟦尚友二大字舊友孫爾安寄以名筆佳墨其子納奉至小陂將有省覲之行附此以答逺意云䟦忠國公石亨族譜右忠國公石氏族譜一通命僕題焉夫公元勲盛徳在天下著太常而重彛鼎所以顯其親而光其族也至矣雖能言之士無所容喙况在於僕敢贅乎哉天順戊寅七月二十一日門下士崇仁吳與弼拜觀䟦秣陵陳氏家譜都指揮陳君𢎞道枉顧寓舘既而㩦嗣子珦繼來且以家譜命題夫世間能事惟在讀書修身而已珦也崇乃志於詩禮之訓而益篤焉則所以濟其美者可量乎哉䟦饒烈給假歸帖此初入齋時帖也嵗月不易得回首倏八載矣舎魚取熊掌在於所志何如耳䟦徐氏家譜昔三衢徐君希仁教吾臨川也予寓五峯外氏因以得陪餘論嘗辱其世譜之命而以不敏辭焉君既調官且歸休林泉矣每欲一訪鄭公之鄉今乃始諧夙願而君已老握手嘘唏語笑未洽而予以多病迫歸君猶以舊命命我噫先徳之美自足名家淺薄焉能為有無而知我之過無以謝萬一益顔厚耳䟦四老西游圖四老者進賢陳子憲吳志廣朱文貫陳子寜也西游者索崇仁吳與弼歌其令君吕侯之賢以風厥鄉人也黄眉皓髮年皆七八十䟦渉凍途而甘心焉者秉彛好徳之誠也相行者邑生傅海也予既賦絶句詩以贈其歸而好事者復圖以表焉贊黄在中遺像贊藴昻霄之志負泛駕之材事業嗟其已矣山林邈自藏輝朱顔皓齒鶴髪桃顋春風態度秋月襟懐昔予拜翁于中夀雖病革而禮諧翁謝世之八年瞻圖像而肅齋噫詩巻長留天地繼述乎後者宜愈逺而愈佳也戴文振遺像贊繄親仁於齠齡恒信宿於髙門晩接隣於華里拜遺像於諸孫銘硯銘何産之異何保之良所儲㳙滴所濟汪洋啓回饒氏議親啓伏以人歆令聞金蘭契朱陸之髙軒世篤嘉猷珠玉際吳虞之逸駕未獲展門墻之敬忽枉飛姻好之牋伏承某人第幾位令嗣房下第幾孫男某茂才資格英佳箕裘閒熟以某幾小女粗諳織紝未習徳容特䝉畧齊鄭之嫌而俾聫秦晉之匹猥承雅眷敢不恭依雖蕭嶺飛甍之偉莫可攀縁而紫陽覆瓿之期實深屬望感兹榮幸倍萬等夷謹奉狀謝伏惟照察謹狀孫氏求婚啓伏以仰止名宗久篤朱陳之好不量非偶復通秦晉之歡以某男某器識凡庸才猷薄劣伏承令姪敏堂徴士第一小娘子性質温厚徳容静嘉妄意好逑之祈遽辱于歸之諾戰越無地欣幸曷勝謹齋沐以諏辰敢肅恭而告吉回饒氏議親啓翺翔槐市膠漆夙忝於椿庭問訊花封絲蘿新好於蘭砌拜嘉良厚為慰實多伏承令姪某進士第三令嗣茂才梧竹髙標豈輕匹配而某第二小女襪線庸品偶叶蓍龜韓朱門墻數仭誠難於企及李黄歩武異世固望於同歸慶荷之私敷陳罔既墓誌銘孫君墓誌銘君諱隆字仲迪姓孫氏世為豐城之敷山人予距君居限一嶺耳然未識也他日遇于劍水之濵容儀魁以樸詞氣雅而温予雖寡合而心竊竒焉已而賔予于其家敦禮而尚徳名宗故族之翹然者也正統丙辰正月丁丑君以疾卒享年六十有七將以其年十一月庚申塟于其郷之某所其内外親戚賔友咸以君嘗辱予宜託以銘季子勉將伯兄昻之命來請予適病勉意益䖍不易於是叙次其世而銘之曰唐處士諱瑫字伯玉者宣宗時塟敷山宋迪功郎監潭州南岳廟諱約之者於君為八世祖始倣歐陽氏法為之譜伯玉而下系次有闕譜自南唐倉監諱行琰始行琰生仁耶仁耶生敬忠敬忠生餘慶餘慶四子景運景福景純景陽四景以來𦙍日益庶力學為善代有令聞而景純者乃君之十二世祖也曾祖諱恵字和仲祖諱暠字從達父諱某字友文君少孤凡所以立其家啓其後者皆躬辛以致之而相厥志者配徐氏也子四人昻勉操持女二人孫十人洪浩澄淵淑治温演溥濟乃銘曰孫居敷山逺自于唐徳門文苑族世厥芳爰暨君身適于中㣲惟君奮邁于祖有輝既富而夀亦云福只慎終刻詞是謂有子牛君墓誌銘五峯主人牛君將塟仲子演致其臨終之命曰欲銘我其吳先生乎嗚呼君知我者惡得不銘君諱琛其先由河南官游于薊因家遵化縣之王家莊大父諱彦贈昭信校尉撫州守禦千户所百户父諱均美撫州守禦千户所百户致仕傳子忠尋陞副千户封厥考武畧將軍副千户母田氏宜人既而調贑之㑹昌㑹昌君卒子暹嗣暹未有後以卒夏官以次君當踐㑹昌君以㣲疾讓弟斌斌卒君敦讓諸子夏官竟官君子澄君為人端毅疎暢勤禮而泛愛尊賢若不及家庭之間肅然以和先府君建博文堂集名縉紳次講授君與仲氏俱讀書通大義卒克㧞華夷為大家知我實由於仲氏而君固一致焉托門墻僅四十載豈偶然而已哉君生洪武戊申十二月十三日年八十三氣體倦勤内屬家事外與親交訣遷正寢之二日而曰明當去矣翌日果然正統己巳五月二十六日也君娶黄氏繼室周氏子四人長􅹛學於予諸父甚愛重之蚤世矣澄㑹昌千户演溥與吾兒游女一人適撫州正千户夏昶澄等以景泰冬十一月己酉𦵏君臨川銀錠塘之先兆銘曰於昭世徳博文有堂克敬克紹雝雝鴈行先北于歸銀錠之臧孺人黄氏墓誌銘天順戊寅正月予以詔命將赴金臺鰲溪熊易二生道其所善寶塘謝愈盛上謁天使之館而通贄於予既而二生屬子壻饒循謂昔日愈盛失所恃纔逾旬耳假拜使以登君子之庭為丐銘之地幸夫子矜憐之予固辭焉十月謝病歸田二生復以屬循且曰必欲得夫子銘然後愜於人子之心辭之數而請益勤焉嗚呼民之秉彞好是懿徳誰無人子之心哉生之膝下喘息呼吸氣通於親古今一耳然愛其親有篤不篤者存其天有多與寡也謝氏子於子道不其厚矣哉雖欲終辭詎可得邪竊嘗悲世人子有幸焉不幸焉有大幸焉大不幸焉幸不幸之中又萬不齊焉生而弗及見其親者矣夙喪親而弗克記憶者矣生弗克致其養死弗克致其𦵏者矣變故不一所不忍言而人子抱無涯之痛者多也謝氏子其於親也未嘗違㫖甘家富而親夀考以終可謂幸矣又得吾銘以慰人子報親之忱予亦大為之慶焉於是誌而銘之誌曰孺人生洪武乙卯正月十九日鰲溪天授鄉麻溪黄叔獻女寶塘青雲鄉謝永昂婦歸弗迨事其舅而奉姑甚孝為謝氏淑人天順戊寅正月甲子年八十四以卒卒之日慟及臧獲可以考徳矣十二月癸酉袝𦵏本里周坊姑氏兆右永昻先二十年卒子二人曰愈堅早世孺人撫其孤遺以教以婚曰愈盛孫四人曽孫五人銘曰寛裕慈恵夀考是宜於昭令子千載銘諸邵楚材墓銘醋兒其名楚材字𣲖出河南邵其氏伊父見育鄭將軍吾考實維鄭君壻而父沒時爾年稚吾家與居已經世四十四夀女二人卒于正月嵗丁巳塟爾臨汝石泉山誌爾墓兮百千䙫易孺人墓銘繄張有母慈且淑劍水淒涼久埋玉哀哀孤子遲我銘圖報昊天難遂欲寒暑互往歳月遒出入起處常幽幽安得特書不一書晶熒金石寛吾憂我聞中心怛以惻紀徳述行固其職母生癸酉卒丙寅𦵏惟丁卯湖名墨妣系熊兮考南維祖克俊兮氏曰易十六歸作嘉謨配代絶有道無亢悔薫蒸融液家以成年不足兮衆所矜我歌不磨千載名恃此庶以慰㝠㝠孤子長跪淚盈盈生死肉骨惟先生猗歟孤子其為誰曰循千載受予經墓表黄先生墓表君諱寛字浩中幼孤弱冠始知學問中更苦節慕先正草廬之為人號曰希吳與人談每樂道吳之學於書無所不讀而易尤深恬黙自守紛華不少介乎其意晩嵗徳益茂平居恂恂鄉閭無少長翕然尊師之雖教授在乎闤闠而未嘗一履公門世居縣北君贅橋東厭其喧囂也從近郊之某處號曰草庵地既幽曠園池竹樹日向清雅而諸子皆克世其業充乎有以遂其永矢之樂焉鳴呼人咸多君之樂易近人而其中有介然不可移者存則恐未盡識也於其冡嗣之請表其墓輒叙而為之詩曰温乎其外兮衆所見也介乎其中兮吾所羨也東臯居士墓表居士姓吳氏字士竒號東臯代為東平名族與寒門通家累世予小子久獲親炙几杖故相知為周大父從道篤於教子遍禮名儒以為之師尊父某克承家法故居士於學甚早少長遭逢亂離艱險備歴故於才甚通為人豪邁閒曠客至倒屣相迎欵語詩書忘其朝夕酒半輒髙歌激烈有蕭洒出塵之想名居曰東臯舒嘯之軒軒之大書曰左右圖書古今風月先子寄贈詩有東臯先生英傑人又曰長日襟度温如春誠哉是言也於永樂某年某月某日卒塟近地之蜈蚣山某年文于其墓曰蜈蚣之脈宛蟠虯白鷺之水静相繆層巒疊嶂森連鈎佳哉形勝雄斯丘有美一人儒者流於焉埋玉諧佳謀髙風欲考靡來由鑱厥金石垂丕休孺人羅氏墓表孺人諱奴娘處士羅遜卿之女配胡君環卿胡氏世蹈朴厚孺人以貞閒恵恭之質相其夫子雖處阨窮而宜家之道靡渝胡君之禮孺人亦猶孺人之尊胡君也年六十四永樂七年閠四月十七日以疾卒𦵏南坑塘北又二十六年諸子立石表墓而徴文於予予幼承孺人撫愛之慈且知徳實深迺序而詩焉詞曰徳美以宜其配兮足承累世之淳龎雖嗇于其躬兮後其昌蔣節婦墓表戴生享慶以祖妣墓未銘懼夫節義久將堙沒不傳也恒戚于其心乃咨於其父請族祖子穎君譔其世與行丐予文以表焉節婦諱滿奴姓蔣氏世為南昌豐城族曽祖諱鈞字洪仲祖諱沐字叔新父諱椿字子莊母某氏節婦年二十餘歸配唐山戴子鼎氏逾紀而子鼎遂卒有子纔五歳戴故大家當是時孰不欲乗其危而利其有節婦介持愈嚴以勤卒能完其家無毫髪喪教其子以及其孫不少替君子以為難嗚呼疾風知勁草不其然乎姒氏姑婦亦皆以節終時號一門三節冰霜互冽而金玉交輝盛矣哉銘曰超逸駕兮徃哲是程激薄俗兮壼彛惟馨𤣥廬載銘兮永流厥聲孺人汪氏墓表三衢之常山邑庠生徐仕承尊公希仁命請其母孺人墓石之文予與希仁知己仕舊生其何辭孺人姓汪氏諱鳯娘世為常山士族髙祖諱文璟登元進士第仕翰林編修曾祖諱紹栁州教授孺人年二十七歸希仁游邑庠得専經術為進士以孺人綜家也既而偕希仁官臨川歸希仁調山東孺人以姑老弗往希仁厄於詿誤久三子皆逺省時鄉里門户甚迫孺人極力以應卒無敗事希仁謝事自邑徙近地之新溪凡平生開創與結架之勞多資賢助焉孺人生洪武丙辰二月初一日卒景泰癸酉六月初十日八月壬申𦵏十八都䝉撑橋頭先兆之側子三人畊學仕祭文祭外叔祖蘭雪先生惟公簮纓茂裔詩禮名閎行端而固學富而精惟仁克夀存順沒寜嗟予小子姻忝于甥贄未迨席哭不及庭徘徊軫念禮負幽明拜瞻靈幔怛以中情一觴敬酹神其鑒誠祭湖山黄先生稟於天者秀㧞學於已者清勤三振鐸於芹水兩考最於成均屢攝司成之位譽益著于縉紳既致政而歸來儀表重于鄉隣福已軼乎中夀佳子姓之振振忽㣲疾而奄逝蓋天厚乎仁人嗟小子之孱薄早䝉開導之諄諄思永酬於萬一宜承訃之悲辛淹疾阻于徃哭何𠂻曲之能伸顧頑兒以敬遣聊菲儀以是陳嗚呼哀哉尚饗祭外祖母伯氏夫人嗚呼夫人育秀大家配美髙門猗歟二氏克武克文惟是夫人資懿徳尊峩峩偉節壯氣凌雲天相眉夀福祉孔繁夫人逝矣不亡者存嗟我小子幼沐深恩曰攜曰抱曰涼曰温于師于友于冠于婚以長以成難乎具論厚徳不報痛徹心魂幽明永隔日月其奔奄及歳除怛焉如焚病莫驅走是遣諸孫徃酹一觴腸裂聲吞嗚呼哀哉尚饗祭孫仲迪鳴呼昔我與公邂逅于劍江之濵投分於片言之頃遂承歩暑同歸仁里信宿相留雖再覯止於二三而愛我不啻平生方擬春和杖䇿攜琴重來謁公遍訪名山以酬舊約而公棄我以逝矣嗚呼哀哉適此卧病不能往哭祗遣一觴永訣終天尚饗康齋集巻十二
