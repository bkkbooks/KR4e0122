body:
  text: 康齋集巻十一明吴與弼撰日録夢孔子文王二聖人在南京崇禮街舊居官舍之東廂二聖人在中間與弼在西間見孔聖容貎為詳欲問二聖人生知安行之心如何又彷彿將文王書一册在案披翫似文王世系乙巳夢侍晦庵先生側先生顔色藹然而禮甚恭肅焉起敬起仰也夜枕思宋太宗燭影事深為太宗惜之人須有行一不義殺一不辜而得天下不為之心方做得堯舜事業不然鮮有不為外物所移者學者湏當隨事痛懲此心剗割盡利欲根苖純乎天理方可語王道果如此心中幾多脱洒伶俐可謂出世竒男子矣與隣人處一事㴠容不熟既已容訖彼猶未悟不免説破此間氣為患尋自悔之因思為君子當常受虧於人方做得葢受虧即有容也食後坐東忩四體舒泰神氣清朗讀書愈有進益數日趣同此必又透一關矣聖賢所言無非存天理去人欲聖賢所行亦然學聖賢者舎是何以哉文公先生與學者論躬行云若易時天下無數聖賢了噫實用其力者方知其難可勝歎哉日夜痛自㸃檢且不暇豈有工夫㸃檢他人耶責人密自治踈矣可不戒哉明徳新民雖無二致然已徳未明遽欲新民不惟失本末先後之序豈能有新民之效乎徒爾勞攘成私意也貧困中事務紛至兼以病瘡不免時有憤躁徐整衣冠讀書便覺意思通暢古人云不遇盤根錯節無以别利器又云若要熟也須從這裏過然誠難能難能只得小心寜耐做將去朱子云終不成處不去便放下㫖哉言也文公先生謂延平先生終日無疾言遽色與弼常歎何脩而至此又自分雖終身不能學也文公先生又云李先生初間也是豪邁底人後來也是琢磨之功觀此則李先生豈是生來便如此葢學力所致也然下愚末學苦不能克去血氣之剛平居則慕心平氣和與物皆春少不如意躁急之態形焉因思延平先生所與處者豈皆聖賢而能無疾言遽色者豈非成湯與人不求備檢身若不及之功效歟而今而後吾知聖賢之必可學而學之必可至人性之本善而氣質之可化也的然矣下學之功此去何如哉夜病卧思家務不免有所計慮心緒便亂氣即不清徐思可以力致者徳而已此外非所知也吾何求哉求厚吾徳耳心於是乎定氣於是乎清明日書以自勉南軒讀孟子甚樂湛然虚明平旦之氣畧無所撓緑隂清晝薫風徐來而山林閴寂天地自闊日月自長邵子所謂心静方能知白日眼明始可識青天於斯可驗與弼氣質偏於剛忿永樂庚寅年二十從洗馬楊先生學方始覺之春季歸自先生官舎紆道訪故人李原道於秦淮客舘相與擕手淮畔共談日新與弼深以剛忿為言始欲下克之之功原道尋以告吾父母二親為之大喜原道吉安廬陵人吾母姨夫中允公從子也厥後克之之功雖時有之其如鹵莽滅裂何十五六年之間猖狂自恣良心一發憤恨無所容身去冬今春用功甚力而日用之間覺得愈加辛苦疑下愚終不可以希聖賢之萬一而小人之歸無由可免矣五六月來覺氣象漸好於是益加苦功逐日有進心氣稍稍和平雖時當逆境不免少動於中尋即排遣而終無大害也二十日又一逆事排遣不下心愈不悦葢平日但制而不行未有㧞去病根之意反復觀之而後知吾近日之病在於欲得心氣和平而惡夫外物之逆以害吾中此非也心本太虚七情不可有所千物之相接甘辛醎苦萬有不齊而吾惡其逆我者可乎但當於萬有不齊之中詳審其理以應之則善矣於是中心洒然此殆克已復禮之一端乎蓋制而不行者硬苦以理處之則順暢因思心氣和平非絶無於往日但未如此八九日之無間㫁又徃日家和平多無事之時今乃能於逆境擺脱懼學之不繼也故特書於册冀日新又新讀書窮理從事於敬恕之間漸進於克已復禮之地此吾志也效之遲速非所敢知洪熈元年乙巳七月二十一日與弼識於南軒南軒柱帖云幽静無非安分處清閒便是讀書時知止自當除妄想安貧須是禁奢心淡如秋水貧中味和似春風静後功壁間大書云力除閒氣固守清貧病體衰憊家務相纒不得専心致志於聖經賢傳中心益以鄙詐而無以致其知外貎益以暴慢而何以力於行乎嵗月如流豈勝痛悼如何如何七月二十六日近暮書於南軒數日家務相因憂親不置書程間㫁胸次鄙吝甚可愧恥竊思聖賢吉㓙禍福一聼於天必不少動於中吾之所以不能如聖賢而未免動揺於區區利害之間者察理不精躬行不熟故也吾之所為者惠廸而已吉㓙禍福吾安得與於其間哉大凡處順不可喜喜心之生驕侈之所由起也處逆不可厭厭心之生怨尤之所由起也一喜一厭皆為動其中也其中不可動也聖賢之心如止水或順或逆處以理耳豈以自外至者為憂樂哉嗟乎吾安得而臻兹也勉旃勉旃毋忽七月初二日書於南軒處家少寛裕氣象屢有逆境皆順而處理家務後讀書南軒甚樂於此可識本心枕上思在京時晝夜讀書不間而精神無恙後十餘年疾病相因少能如昔精進不勝痛悼然無如之何兼貧乏無藥調護只得放寛懐抱毋使剛氣得撓愛養精神以圖少長噫世之年壯氣盛者豈少不過悠悠度日誠可惜哉晝寢起四體甚暢中心洒然安貧樂道何所求哉當念嵗月晩而學無成可懼也然既往亦不得而追矣繼今隨精力所到而進毋怠其志而已視古人自少至老始終一致者不勝其慨愧矣一事少含容蓋一事差則當痛加克已復禮之功務使此心湛然虚明則應事可以無失静時㴠養動時省察不可須臾忘也茍本心為事物所撓無澄清之功則心愈亂氣愈濁梏之反覆失愈逺矣觀分門近思録聞所未聞熟所未熟甚有益於身心性情足感朋友之有是書以相益也觀近思録覺得精神收歛身心檢束有歉然不敢少忘之意有悚然奮㧞向前之意二月二十八日晴色甚佳寫詩外南軒嵐光日色曨映花木而和禽上下情甚暢也值此暮春想昔舞雩千載之樂此心同符丙午夜讀論語深感子思之説於目下用功最切亟當服膺夜觀童子照魚静聴流水自悟川上之歎及朱子安行體用之㫖夜立庭間静思踐履篤實純粹君子不可得也誠難能也心所深慕而無由臻斯境可勝歎哉觀農因瘡藉芳閒卧塍間静極如無人世今日雖未看書然静中思繹事理每有所得峽口看水途中甚適人茍得本心隨處皆樂窮達一致此心外馳則膠擾不暇何能樂也晁公武謂康節先生隠居博學尤精於易世謂其能窮作易之本原前知來物其始學之時睡不施枕者三十年嗟乎先哲苦心如此吾軰將何如哉觀花木與自家意思一般看田至青石橋逰觀甚適歸焚香讀書外南軒風日和煦攬景樂甚讀書理亦明著心神清爽一日以事暴怒即止數日事不順未免胸次時生磊嵬然此氣稟之偏學問之疵頓無亦難只得漸次消磨之終日無疾言遽色豈朝夕之力耶勉之毋怠枕上思近來心中閒思甚少此亦一進也寢起讀書栁隂及東忩皆有妙趣晚二次事逆雖動於中隨即消釋怒意未形逐漸如此揩磨則善矣親農歸以眼痛廢書閒閲舊稿十六七年之間嵗月如流而學行難進俯仰今昔為之悵然又感吾親日老益自悽愴不勝大抵學者踐履工夫從至難至危處試驗過方始無往不利若舎至難至危其他踐履不足道也蒔蔬園中雖暫廢書亦貧賤所當然往親農途中讀孟子與野花相值幽草自生而水聲琅然延佇乆之意思蕭洒小童失鴨畧暴怒較之去年失鴨减多矣未能不動心者學未力耳觀草廬文集序諸族多尚功名富貴恐吾晦庵先生不如是也惜未覩先生全集外南軒讀孟子一巻容貌肅然午後眼痛四體俱倦就寝心無所用思歸郷十五年厯艱實多不堪回首坐外南軒滌硯書課緑隂清晝佳境可人心虛氣爽疑此似躡賢境惜讀書不博耳枕上黙誦中庸至大徳必受命惕然而思舜有大徳既受命矣夫子之徳雖未受命却為萬世帝王師是亦同矣嗟乎知有徳者之應則宜知無徳者之應矣何脩而可厚吾徳哉夜徐行田間黙誦中庸字字句句從容詠歎體於心驗於事所得頗多上不怨天下不尤人君子居易以俟命小人行險以僥倖燈下讀中庸書此不肖恒服有效之藥也與一鄰人談及不肖稍能負重私心稍悦每日勞苦力農自是本分事何愠之有素貧賤行乎貧賤小女瘡疾相纒不得専心讀書一時躁急不勝雖知素患難行乎患難然嵗月不待人學問之功不進不得不憂也其實亦因早年蹉跎過了好時節以致今日理㑹不徹三十年前好用工何可得耶緩歩途間省察四端身心自然約束此又静時敬也知弗致已弗克何以學為丁未因暴怒徐思之以責人無恕故也欲責須思吾吾能此事否茍能之又思曰吾學聖賢方能此安可遽責彼未嘗用功與用功未深者乎况責人此理吾未必皆能乎此也以此度之平生責人謬妄多矣戒之戒之信哉躬自厚而薄責於人則逺怨以責人之心責已則盡道也因事知貧難處思之不得付之無奈孔子曰志士不忘在溝壑未易能也又曰貧而樂未易及也然古人恐未必如吾軰之貧夜讀子思子素位不願乎外及㳺吕之言微有得㳺氏居易未必不得窮通皆好行險未必常得窮通皆醜非實經厯不知此味誠吾百世之師也又曰要當篤信之而已從今安敢不篤信之也觀文章正宗感學徳無進四十向逼終於小人之歸豈勝悲痛以事難處夜與九韶論到極處須是力消閒氣純乎道徳可也倘常情一動則去道逺矣枕上熟思出處進退惟學聖賢為無弊若夫窮通得䘮付之天命可也然此心必半毫無愧自處必盡其分方可歸之於天欲大書何者為聖賢何者為小人以自警自今須純然粹然卑以自牧和順道徳方可庶幾嗟乎人生茍得至此雖寒饑死刑戮死何害為大丈夫哉茍不能然雖極富貴極夀考不免為小人可不思以自處乎與學者授論語讀至年四十而見惡焉其終也已不覺惕然與弼年近四十矣見惡者何限安得不深自警省少見惡焉斯可耳燈下外南軒觀年二十時所作論三篇不勝悲歎何者昔時志向的然以古聖賢為可學可至今逡廵茍且二十年多病侵陵血氣漸衰非惟不能至聖賢欲求一寡過人且不可得奈何奈何安得好學茂年痛傾此意學徳無成而年光空老平生之志不得遂矣感恨何窮無容此身傷哉凡事誠有所不堪君子處之無所不可以此知君子之難能也胡生談及人生立世難作好人僕深味之嗟夫見人之善惡無不反諸已可也戊申讀易倦觀晦菴先生年譜慨先哲之精勤愧駑軰之㓕裂惘然自失奈之何哉據今地位努力向前途間與九韶談及立身處世向時自分不敢希及中庸數日熟思須是以中庸自任方可無忝此生只是難能然不可畏難而茍安直下承當可也讀罷思債負難還生理蹇澁未免起計較之心徐覺計較之心起則為學之志不能専一矣平生經營今日不過如此况血氣日衰一日若再茍且因循則學何可向上此生將何堪於是大書随分讀書於壁以自警窮通得䘮生死憂樂一聼於天此心須澹然一毫無動於中可也倦寢夢寐中時時驚恐為過時不能學也與九韶痛言為學不可不勇而此公自無奮發激昻拔俗出羣之志予歸深為之太息徐思方自悼不暇安有工夫於他人耶嗚呼日進無疆屬之已乎屬之人乎勉之又勉勿為外物所困近晚往鄰倉借榖因思舊債未還新債又重此生將何如也徐又思之須素位而行不必計較富貴不淫貧賤樂男兒到此是毫雄然此心極難不敢不勉貧賤能樂則富貴不淫矣貧賤富貴樂與不淫宜常加警策古今幾人臻斯境也早枕思處世不活須以天地之量為量聖人之徳為徳方得恰好嗟乎安得同志共勉此事處大事不能盡善意甚怏怏兼以寒疾時作風足攻人讀書工夫間㫁昏昏竟日痛感何由得入聖賢境界也早枕思當以天地聖人為之凖則因悟子思作中庸論其極致亦舉天地之道以聖人配之葢如此也嗟夫未至於天道未至於聖人不可謂之成人此古昔英豪所以孜孜翼翼以終身也食後處事暴彼雖十分不是然我應之自當從容徐思雖切責之彼固當得然不是相業人生但能不負神明則窮通死生皆不足惜矣欲求如是其惟慎獨乎董子云人之所為其美惡之極乃與天地流通往来相應噫天人相與之際可畏哉人須整理心下使教瑩浄常惺惺地方好此敬以直内工夫也嗟夫不敬則不直不直便昏昏倒了萬事從此隳可不懼哉與友人夜别徐家山歸思一日數事頗當凡事須㫁以義計較利害便非貧病相因讀書不前何以為力行之資人須於貧賤患難上立得脚住克治粗暴使心性純然上不怨天下不尤人物我兩忘惟知有理而已觀晉史成帝見王導必拜及幸其宅拜其妻反覆詳其始末為之掩巻太息丈夫際遇如此而功烈不過若是其付託之重不減伊周而致主澤民視伊周何如哉雖其志安於小成亦學力有所不逮耳信知人生須自㓜力學期於踐形必臻其極然後為無愧也孔子曰居則曰不吾知也如或知爾則何以哉又曰用之則行嗚呼安得反西飛之日而痛加學歟今日覺得貧困上稍有益㸔來人不於貧困上着力終不濟事終是脆懦教人湏是循循善誘玩中庸深悟心學之要而歎此心之不易存也克已逡廵無所成就四十而見惡焉其終也已熟思平生厯試不堪囘首間閱舊藁深恨學不向前身心荒怠可憂可愧今日所當為者夙興盥櫛家廟禮畢正襟端坐讀聖賢書収歛此心不為外物所汨夜倦而寢此外非所當計窮通夀夭自有命焉宜篤信之數日守屯困工夫稍有次第須使此心泰然超乎貧富之外方好觀史時見古人卓卓之行不勝感激益思自奮當學之難進乃見希賢之不易也心是活物㴠養不熟不免揺動只常常安頓在書上庻不為外物所勝㸔乙巳年日新簿惕然於心繼讀論語觀聖賢教人丁寜之意益思自奮須用刻苦以事暴怒即悔之須持其志毋暴其氣應事後即須㸔書不使此心頃刻走作數日養得精神差好須節節接續去莫令間㫁上無師下無友自己工夫又怠此生將何堪耶細觀近思録乃知聖賢教人之法備在方策而自己學力未至以致齷齪無量安得良朋共執此文細細講明以為持已處事之資也斬截日新精白一心對越神明經旬學徳廢怠夢寐中亦屢悵歎為小女授論語感聖人之微言悚然思奮安得良朋輔我此志途逢故人兩鬢已斑不覺愴然問其年方四十頃之此公熟視予髸亦已斑矣益為悽惻乆之方别既而思平生碌碌只此衰謝少壯不努力老大徒悲傷豈不信哉夜歸書此於東忩噫書又終可得而讀耶君子果不可得而成耶新居栽竹夜歸吾妻語予曰昨夜夢一老人攜二從者相過止於門令一從者入問與弼在家否答云不在家從者曰孔夫子到此相訪教進學也與弼聞之為之惕然而懼躍然而喜感天地而起敬者再三脊背為之寒慄自此以往敢不放平心氣専志於學徳乎敢吝駑駘之力乎往新居授書甚喜學有新益聞友人所為顛倒益自警省實下工夫㸔禮記倦寢思平生經厯之艱益歎古人之不易學㸔語畧惕然憂念學徳不進何以立世己酉茍一毫不盡其道即是自絶於天坐門外圖書滿案子弟環侍乘緑隂納清風羣物生意滿前而好山相賓主覽兹勝趣胸次悠然早枕細思學徳無進嵗月忽晩囘首平生恍然一夢可勝悼哉繼今分隂須用痛惜毋蹈前非也㸔近思録甚有所得鄙吝之懷為之豁然夜大雨屋漏無乾處吾意泰然庚戌夜黙坐思學不能進朋友义無向前者此道日孤意思忽忽無聊者乆之㴠養本源工夫日用間大得力青石橋刈稻往囘村外與物皆春晚榖不收夜枕思家用窘甚不得専意於書展轉反側良乆因念困窮拂鬱能堅人之志而熟人之仁敢不自勉夜觀晦庵文集累夜乏油貧婦燒薪為光誦讀甚好為諸生授孟子卒章不勝感激臨寢猶諷詠明道先生行狀乆之頑鈍之資為之惕然途中㸔言行録歸及隔溪藉草臨流觀書甚樂杳然塵外之趣中堂讀倦逰後園歸絲桐三㺯心地悠然日明風静天壌之間不知復有何樂早枕痛悔剛惡偶得二句豈伊人之難化信吾徳之不競所得為者不敢不盡分若夫利鈍成敗非我所計也此心須常教洒然時時痛加持志之功務消氣質之偏㳺園萬物生意最好觀安貧樂道斯為君子遇逆境暴怒再三以理遣葢平日自己無徳難於専一責人況化人亦當以漸又一時過差人所不免嗚呼難矣哉中庸之道也近來愈覺為人之難學不向前而嵗月不待人奈何奈何枕上思晦庵文集及中庸皆反諸身心性情頗有意味昨日欲書戒語云温厚和平之氣有以勝夫暴戾逼窄之心則吾學庻幾少有進耳今日續之云欲進乎此舎持敬窮理之功則吾不知其方矣葢日來甚覺此二節工夫之切而於文集中玩此話頭益有意味也夜思承父師付託之重士友期望之深竦然増懼思有以自㧞於人欲而未知其方也日來處困稍覺有力六月初一日早枕念嵗月如流事業不立豈勝慨歎七月五日日臨鍾帖明忩浄几意思甚佳平生但親筆硯及聖賢圖籍則不知貧賤患難之在身也人之遇患難須平心易氣以處之厭心一生必至於怨天尤人此乃見學力不可不勉貧困中事事纒人雖則如此然不可不勉一邉處困一邉進學七月十二夜枕上思家計窘甚不堪其處反覆思之不得其方日晏未處乆方得之蓋亦别無巧法只隨分節用安貧而已誓雖寒餓死不敢易初心也於是欣然而起又悟若要熟也須從這裏過中夜思日月逝矣事業無進輾轉不寐以達於旦凡百皆當責已夜誦明道先生行狀不勝感激㑹心處不知手之舞足之蹈也日來正心工夫稍有意思昨晚以貧病交攻不得専一於書未免心中不寜熟思之須於此處做工夫教心中泰然一味隨分進學方是不然則有打不過處矣君子無入而不自得然是難事於此可以見聖愚之分可不勉哉凡怨天尤人皆是此關不透耳夜説朱子感興詩因告戒諸生語意抑揚彼此皆極感激先哲云身心須有安頓處葢身心無安頓處則日間擾擾於利害之中而已此亦非言可盡黙而識之可也暮春逰園心廣體胖豈虛語哉壬子窮厄已極不可支撑兼病益困然亦安分不敢起怨尤之念而所以益進吾之學益堅吾之志者不敢不勉也卧㸔康節詩遂熟睡方醒意思佳甚不啻封侯賜金也雖極貧窶此命也不害其樂於近思録中所得比向日大有逕庭中心洒然如沉疴去體觀百卉生意可愛晴忩親筆硯心下清涼之甚忘却一身如是之窘也康節云雖貧無害日髙眠窮通夀夭一聴於天行吾義而已月下詠詩獨歩緑隂時倚修竹好風徐來人境寂然心甚平淡無康節所謂攻心之事倦後暫寢起書先哲格言明窓浄几清風徐來不知天壤之間復有何樂此身何幸至此也昨日於文集中又得處困之方夜枕細思不從這裏過真也做人不得増益其所不能豈虛語哉日來甚悟中字之好只是工夫難也然不可不勉康節詩云㧞山蓋世穪才力到此分毫強得乎正月初一日夜來心氣和平繼今學徳宜加勉也癸丑有困極詩云困固平生甘不意如此極前程一聼天多憂諒何益义云本心所主渾由已外物之來一聼天早觀花草生意甚佳食後意思稍不快以窘極故也尋開解之所得為者厚吾徳耳窮通非我所能也山中獨行甚樂萬物生意盎然時陟岡頂四望不勝之喜欲賦山椒一覽詩處困之時所得為者言忠信行篤敬而已早觀生意可樂殘月尚在露華滿眼箇中妙趣非言語所能形容東齋柱帖云窻前花草宜人意几上詩書悦道心寄身於從容無競之境逰心於恬澹不撓之鄕日以聖賢嘉言善行沃潤之則庻幾其有進乎不怨天不尤人下學而上達非聖人其孰知此味也哉人之病痛不知則已知而克治不勇使其勢日甚可乎哉志之不立古人之深戒也勿忘勿助近日稍知此味天假以年尚宜少進窮通得喪可付度外也患難中好做工夫所謂生於憂患死於安樂也然學力淺者鮮不為所困耳嗟乎梁棟之具非禁風耐氷雪安能勝其重哉男兒須挺然生世間三月二十日食後授書宿雨初霽生意充滿甚可樂也㸔春秋近午霽景可人日甚舒長天地闊逺但病體全乏精神不免寒饑亦隨分耳眼前隨分好光隂誰道人生多不足夜枕深念不得益精神以進乎學也夜坐思一身一家茍得平安深以為幸雖貧窶太甚亦得隨分耳夫子曰不知命無以為君子也東齋對月花竹參差清景可愛聼諸生誦聲甚樂時逰於外緑隂清夜真趣悠然昨夜思舊時嵗月事蹟為之慨然今日時復在懷嗟乎徳業不立而時駸駸晩矣先儒云道理平鋪在信乎斯言也急不得慢不得平鋪之云豈不是如此近來時時見得如此是以此心較之往年亦稍稍向定但眼痛廢書一年餘為可歎耳甲寅處大事者須深沈詳審早枕思平生踐履愧於聖賢者多矣至今不能自持欲大書不敢尤人四字以自勵也眼痛不敢㸔書暫誦詩經甚覺意味深長但不敢乆讀為之悵歎者久之乙夘暫閱舊藁二十八年前事恍如一夢豈勝感慨讀韓子與李翺書大有感於吾心㸔韓文倦睡夢中恍思少年日月不勝感愴而醒聰明不及於前時道徳日負扵初心信哉五月初一日㸔韓文晴色滿簾清風透户花草盈欄幽景可愛時出門外卧緑隂納涼甚樂七月二十一日對野講誦近晚曵杖逍遥野外甚適㸔晦庵文集大有感激十二月二十九日祀先一日多憂學者既少而有志者尤少大為世道慮也朱子云從容深宴養㫖哉言也丙辰㸔言行録龜山論東坡云君子之所養要令暴慢邪僻之氣不設於身體大有所省然志不能帥氣工夫間㫁甚矣聖賢之難能也累日㸔遺書甚好因思二程先生之言真得聖人之傳也何也以其說道理不髙不低不急不緩温乎其夫子之言也讀之自然令人心平氣和萬慮俱消倦睡覺來坐東齋㸔朱子文集天晴日永竹樹扶疎清景可人意思甚樂也觀晦庵先生語録慨然慮斯道不自知其年之邁氣之衰而病之多也㴠飬此心不為事物所勝甚切日用工夫中夜夢中痛恨平生不曽進學即今空老痛哭而寤出遊陂畔遂於澗底坐乆向日甚適省察身心幸有少進村外閒行遺書在手徐歩自後坊坑過大同源觀山玩水而歸於峽裏憇久枕石藉草而卧暖日烘衣鳴泉清耳有浴沂佳致夜枕省已稍有益欲大書多言害道吉人之辭寡躁人之辭多思無邪康節四妄吟於東西齋枕上思平生學徳不進輾轉不安鷄鳴方寐看朱子六十後長進不多之語恍然自失嗚呼日月逝矣不可得而追矣觀伊洛闗閩言行録惕然大感于懐益思奮勵以往不知其氣之衰病之憊也十一月單衾徹夜寒甚腹痛以夏布悵加覆畧無厭貧之意閒遊門外而歸程子云和樂只是心中無事誠哉是言也近來身心稍静又似進一歩暫閲舊藁偶得胡文定公葢有名葢天下致位廟堂得行所學一叚不勝感慨枕上細思從今須進歩不敢自絶于天窮通得喪聴乎天命雖餓死溝壑不可喪此徳矣近日多四五更夢醒痛省身心精察物理世間可喜可怒之事自家着一分陪奉他可謂勞矣誠哉是言也先哲云大輅與柴車較逐鸞鳯與䲭梟争食連城與瓦礫相觸君子與小人鬬力不惟不能勝兼亦不可勝也正月十七夜夢玊生花如蘭滿地己巳所憑者天所信者命辛未八月初二夜夢日有食之既與弼從旁吹之火焰即熾尋復其明四日早寫藁紅日當窻秋花映日清風綠隂意豁如也壬申涵養吾一癸酉沼上㸔自警編三二條甚好益知人當以聖賢自任也學易稍有進但恨精力減而嵗月無多矣只得隨分用工以畢餘齡焉耳山千形萬狀觀者自得之可也文千形萬狀作者自得之可也讀奏議一篇令人竦然噫清議不可犯也甲戌今日思得隨遇而安之理一息尚存此志不容少懈豈以老大之故而厭於事也累日思平生架空過了時日與學者話久大槩勉以栽培自己根本一毫利心不可萌也晩知書史真有益却恨嵗月來無多乙亥江西伍恒有書知程庸奉府主王侯命去大司成先生家借朱子語類抄對欲刋板以揚絶學恵後來喜不自勝恨不即覩盛事之成也東窻親筆硯好學至於不尤人學之至也浴罷坐東窻親筆硯竹風拂几綠隂滿地㸔彈章令人竦然付學者抄寫午前治圃貧賤之理當然不敢辭勞獨游隔溪數歩而回無可與者仁之至義之盡見人之善惡無不反諸已二月初一日云昨夜夢同三人觀漲擬同訪朱子不勝悵歎而覺有詩云曠百千秋相感深依依不識是何心金鷄忽報春窻曙惆悵殘䰟帶病吟丙子吉人為善惟日不足凶人為不善亦惟日不足得便宜是失便宜失便宜是得便宜康節詩閒窻一覺從容睡願當封侯與賜金亦不必如此説朱子從容深宴養好傳羮送麵貧士克已為義者萬事付之無心可也三綱五常天下元氣家亦然一身亦然丁丑一日未死一日要是當偶擷芳水尾悵然舊游得二句偶爾舊游行樂處擷芳溪曲玩春流動静語黙無非自己工夫游隔溪擷芳暮春天氣一團清樂㸔漚田晚歸大雨中途雨止月白衣服皆濕貧賤之分當然也静坐獨處不難居廣居應天下為難事往往急便壊了不學則老而衰五月二十五夜夢孔子孫相訪云承孔子命來兩相感泣而覺至今猶記其形容胡文定公云世事當如行雲流水隨所遇而安可也卧看自警編惕然自省持已不可不嚴也毋以妄想戕真心客氣傷元氣夜坐門屋梧桐月照清風徐來料得人生皆素定空多計較竟何如天意順時為善計人情安處是良圖請看風急天寒夜誰是當門定脚人十二月初十夜夢云萬家喬木動清風凡事不可用心太過人生自有定分行已則不可不慎庚辰㸔史數日愈覺收斂為至要不失人亦不失言打㸃平生日録感慨係之矣人生須自重不怨天不尤人下學而上達當佩以終餘齒夢云自畫者徳不進又云自知不足者可大受而逺到日行吾義吉凶榮辱非所計也聼天所命食後髙卧東窻羲皇上人乎夢誦詩云丁寜莫伐簷前樹聼我髙堂紅杏歌又夢云矯矯髙樓卧白雲食後倦寢夢朱子父子來枉顧辛巳趨炎者衆人所同尚徳者君子所獨夢云等閒識得東風意便是橋邊鳥鵲春髙卧閒窻緑隂清晝天地何其闊逺也游後坊登山椒坐磐石意甚適也欲構覽秀亭于此無陟降之勞莫歸新月一鈎矣閒卧新齋西日明窻意思好道理平鋪在着些意不得彼以慳吝狡偽之心待我吾以正大光明之體待之㸔前去年日錄倦寢細思平生學力止於此精神日向衰憊俯仰悵然空生世間也壬午詩云戰戰兢兢如臨深淵如履薄氷七十二嵗方知此味信乎希賢之不易也夜静卧閣上深悟静虛動直之㫖但動時工夫尤不昜云程子云五倫多少不盡分處至哉言也學至于不尤人學之至也吾聞其語矣未見其人也㸔儀禮圖閲舊日錄倦寢程子七十歳化犬馬之年七十二矣何如何如夜來枕上静思一味聖學帖然終此餘喘已而癸未觀遺書數條西照明窻玩夫子之言如飲醇醪不覺心醉也徐歩墻内㸔秧生塍静中春意可樂也甲申静中觀物理隨處有得看乙巳丙午日錄感發多矣乙酉閲近數年日錄萬事不必計較徒勞心耳廓然而大公物來而順應大公仁也順應義也曉窻自誦云欲成美績須究良圖非夢也忽自然如此耶誦豈鬼神有以警我耶當大書于壁日求少進當事之危疑見人之措置邵子之教也丙戌遺書云人當審已如何不必恤浮議志在浮議則心不在内不可應卒遽事玩聖賢之言自然心醉不知手之舞足之蹈也丁亥曉枕誦易㸔去年日録惕然興感不敢不以聖賢自任日思奮勵庶不負友朋之誼也夜㸔語類不忍釋巻但虛病不敢久也徳性學問不敢少怠但恨歳月來無多學聖人無他法求諸已而已吉凶榮辱一聴於天君子顧自處何如耳豈以自外至者為榮辱哉天道福善禍淫君子但當謹守先聖賢名教居易以俟命而已昨夜夢誦云豈能存養此心之一豈鬼神教我哉午後㸔陸宣公集及遺書易一親聖賢之言則心便一但得此身粗安頃刻不可離也倦寢得句云逐日從容深燕養憧憧慎勿役私心閱舊跡偶見先友羅得昌先生手帖為不肖困於官糧事嗚呼噫嘻若要熟也須從這裏過聖賢氣象須臾不敢不勉觀壁間帖故友孔諤繡衣巡按江西時與先子書有云前與與弼契兄接談時頃探其中葢有威武貧富之所不能屈移者今雖蹇滯異日當為令器不必慮也惕然重書以警惰孔後任河南叅議戊寅歳僕在金臺時聞久亡矣戊子隨處惟歎聖人難學雨後生意可愛將這身來放在萬物中一例㸔大小大快活日夜惟知聖人好但庸資實難企也憩亭子看收菜卧久見静中意思此涵養工夫也程子云天地間可謂孤立憩亭玩語類三兩條不勝痛快朱子云此道日孤早夜思餘齡一味學聖人克其不似聖人者夜卧閣思朱子云閒散不是真樂因悟程子云人於天地間並無窒礙處大小大快活乃真樂也勉旃勉旃張思叔詬罵僕夫程子曰何不動心忍性朱子云不哭底孩兒誰不㑹抱又云處順不如常處逆動心忍性始成功午憩亭静中胸次澹然午後看日録天晴仰思物理今日觀書感慨多矣但精神短不敢久可惜少年日月也恰别處一近事薄哉風俗嗟乎自己徳不可不厚也戒之戒之㸔晦菴文集倦卧仰思至理有契不覺拊席寫文集一紙曠百世而相感者抑不知何心也觀晦菴文集親先生之教令人超然於世萬慮俱消竊思當時立於其門者宜何如哉家事時嬰懐亦當順理而行情順萬物而無情可也倦卧仰思古今國家治亂得失及人家盛衰得失為之􅏮然無時無處不是工夫暫遊大門之外桃李爛然日麗風暄先王以茂對時育萬物日親聖賢嘉謨何幸如之但恨讀之晩矣早憇自得亭親筆硯水氣連村游魚滿沼畦蔬生意皆足樂也施為欲似千鈞弩磨礪當如百錬金年老厭煩非理也朱子云一日未死一日要是當嵗月如流而學徳有退無進有志之士其興感乎無感乎玩遺書意不知所向安知斯人之為功聖人之責人也常緩便見只欲事正無顯人過惡之意觀五峯舊稿感慨係之矣夜思平生經歴五更方寐聖人未嘗忘天下果哉末之難矣逐日親聖賢名教甚幸但漸期寡過而未能也玩易黙而繹之不勝痛快但恨歳月來無多早盥櫛後東軒親簡編竹日明窻意初回鄉時石泉柱帖云欲到大賢地須循下學功回首近六十年矣大賢地何日到耶於事厭倦皆是無誠天下之至賾而不可惡天下之至動而不可亂廓然而大公物來而順應倦卧養病思已徃踐履及聖賢名教卧起天向暝矣雖萬變之紛紜而應之各有定理康齋集巻十一
