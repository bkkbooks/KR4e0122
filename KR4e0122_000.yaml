body:
  text: 康齊集别集類五明提要臣等謹案康齊集十二卷明吳與弼撰與弼字子傅臨川人天順元年以忠國公石亨薦徵至京師授左春坊左諭德辭不就職詔行人護送歸其集初刻於撫州凡四卷嵗久漫漶此本乃崇禎壬申江南提學副使陳維新所刻分為詩七卷奏疏書雜著一卷序一卷記一卷日録一卷跋贊銘啓墓志墓表祭文一卷其詩自永樂庚寅至正統辛酉皆編年以下則有洪都藁遊金陵藁適上饒藁金臺往復藁西游藁適閩藁東遊藁東遊饒州藁諸名而所注某藁止此之後又有附贅之詩蓋亦以編年續入者也與弼出處之間物論頗有異同尹直作瑣綴録詆之尤力雖不免恩怨之口然為石亨作族譜跋稱天順戊寅七月二十一日門下士崇仁吳與弼拜觀則其文今載十二卷中决非尹直所竄入陳懋德以薛瑄受知王振為解劉世節以孔子欲見佛肸為解究不能厭天下之心也其講學之功備見於目録第一條即稱乙巳夢見孔子文王第二條又稱夢見朱子後又稱丙子二月初一日夢訪朱子五月二十五夜夢孔子之孫奉孔子之命來訪辛巳食後倦寢夢朱子父子來枉顧此猶可云向慕之極因心生象於理或亦有之至稱新居栽竹夜歸其妻亦夢一老人攜二從者云孔夫子到此相訪則無乃其妻戲侮弄之而與弼不覺歟觀其稱隨處惟嘆聖人難學又稱一味學聖人克其不似聖人者其志趣之獨髙在此其刻畫之過甚亦即在於此矣然與弼之學實能兼採朱陸之長而刻苦自立其及門弟子陳獻章得其靜觀涵養遂開白沙之宗胡居仁得其篤志力行遂啓餘干之學有明一代兩派遞傳皆自與弼倡之其功未可以盡沒其詩文亦皆淳實近理無後來滉漾恣肆之談又不得以其急於行道速於求名遂併其書而詆之也乾隆四十六年十月恭校上總纂官臣紀昀臣陸錫熊臣孫士毅總校官臣陸費墀
  hash: sha256:c35faac1de0d1a57309a6d8219b0676f816c04ad93fa4e21aae34fee00a1b92e
