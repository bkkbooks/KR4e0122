body:
  text: 康齋集卷二明吳與弼撰詩元日宣德丙午去年程課略加勤今嵗深期日日新萬事何如吾道重丁寧莫枉此生身遣悶講學無功德不修不才甚矣可無憂青春回首今何在堪歎人生易白頭發舟弓家渡囊書喜上省親舟千里山川盡舊遊家慶新歡堪計日前程漸次減離憂贈傅秉彛洗墨池邊春草長重來懷舊意茫茫蹉跎容易青春晚秋鬢能禁幾點霜清苦吟清苦丈夫志風霜善自持陽和非不愛義命貴安之即事磊落羣峯徹曉雲柴關間出為晴曛逢人偶學占秧候活水渠邊手自分晝坐外南軒南忩北牖透晴光花木參差日正長舉目無非幽賞處不知何地是仙鄉絶句竹户風光軟花軒清晝遲蒼苔人迹絶淨几獨吾伊間趣野水雲山隔市塵日憑間散養吾真茅廬周匝多芳樹行處清香暗襲人夢覺作靜夜迢迢獨覺時寸心凝斂絶邪思聰明睿知何從出作聖之功信在斯紗陂長瀦石罅氷廣浣溪中雪清風生夜寒泓澄浸秋月大同峽秀峙交翠屏清冷響寒玉谷鳥時一鳴蒼苔此幽獨曉起夜氣春融和曙光晴皎潔漠漠碧雲端斜露清霄月羅家園湛湛芳草池翛翛碧霄竹倚竹漱春流清氣滿幽谷李家山擕琴兼載酒童冠偕躋攀浩歌碧雲裏落日松風寒徐家山大路臨青山蒼苔蔭清樾幾度縱芒鞋送賔此為節石泉石泉千古名悠悠四時緑清潔乃素心白雲一茅屋東陂迢迢透長源滔滔流晝夜幾曽瞑目聽應悟安行者東忩誦陶詩時和風雨調緑疇日滋長吾意良淡然晴忩坐虛敞竹蔭連琴書幽苔隔塵鞅流誦徴君辭伊誰嗣清響偶書倦出尋常止茅屋妄想潛消思寡欲但恨青山雲未深更欲移居問窮谷枕上作為學曠鋤犂事農疏典籍學弛心性蕪農惰飢凍逼二者貴兼之庶幾日滋益奈何疾病纒蹉跎旦復夕即事獨步孤村去從容玩我書稻苖時雨後山色晚晴餘性也何曽染心兮此正虛歸來帶明月夜興更何如燈下作日日勞筋骨心中未免疑細思貧賤理素位合如斯贈黃徴士卧疴白雲中苦心正懷舊忽枉故人盼青山得攜手晴忩坐南薰薄言勸春酒眷然惜離羣問答殊未久荒村多寂寥還能重來否寫懷戊申十月服闋作意緒依依萬感餘羸軀應向死邊蘇哀歌欲寫難成調幾傍霜簷對月孤冬夜枕上作遙憶當年學立身兢兢常恐暫埃塵孤風自許追千古特操何曽讓一人因病簡編尋曠弛離羣踐履轉逡巡中宵忽感平生志回首空過七十春與學者戴輿煢煢失怙未能言鞠育劬勞仰母憐稍及成童知擇善才鄰弱冠已忘眠鏡當塵積光難緝車向途艱勢易顛從此更敦千古志躬行心得好拳拳自歎少年不學浪悠悠老大無成空隱憂寄語青春強健客及時黃卷好埋頭寄李子儼楊栁城頭亂絮飛殷勤客舍再逢時山中有約遂何日羈思悠悠謾寄詩感懷靜把平生一細思可堪桃李不勝吹何能挽得千溪水淨洗靈臺一片私龍窟渡拜先曽祖楚江先生墓青山逺入避紅塵遺魄千秋此水濱荒隴淒涼重拜日細從諸老問前因遷居小陂小陂橋畔記吾廬七載經營今陟居一片靈臺無别想孜孜惟是聖人書夜坐古道寥寥不易尋秋風楊柳感人深虛堂寂靜無言處黃卷青燈求夜心冬夜懷古二帝三王隆至治臯夔周召和應同斯人何幸生斯世一體君民瑞氣中孔孟孶孶論要道顔曽公萬實同心滿門師友更酬酢此樂當時知幾深濓洛關閩道中興遊楊黃輔一時生大明日月當中麗多少祥雲與景星晝寢覺作己酉病思昏昏午夢還熟思厯試鼻應酸欲知松柏孤高處須向隆冬雪後看懷孔御史二首曽向嚴親舊稿中覩君尺牘語舂容知豫大過深增懼幾度相思細省躬幾度相思細省躬可堪名勝恥無窮欲求實勝何由得黃卷須加百倍功晨坐東齋寂養資良宵清晨趣應好芳露盈華園碧嵐靄春阜虛齋獨危冠晴光爛忩牖一玩謙亨辭冷然滌心垢間興貧居日寡營動息得自眕自安自得為眕時課諸生餘還共兒童哂出門望舊山緣籬探新筍歸坐夕風清間情寄瑶軫次學者韻欲説男兒事竒功未易收靈臺須靜養物理貴精求嵗月忽向晚關山阻且修分隂宜痛惜驅策莫遲留暇日偶成寸心如水淡無波四體安舒一氣和有客到齋終日話懷開應喜善人多病中枕上作一念之微須致精公私王霸要分明毫埃絲垢宜揩盡剛立成心大路行纎私滌盡未為難要識時中是孔顔此箇路頭何處問苦心空使鬢毛斑律身須禮不容疏公以治心其庶乎二者沒身而已矣不知人世有榮枯新居即事幽賞平生志安居此庶幾青山環逺近碧水帶東西接舍惟樵徑連雲只稻畦遺經間恣閲心迹總髙棲改過四十應當成德時中心何更有他岐其終也已宜深察剔拔毋令利暫縻即事養病私欣得自由日長卧看魯春秋悠然詠到忘言處一枕清涼午夢幽省己此心一失栽培力幾向窮途不自持靜裏反躬深省處風霜却是進修資處困遇著艱難須用心毋令放下便淪沉此關若得千里透信有人間百錬金寄曰讓祈門訓導優遊新趣佳山水仰止前謨近聖賢朱子父母之邦六籍日須鞭策進寸心幸莫利名牽杏壇鐸曉光風滿蕙帳琴寒霽月懸從古男兒當自奮賸將事業答青年冬夜步月懷劉悅學先生讀罷間吟緩出庭月華如晝院澄澄恍思玩易京師夜曽向吾師學看星枕上偶成為學如登萬仞山層崖須用小心攀前頭儘有無窮趣只是工夫不斷難冬至夜枕上作深造工夫靡敢慳近來又透一重關心思只在聖賢上夢寐不離文字間斯道極知顛倒易一身痛惜把持難微吟又是陽生後細省迷途駕速還晝寢覺作眇然方寸經綸本萬感誰憐此地危當失之動欹枕細思敦艮旨幾人曽向吉中歸寄羅秀才衰謝無才甘陸沉何煩青眼特遙臨歡欣便若平生好慷慨深投半百心莫逆尚期清夜話有懷先寄白頭吟卜居願與嘉謀協早向春風聽好音中堂即事燈明几淨室清幽滿眼圖書託士流滌硯間書新得趣廓然泰宇淡何憂除夕擁罷寒爐小酌餘挑燈又近古人書一枝粗定身多幸此地應逢兩嵗除元日紀夢庚戌為學平生慕至真孜孜明德與新民朝來枕上添新喜夢裏猶深激勸人夜讀疾風吹雨霰交飛獨撥寒爐夜半時喜得諸生清苦共小忩之外尚吾伊誦晦菴詩次韻誅茅遂幽獨愜此林壑清太和釀羣卉天香滿衣纓病軀無餘事先人富遺經自陪二三子明忩共經營待月西齋逺愛雲山近竹林藝編堆裏更瑶琴時行時止憑誰説待月西齋自養心曉枕作少年意氣凌秋霜直欲追古豪傑參翺翔老去何知萬事曠空令感激增悲傷嗚呼古人及之良不易後生慎勿輕流光溫楚歌上國曽傳此調清經年多故忘當丁虛堂永晝重溫處吟到多情是故聲門外間坐習靜生憎損病心晚涼門外獨橫琴呼童細剔溪頭樹為愛青青雲際岑獨步偶成暫出孤村縱野蹤晚涼歸詠更從容盈眸好景新晴後人在乾坤清氣中題唐山書閣流俗滔滔利是趨居家髙閣獨儲書絶韋逺紹前人緒麗澤頻來長者車香雨藝忩春杳杳清風蘭砌日舒舒小陂茅屋應相近時喜諸郎問魯魚私一念私才起風波勢便增若非鏖戰勇方寸幾時平分萬事須由命勞苦徒喪亷若非安得分儘快未能恬名利眼前名利日紛紜擾擾何由得性真置却身心貧富外始知世有出塵人苦熱觀晦菴詩集炎熱侵陵夢少安茅簷無地可盤桓絶勝黃卷多氷雪朗誦令人骨髓寒讀罷枕上喜而有作讀書進處心私幸更把精靈禱上天願假數年無病困尚當努力繼前賢枕上默誦中庸稍悟一書大旨喜而賦此句習章燖幾十年其於統會每茫然一朝似得優遊力擊節深歎聖嗣賢至日感懷屢醒長更夢頻添暮景愁盛時剛易失多病苦難瘳長困荆榛境終非鸞鳳儔徘徊當令節休復慨前修臨流瞑目坐辛亥物外元無我間中别有天臨流時抱膝此意向誰言寄葉郎中潔居萬事愧吾徒十載猖狂一薄夫貧病不勝書課減怠荒常是力行疏愁來無地堪容足老去何時可復初忽辱髙明千里念題詩遙望獨長吁枕上作仁者無怨尤節士多飢寒至理無定在君子隨時難連珠求藥歸道中作問藥歸來出白雲輕身隨處玩餘春會心偶記前賢詠得自由時莫厭貧懷舊意曽彌月寓東坪童冠相親八九朋月色滿簾天似水書聲徹曉院如氷賢關總擬爭先入塵鞅何期竟久縈愧我只今空白髮不堪回首負平生夜牧涼氣蕭蕭露滿衣碧天如洗月如規浩歌一曲孤村寂緑樹隂中牧犢歸講罷偶成萬事應須任所遭胼胝農圃敢辭勞西齋講罷心如水又對涼天霽月髙東忩偶成虛忩寂寂隔紅塵蹤迹雖貧樂甚真法帖謾陶間裏趣髙眠時養病中神灌禾田頭一一荷鋤過自放寒流灌晚禾隨分不辭筋力苦坐看明月好懷多東齋讀晦菴先生詩次韻朝朝黃卷自埋頭物外從教春復秋座接好山青繞屋門迎活水緑平溝舊花匝徑紅如織新竹成林翠欲流課罷幾回間徙倚誰憐心賞十分幽贈山中人徐步春山日未晡石橋流水竹扶疏為求桑柘乘時種一一煩君手自鋤遊山自大同東坑過連珠東風新霽好懷多又復携琴訪薜蘿幽賞正宜窮窈窕遐觀時喜陟嵳峩寸心好共寒流淡一氣應同淑景和迤邐不妨歸步晚暖煙涼月助吟哦遊山自大同西坑過玗溪麗景尋幽日日宜杳然身世在皇羲芳林賸馥徐行際涼石濃隂小憩時勝地到來心自醉吉人逢處話忘疲夜深更酹家山月不憚煙村歸去遲題桐岡茅屋逺却囂塵製芰衣野塘安處憺忘歸良疇佳圃怡朝夕白水青山省是非醉裏乾坤類箕潁間中今古在皇羲人生肥遁如斯足多少功名與願違病中倦卧偶思年二十四時寓居東坪與諸生夜讀賦玩月詩微吟一過神思灑然遂次舊韻舊吟誦罷病魂清猶幸靈臺一點明煆錬雖然愧金錫戰兢不敢步淵冰未容餘日甘衰朽尚擬諸生更老成世澤依然詩禮在好將塵慮靜中澄懶吟時止時行學養疴人心天氣共融和好懷却怕詩拘束不似前時苦思多同士當度橫琴嶺仄徑依微落照殘行臨絶嶺暫怡顔他年記得耽幽處煙樹參差逺近山寄士當兩地相思渴一逢忽從華里共春風通家不減平生好指掌深論别後功翠嶺遙承扶疾送狂言多謝放懷容人事相應從漸省好伸前約向中庸約來講中庸同孫修撰曰恭賦詩留石源黃宅野徑聨鑣日山樓對榻時素心同似水清興各留詩贈曰恭大地收新雨春山張舊容髙人淹信宿佳興共和風麗澤資方好離歌唱却慵更懷賢叔氏何日定重逢題友琴軒欲將心事託雲和髙闢幽軒逺綺羅好景洽來人似醉纎私絶處海無波天髙地迥雲煙散電掣雷轟風雨多我亦平生耽此趣把君詩卷重摩挲宿黃徴君館負炎困行邁息肩稱幽懷囂塵自茲隔好景從天來林靜風荏苒池清月徘徊細交知已談佳興何悠哉題北溪松隱縣北溪頭松幾株婆娑長蔭隱君居緑隂寂寂間吟處清籟悠悠醉夢餘老幹氷霜饒凍裂盤根雨露飽沾濡不知桃李春風態得擬髙標萬一歟贈宗人士彰筍輿遙辱到清溪霜鬢俱憐識靣遲緑酒細論宗族誼青燈頻析古今疑光先事業根須厚為已功夫志莫移别後分隂勤愛惜重逢未卜是何時題南園塵世誰無數畝園箇中清致幾人憐石橋近接雲煙墅苔徑旁通薜荔泉靈藥嘉蔬紛繞舍碧桃紅杏爛遮天幅巾方杖逍遙處世與羲軒共杳然題雙貞堂孀居重見古今悲一室雙貞天下竒粹玉精金同姓字霜松雪竹表心期髙蹤合繼前賢傳懿範宜為後輩師多少髙談仁義者幾人無愧柏舟辭題大和堂天人一理費形容須向三關透後通一氣坱然穹壤塞四時順布古今同絪緼總是吾心妙保合應須日用功琴到無絃何所道始知君子只中庸題聽松軒曽向髙軒共好音乾坤浩蕩境沉沉恍然指下迷宫羽不信人間有古今瀑澗夜寒鳴雨歇風林晝靜落花深回看勝事已成夢難寫淒涼一片心題竹所富買江干修竹林洞門苔徑蔚沉沉略無塵土雜幽夢時有天風來好音千畝秋霜君子操萬竿春雨化工心筍輿未得乘佳興漫向良朋寄短吟題翕樂堂宜家信是順親方歸有餘師好細詳道要何曽離咫尺事幾應不過平常塤篪並入春風軟花蕚長和化雨香至德茍能躬不怠滿門和氣自多祥題琴室一室何妨似斗寬中含太古興瀰漫春風几席朱絲緩夜月軒楹玉軫寒天聳雲峯晴簇簇花穿香澗暗珊珊纎埃不動沉檀細身世分明在杏壇題野塘新墅新卜衡茅靣野塘起居長在水雲鄉庭無塵雜心應逺架有圖書貧是常多種桑麻承雨露任教氷雪積松篁升沉信有平生分肯學春花逐艷陽宿金石山間宿仙家陟翠微石壇曠望本無期輕煙雜樹新晴後近水遙山薄暮時興逐髙歌春脈脈心懸往事意遲遲素懷欲共何人寫獨詠東風月滿衣除日奉和族叔父仰學先生見寄詩韻弱質何堪終日病不才誤染一年塵痛慚舊學功焉用空感春風嵗又新困鬛正憐魚圉圉芳心誰似木欣欣題詩逺謝吾宗老總抱沖襟未易伸除夜感懷虛堂遙夜憶京師十八題詩尚記之二紀光隂何太疾百年事業竟奚為良時孤負追寧及多病侵陵悔已遲從此殘魂須愛惜間人間話不相宜元日即事甲寅初晴天氣極清妍况復琴書共晏然心靜自應春似海身間轉覺日如年親賓漫得諸生應疾病多便白晝眠凖擬花隂分半榻無懷世上玩先天題雲澗幽居一帶寒流浸白雲千林紅葉訪徴君小橋亂匝青霄竹古屋多熏舊日藝細語溫淳兼對酒素琴沖淡更論文欲尋後會無由得漫喜諸郎繼典墳寒夜朔風雨霰夜漫漫病骨偏驚敗絮寒應有賤貧寒勝我斯人誰道一般看寓寶應寺二首晝夢無人攪春忩一味幽芳心憐露草清韻愛晴鳩蹤迹何須泥琴書且暫留微吟時出院隨意弄寒流古塔多髙興重臨又幾年雲煙清曉際花柳仲春天病眼得無恙塵襟已曠然題詩人欲去好鳥正蹁躚出城道中行色一身輕春山鳥亂鳴好懷人共賦佳興自能乘花塢官橋曉雲林牧里清素心無物我取次話平生放水秋風淅淅月輝輝又是田頭放水時坐倚老梅怡病眼偶逢佳興一題詩贈友人琴書深託緑蘿溪風月何人共品題流水舊穿幽徑轉喬林新與碧雲齊一犂春雨兒耕稼百甕寒泉自灌畦隨分無非安穩地相逢何必問丹梯即事小春風日佳意適渾無我兒女笑相隨緣山摘霜果懷曽祖楚江先生乙卯先生苦學紹專門貧賤逾知德義尊惟是劫灰堪恨處不餘一字示諸孫懷曽叔祖修輔訓導先生先生清苦古人儔六籍研精仕更優愧我癡頑成底事幾回遙感舊弓裘聽小女彈琴幽棲心迹似洪荒花木隂隂日正長讀罷又親忩下枕薰風一曲午天涼同陳正言登李家山次朱子遊山詩韻靜來榮辱淡無驚却喜間身去就輕心目開明隨地好山川竒勝自天成短笻密倚經行穩磐石徐登發詠清却憶攜琴曽此憩塵寰寒暑幾回更出遊晴光又值小春天兒女嬉隨度野田香稻可人時有賴紅塵隔我利無牽平岡暫為尋幽厯細草聊因養病眠隨處會心皆妙境乾坤生意總悠然閲舊藁畢偶成丙辰連日頻將舊稿披恍然如夢對當時知非已晚嗟何及空使殘魂詠小詩春日物我悠悠付兩忘莫春天氣體平康竒花雜映階籬爛佳木頻分户牖香童冠芳盟六七輩聖賢名教兩三行呼兒杖䇿嬉遊罷又復髙眠向北忩枕上偶成嘗聞洪範思能睿只恐邪思亂性真能於思處分真妄便是存心格物人妄想能除心即清心清一氣自和平時行時止非人力慎勿憧憧役此生偶成竹樹隂隂隔世塵吾伊聲裏著斯人飢餐渴飲聊隨分信是間中别有春宿周舍暮色看山罷清宵寄此樓細思名教旨樓有三省字衰懶是吾憂宿湖田萬氏數家書屋湖山上我愛湖山幾度遊下榻又從髙閣卧炎忩風雨似清秋木黃嶺偶從佳地又開顔久坐涼飊意轉間平野曠然清逺目白雲深處指閩山宿慈明寺一宿蔚藍天炎襟自灑然五更涼夢覺心賞淡無言寄宗人士彰客路迢迢擬訪君細論心事慰離羣新晴無奈歸程迫空向青山望白雲山家老兄掃徑遙迎客令弟焚香好煮茶自有一般淳朴處稻花流水兩三家贈陳廣文承吾師楊𢎞濟尚書先生來命下顧不肖偶送鄰翁語隔溪遙瞻騎從識儒衣九天逺達尚書命野水荒山倍益輝孫氏賢母詩丁巳曽向遺經慨小星柏舟三歎有餘馨髙蹤百世能同調不負皇天降此生秋夜感懷當年曽苦讀書心斯道寥寥強自任不謂厄窮兼疾疹蹉跎空得雪盈簪寒夜枕上作屋弊風如箭衾單人似氷但憐妻子病敢計此身寧夙志空懷古迂謀拙理生體羸何所作漫喜此心平枕上絶句風雪無眠夜泠然細省躬此心誠易失物理倍難窮小年夜俗以嵗除前一夕為小年夜虛堂明燭小年時子弄瑶琴父詠詩會得心中無事旨樂夫天命復奚疑溪畔偶成戊午偶來溪畔愛陽坡瞑坐光風養太和幸託林泉交物少故於情性得功多長塘道中講罷歸來日向沉嫩涼徐步愛輕隂芳林秀町盈眸好誰識乾坤造化心月夜月色秋邊白人心夜半平一塵元不滓髙枕玩虛明璿慶夜讀喜而賦此勉焉八嵗知勤學焚膏過二更聖功從此始道只在人𢎞中夜偶成病枕醒來鎮不眠起看星象聽鳴泉寸心斂處能容物始識天君本泰然挽梁節潁水翺翔邁等儔亭亭丹桂倚髙秋姓名未達黃金闕夢寐俄驚白玉樓堂上幸仍新滫瀡庭前堪付舊弓裘盈虛消息何須計沒有清芬是乃休夢戴時雨訓導記得當年聽説詩客忩幾度解人頤清風久矣隔今古又向良宵一夢之懷族叔父仲學先生憶昨相論古市傍我才逾冠叔方強聖賢事業心皆醉問學工夫日共忙信是中行難體會也應夙志易荒唐秋忩卧病思君處空愧蕭蕭兩鬢霜蓮塘己未蓮沒不知年塘稱尚如昔念我名不稱長生諒何益何家山修竹淩青𡨕喬林鬱蒼翠三世託吾廬嬉遊十經嵗坑裏青松夾廣路緑水連芳塘茅屋八九家風俗如虞唐南坑田宜晚粒香池濟秋陽曝南坑專此嘉吾人竟何榖南岡憶年童稚時逐侣于茲牧賡歌忘渴飢皥皥驅歸犢對門山土鼓供兒戲林泉多珍味風物自依然流光换人世下厫山為童多此遊負薪給吾㸑幾度江湖上青山夢中看于家陂兒童隨伯氏漁此供賔庖江湖四十載往迹惟神交陀上先生别母往京迢迢陀上路東去通康莊當年斷腸别觀者同倣徨承臨川縣侯李降臨弊廬賜以髙郵米麻姑酒喜與鄰里鄉黨共分其惠因成此句庚申泥尊滿貯旴江緑玉粒遙傳淮甸香白屋榮沾花縣賜喜從鄉黨一分嘗留贈湖田萬氏二首病違佳約卧柴荆虛辱衣冠事逺迎緑酒喜陪今夕話又將迂闊瀆髙聽朝來聽取别時歌善惡由來不共科欲向事幾明擺析工夫不厭讀書多贈故里親友跋涉西還訪舊居故人心緒總何如平生拙學無他技到處逢人勸讀書題柏堂并序郡庠生周圻生三嵗而府君沒母黃氏年二十六以節自誓嘗手植二柏于府君之墓今木已栱而黃亦六十矣族子民熙縣丞公嚮為求柏堂二篆以表其操自豫之復歸種湖也與圻好尤密且桑梓相望嘉吾鄉之有善事故樂道而為詩詩曰靈根親傍隴頭安翠蓋凌空已鬱盤嵗月豈勝和淚數風霜幾向斷腸看苦心循是天真易峻節當兹末俗難珍重賢郎能不匱髙堂特筆障枉瀾奉謝諸鄉鄰草堂遙復種湖濱此地相將二百春出處無能慚德義往來盛禮謝鄉鄰從今厚俗雖交善自古為居必擇仁海內喜瞻聲教逺時雍共作太平民小年夜絶句煌煌銀燭照良宵樂此升平荷聖朝門户恍思前甲子肅然世澤感迢遙除日此地棲遲忽嵗除萍蹤如夢對琴書宗門一一經過處共喜雲孫復故居除夜妻子團欒身少瘥故居風景慶時和老年襟抱無他感但恨讀書功不多寄謝楊憲副贈周禮注疏辛酉夢寐周公制作心遺編厚貺辱遙臨焚香拜罷時開卷感激於君定幾深題太古軒軒前化日正遲遲軒裏幽人自得時一曲雲和春萬頃杳然身世在皇羲種湖湖久難稽得種名鄉鄰聊共古今稱我來幾度遊湖畔何限徘徊異世情大橋鄉里流傳小小孤衆流挾束帖如無伊人何自卑其局試問為仁安屬乎何陂萬頃汪洋浸白雲潛滋暗助發生仁試於翹望雲霓處始見深功信有神江家山清眺長便山外山層巒疊嶂巧回環箇中自有無窮趣不惜芒鞋數往還城上松隱隱東南幾萬松翠華如涌四時同髙標獨傲氷霜表生意都歸雨露中讀春秋世情詩思兩悠悠老去何心復夢周風雨午忩春睡起間將吾志向春秋自訟徒爾昻藏生世間可憐此志久希顔如何白髮龍鍾際依舊身心就檢難約為惡都緣自放多私根隨處費消磨從今要術須歸約履薄臨深養太和陸大參賜胙畫省頒膰到蓽門極知雅意篤斯文獨慚淺薄將焉稱細與鄉鄰族黨論題石憲使慈壽堂西山淑氣藹蓬萊華館春風壽域開信是深功由我積固應餘慶自天來蘭階綵繡榮南服錦巷珠璣應上台疏薄豈勝膺授簡日同黎庶仰崇臺贈王太守榮滿漳州人皂蓋朝天日黎民卧轍時重臨俱有望竹馬候歸期示兒青燈父子話從容貧賤逾知樂意濃從此莫忘慈教旨詩書宜早用深功豐安道中宿雨初收淑氣回春山歸興正悠哉雲煙處處依微斂桃李家家自在開即事養拙柴門日久沉子勤習誦父哦吟始知陋巷簞瓢樂千載同符只此心奉寄家兄獨居迢遞憶吾兄猶記當年童稚情萬事相看俱潦倒流光如夢迹如萍寄胡子貞謬為何自可成章半百年華感興長惆悵故人頭總白青山歸夢繞蓮塘晝寢偶成老境日向逼學業靡所成空想古英哲悵然念平生子貞及一舍弟送歸途中口號久客欣逢故里遊山中風景值清秋怡怡切切偲偲處指點歸途去復休宿湖頭野境雲俱暝江空雨未休問程頻策馬燈火宿湖頭重遊瓜石感懷偶爾驅馳此地過故人消息近如何短筇白髮遙相迓暗憶流年一擲梭夜宿胡氏梅竹軒九韶季恆在焉梅竹幽棲處良朋偶盍簪留連清夜飲俯仰莫年心明日又南北轉頭成古今平生江海夢偏向舊遊深望家山感懷望望家山近故丘西風匹馬悵髙秋舊遊厯厯人如夢昨日少年今白頭追和劉秀野詩韻十首十載勞經營得卜寒泉麓雖乏囊中資幸安一茅屋桃李君自花風月吾人獨僑居非素心言歸事耕讀我居清溪曲繞屋羅青山白雲自來往修竹無柴關翹企古人躅逸駕容追攀悠然一瓢飲不知有塵寰莫春春服成嬉遊吾所愛至哉浴沂心斯言不下帶浩蕩六合間徹視寧有礙何事千載餘茲境稀能會夙昔聞太華聳拔何其尊未遑遊汗漫流傳少陵君羣峯無逺近環立皆兒孫何當脫塵鞅勝覽躋青雲樗散竟奚為無禽憐舊井夙志成蹉跎星流百年景俯仰起遐思空嗟聖途永閉關事微陽殘魂此其幸我思君子為洪鈞豈小補化日舒以長仁風被寰宇下視歡娛如區區焉足數安得千載人誰知此心苦王者大如何乾元物資始亭􅧆一何心家家自桃李固不令人怒亦不令人喜帝力何有哉皥皥皆仁里素心在丘壑衡茅隱松蘿時訪李鄴侯或親郭槖駝空谷響樵唱緑野喧農歌暝然日之夕不樂復如何恭默觀我生兢兢虞逐物立志在有為固當有所不圖史娛朝昏雲霞媚巖窟吾道卜終焉何心於象笏人生何所貴貴在為丈夫古今表表者脂韋豈良圖風霜竹凌厲氷雪梅清癯壯志一少懈焉足為有無宿樓府庵中客路欣同勝友行貪看山水一身輕幽棲逺就雲林宿明月清風萬古情歇馬髙林見水源時從明月詠潺湲不知浩蕩滄溟上萬折東趨路幾千宿格山禪林寺騎從勞英友秋山共客遊禪忩無寐處竹月涌寒流途中偶成日斜馬滑驚危石路暗人疲怯敗橋雷電屢防風雨至須臾明月露青霄奉寄黃泰莊先輩惆悵白頭吟雲山契闊深何當重剪燭細敘百年心秋夜清覺當涼夜靈臺正靜虛寒光皎殘月星象爛聨珠柬黃季恆連日青山共好懷勝遊清話兩悠哉詩筒又促乘流約佳騎明朝來未來洪都藁舟次打石港感懷不出門庭十五年舊遊遙厯重淒然昻藏徒有平生志容易因循雪滿顛璿慶同余李友登陸遊憩童冠相呼六七朋晴沙迤邐並舟行箇中真意人誰會慨想當年與點情獨坐偶成曝背墻頭獨詠詩風帆逺近鳥差池江干舉目皆真樂底事人心苦自私發桂家林故人迎候暫維舟行李匆匆去莫留白首相逢多病後西風斜日兩綢繆宿池港卧病衡茅久自私懶心只與白雲宜那知風雨江湖夜恍似平生涉厯時蓬漏不堪坐起賦此以慰余李諸友風雨疏蓬共不眠可憐此志在希賢誰能萬一朱夫子林范何勞逺接聨次桃樹港與璿慶登岸間眺憶昨兒童隨伯氏趨庭曽此繫扁舟重來俯仰悲華髮碌碌空過四十秋宿板溪離却蓬忩宿此溪青燈華屋又吾伊芳筵倦酌辭清醑隨意間裁聽雨詩詩罷吾伊尚未停擁爐更喜共殘燈工夫似此能無間何患當年藝不成跋涉長途未覺疲晦明不必問前期寸心始覺元無外萬事須知各有宜辭李氏宴特感華筵美意深不才自分實難任平生非欲多違忤恐負區區雅素心道中見梅虬枝忽見雪交加自在芳心閲嵗華客裏但貪春意好短牆不必問誰家望豫章城懷胡祭酒先生行行漸近豫章城煙樹微茫兩眼青野水平橋時獨立肅然起敬為先生璿慶失金人亡人得不須憐佩服嘉謨亦有年今日失金何足較自當觀理學前賢宿懸榻里有懷往事塵世悠悠幾古今偶投仁里一沉吟山川孕秀知多少何事先生得獨深拜胡祭酒先生一拜膺門百感并歸來猶自悵平生客忩展轉難成寐風雨蕭蕭永夜心留題伍氏館琴書信宿託髙軒細接襟期意豁然堂上塤箎春似海階前梧竹碧參天江山映帶供真趣田圃縈環慶有年不待有心行樂事自然至樂日無邊客夜苦心遙夜獨觀生時聽書聲雜雨聲但得晴明遊覽畢青山回首數歸程喜晴晨起呼童問晦明遙天紅碧報新晴江山豫有登臨約何處憑髙一暢情遊孺子亭次朱子詩韻孺子髙風固莫尋紫陽餘韻感人深乾坤那得有今古千載斯人只此心宿豫章城白髮悲心事青陽逼嵗除江城回客枕寒漏四更餘奉次胡祭酒先生詩韻摳趨百里親先執猶是當年老長官綘帳春風酣德教紅爐瑞氣盛杯盤客邊病思飢應忘江上歸心嵗已殘拜得新詩緣路讀梅花氷雪為誰寒問舟南浦客裏逢人漫説詩從教歸計尚遲遲時將澤國天然趣指點蒼茫一教兒此宿南浦詩也發南浦示璿慶及諸生細雨斜風竹葉舟長簔短笠泝寒流呼兒又喜新詩就麗澤何妨迭倡酬野宿滿江風雨泊孤舟舴艋能生逆旅愁佇立漸看西北好一天明月亂雲收月下行舟客衾局促難安枕夜半孤舟帶月操童僕總知歸去好寒汀魚貫不辭勞次槎江半月謳吟多勝賞太平處處共時雍江山又極登臨目圖畫天開杳靄中次嵩山長湖東北是嵩山山下人家靣碧灣今日竹林清逸處雲和一曲特開顔宿曹溪感興寺忙衝暝色度寒汀駐馬禪林月倍清東道欲知迎候盛髙歌又益四三生早行馬上口占斷續江村踏月行誰家茅屋亂雞鳴歡呼童僕愁迷道時聽雲林逺近聲次湖莽勝地久聞蕃俊傑歸鞭今喜到華居丁寧篤世無他術禮義多循飽讀書崔氏默菴偶成舊家文物總詵詵又喜深衣與幅巾晴色滿忩春可掬恍然疑對葛天民喜晴馬上口占客路秪愁風雨惡馬蹄翻得踏晴沙輕風拂靣春和煦到處江梅著好花宿潼湖霜樹糢糊煙水村投裝遊子夜􅒱門久知東道逢迎意特解詩囊為後昆舟中聼諸生歌詩行李寧家已有期雲帆更喜夜風吹諸生各有平安慶促膝聞歌往復詩贈同行諸生半月追隨謁國賓今朝分手重殷勤還家各記丁寧教私録工夫日日新次婁家洲翺翔藝苑少年時曾聽吾伊忘渴飢他日橘林洲上館華顛惆悵舊題詩洪都藁止此聼本宗諸生早讀金雞聲亂曙光微已喜吾伊動隔扉自是日新宜若此漫題詩句助針規懷孔御史當年曽辱報親書意氣深慚過許豫夜雨空懷人似玉華顛誰念挂鉤魚奉和族叔父仲學先生江湖半月忝為賔浪説文章泣鬼神自是秉彛攸好德誰憐觀過却知仁倦酣竹葉緣多病賸賦梅花為好春幸免非幾全素履未妨來往作間人弔先友孫博士先生憶瞻顔色自兒童回首官居一夢中試問寂寥先友記玉山多在白雲封留鳳棲原周氏中宵涼月添佳興際曉晴山淨好懷但得主人能好客幾時無事又重來以石竹雪竹諸字贈周余諸友節序明朝嵗已除青衫猶辱訪僑居預留拙筆聊相贈點畫雖疏意有餘康齋集卷二
