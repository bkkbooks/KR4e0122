body:
  text: 康齋集巻九明吳與弼撰序臨川陳氏家譜序臨川陳君正言以其髙祖王田推官及祖蘭雪聘君所筆其先世次事蹟倣歐陽氏法為之譜命厥妹壻吳與弼序焉昔嘗聞諸先子談在元茶陵陳氏之學之賢及寓甥舘手澤具在益深起敬其居臨川則由玉田推官於撫幼子隨侍既致政阻於元鼎之沸遂家五峯賢孫叔恭不失其家學仲氏叔華繩武而起於是臨川之陳不異茶陵之陳矣嗣其世者能不思所以奮㧞而可甘同於流俗哉大塘胡氏族譜序學者胡昪率其族人子璋孔明春暘鳳儀應塤等奉其族之譜來告曰吾始祖諱諒居成都濯錦橋二世諱讓仕於撫因家大塘七子徳信誠義居寂貴其後族繁地逼各卜其家於是有厚郭之派焉則寂其祖也有田東上郊之派焉則徳其祖也蘿谿之派則義之後而鳳儀其𦙍也東陂之派則璋也其𦙍薪坪之派則明也暘也其􅏷昪也塤也世居大塘而同為居之派焉信誠貴嗣已無續昪等懼原逺而末益分或遺本初而遂亡之也將礱石刻三代祖於上而小註於其下奠厥大塘之舊址庶幾各系世得以申其追逺之誠然而未知所以孝也幸先生有以訓予幼侍親京師且熟先君子稱誦吾里大塘文物之盛至今長老往往尚能道其槩覩遺文經故地未嘗不歛衽而徘徊也茍無請吾猶朂以振其族況二三子之懇懇乎吾聞應塤之先君子文易簀命子之辭曰某爾來前吾與爾訣雖貿爾田必教爾子以詩書博哉言乎詩書之道大矣讀而知之可以養情性尊徳行可以措事業而垂無窮豈特一家一人所當服也昪也其倡而宗之為父兄者廣乃先兄之遺言毋膠於流俗毋攪於利誘毋以貧賤而懾富貴而驕必卓乎其不撓而毅然久且裕而養羣子弟而俟其化率而宗之為子弟者奉若諸父兄之教命必正其志敏其力𢎞其徳期底於成功吾見族之多賢矣由是慕義懐仁者聞其風而仰其族過其里而式其閭莫不咨嗟以歎曰曰幸哉胡氏之有後也豈不可謂孝也乎哉昪等拜曰敢不祇承以省厥躬以進我後人求無負先生之辱於是乎書蘿谿胡氏族譜序菊軒胡公嘗命其子執中族孫世衡録其世系緘致先子求序既許矣未就而殁與弼間齊書帙輙覩舊題為之悵然以語世衡公之子鳳儀遂跪而前曰噫先志也先生其終恵乎予小子退而緝修之以請夫道人之善以示來者固君子之心而況父師之分者乎胡氏自宋已前世居大塘再徙蘿谿由蘿谿以來百數十載菑畬經訓如一日也或出或處聨芳競秀於兩宋之間者雖譜牒闊踈而可互見於李徐二公之序亦云盛矣咸淳之際如清伯梅村小村至元以後如省堂蘿谿國初如青山倣古輩皆一時之頴出其宗而手澤存焉者其他沐過庭之餘潤以縫掖其衣者前後纍纍也後昆之往來於予者方進而未止焉其經史百家古今碑刻及當時交㳺翰墨雖荐罹兵燹存十一於千百然猶大櫃小箧長箋短幅炳然而相輝也故嘗以謂談吾鄉詩書家必曰胡氏語胡氏又必歸之蘿谿嗟乎盛衰靡常惟徳是視未暇逺稽姑驗以近里之某家岡某家園聞之長老其盛時户多者百餘少者不下五七十三五十經其地名則是事已非矣高甍百桷為他姓之室者有焉荒墟野蔓為狸鼯之藪者有焉訪其嗣不一聞也當其快意時或貴耀鄉閭或富誇阡陌挾其所有孰不欲傳其子孫以百千其世而一旦如彼何哉禮義不循而惟知利以為利故也胡氏亦嘗盛於蘿谿而子孫乃猶絃誦於其地愈久而新者豈非世有以遵夫周孔之名教而然耶徳之淑慝戚休以之豈不較然哉後之覽者亦將有激於斯歟豐城于氏族譜序于族舊譜既多已逸彦實氏乃旁求密訪掇拾於殘廢之餘徵諸銘刻之文復譜之以請序於予其先山東之益都人漢廷尉定國之裔曰元素字季友者宋通判吉安子孫因家南昌之豐城曰華字去非者號竹圃與晦庵朱子同時朱子嘗贈以詩有折節慕前修之句及至房州守盡力兵間甚有功忠曰友信字盛卿者仕元為都昌尹以賑荒績進秩集賢提舉再遷龍興治中兼知路事子汝能以䕃仕廣東宣慰使都事父子俱有存筆率温厚和平藹然仁慈孝友之意是代以善相承者也今其𦙍散居鄉邑及乎旁郡彦實以其尊府贅諸孫是居敷山於分最長聨屬其宗尊卑情文不異聚居者焉竹圃墓在邑之興能坊為人屋之者數十年彦實累訟經嵗未決一日奮然歎曰與其理於訟孰若白於我耶於是齋戒沐浴十日率其族之父兄子弟躬畚鍤者積日而壙以暴誌以見撤諸屋凡若干楹乃敬修而封之以復其初人咸謂于氏譜既微而復著墓既晦而復顯莫不慶其先君而賢其後人予亦以驗夫福善之機為不爽又以嘉夫于氏中興之有兆焉蓋耳目一新之時正激昂蹈厲之日思昔聖賢不世之遇而有以勸於學思昔仕以敬其事而有以進於行思昔篤於家而所厚者不敢以有薄豈不愈賢矣哉而將來之慶吾知其汨汨乎川之方至也雖然幾不可玩志無容貳彦實既分尊於族而協於其衆盍黽勉其往以無失諸事㑹也歟豐安程氏族譜序昔四明時原貞浦城章士言三衢徐希仁教郡庠時予適寓外氏往來墨池良密一時俊士若傅綱輩相與甚善後周譚陳萬諸公繼學事予又主於墨池者數若梁節輩相與不減傅綱諸人故予於郡庠非一日之雅近以省墓之故僑寓種湖若周觀周圻十餘士聨翩而來程庸李章者嘗一宿於其家而承其父祖之歡庸族父志宏嘗述其世系一通尊公希善倣歐陽法復為之譜命庸以請序程氏世居洛中至駐泊公仕宋為太醫令高宗南渡改臨川令因家臨川之豐安市紹興中割頴秀恵安二鄉𨽻崇仁而豐安屬崇仁即今之西舘市其後諱畿者徙侯原諱淵者徙劉仙岡諱平者徙銅山諱才者徙大嶺諱利者徙金谿庸之曾祖幼亨教諭徙五峰仍豐安居者僅二三家夫族分若此苟無法以聨之不幾於汗漫無統而遂忘其先耶是則志宏之系希善之譜不大有功於名教哉雖然又有大者焉程自得氏以來莫盛於河南夫子所謂三代而下一人而已者予年十八九時嘗讀子朱子孟子集註至無有乎爾之章掩巻太息以為盡人也惟夫子接不傳之緒於千載之下每誦其詩讀其書想像其為人恨不生於其時又嘗適楚遥起敬於夫子所生之境而極其瞻望咨嗟之意嗟乎高山仰止誰無是心庸也講夫子之道於予矣況為之鄉人又同姓宜何如五峯李氏族譜序郡庠生李章㳺於寓舘之二載以交之厚也承乃父祖之命請題其家乘焉李氏世居吉州谷口諱讓者字遜夫豋宋淳化進士第仕信州貴溪令讓生傑字孟才贅於撫之臨川幕原因以為家傑生華實實無子華徙五峯生益順静谷口之譜亡於益益順無子静生恕恕生原祥原祥生敏章予宿五峯而知其家庭所屬豈不以謂世所貴於名宗著姓者代有聞人徳業修而聲猷逺也然則門戸重輕不在於章乎詩云無競惟人章其似之五峯余氏族譜序自予居種湖郡庠生來㳺寓舘者十數士予為題其家乘者三人余忠氏亦繼來請譜牒之書本為不忘其初而作於以傳信將來而世之作者或失其實甚至於借重他人而遂迷其所出何其惑歟然則譜牒徒為誇耀之具哉余氏所譜雖可知五六世然皆實也且族之顯晦在人如忠者年方殷可以積學而有待惟篤其志以不懈安知余氏之族不由忠以重乎奚其借韓家嶺周氏族譜序郡庠生周邦大氏曩承府主命聘予小陂已而予徙種湖裒然與其朋十數士來講學於寓舘而邦大桑梓尤近故㳺從之好問學之功為尤篤每相與談復古矯俗等事未始不慨然増氣恒誓以詩書世其家業又思以强其宗乃刪修其族兄民熈縣丞公所述族譜徵予言以為序且以為勸周氏自九一府君由郡城水西門贅於南鄉杜家坑杜氏杜無後而周益繁今稱韓家嶺周焉予獲接其族之父兄子姓而嘉邦大志於敦其本序而諗之曰族之興在夫尚徳者衆則觀感者深而尤在夫兆之者之厚其躬也五峯余氏族譜序祖者生民之所自而族者祖之支是以祖雖逺而氣脉貫焉族雖衆而本原同焉此君子所以貴於尊祖而收族歟然非藉於譜則逺者有時而或忘衆者有時而或離譜所以追逺而統衆也不其重哉而世鮮克舉之者弗思耳矣蓋有祖非其祖族非其族而譜者弗思之甚也是故人不可以無譜為譜貴於無所苟焉耳五峯余生奉譜致迺父祖之命以請題予嘉是譜之善而喜生方勵志於問學也故樂與言之生謂誰郡庠弟子規從予游於種湖云樟溪王氏家譜序王氏世居臨川之樟溪郡庠生常徵於諸父譜其可知之世來以請益於予自予居種湖郡庠來㳺之士各修其譜予皆不辭而序焉然奚足輕重其譜哉常事予最久誠能尊其所聞以自新而不已焉必有以淑於家以及於其族夫譜有不重者彼徒文焉耳雖百序其何益吉塘張氏族譜序正統壬戌春予攜兒子諸生抄書豫章胡先生李恪張循亦繼諸生至既而循偕兄實侍予劍江承祖景常父嘉謨命禮予其家二生誠足念兒輩恪重贊遂一㳺焉因以訪名山於樟木之鎮二三勝友壺觴勞中道俱至鎮之靈峯而止張氏少長追逐後先益懽明日復於始㳺之地倚樓賦詩而别甲子仲冬張修族譜成二生復以父祖命來請題噫吉塘予舊㳺而張氏予故人也其可以辭哉張之先三十六府君由撫州打鼔嶺徙居清江之官塘二世熈三世欣四世徹徹三子韜簡超簡三子一子徙下塘一子徙漁塘超三子中子載徙西塘季子建徙吉塘建而下亡其世次今譜自可知而已昔族分各盛其地號五塘張氏而官塘為最韜七世洽考亭門人著作公尤其特然也景常祖子孫咸歎思著作之為人而篤循等於學夫著作之賢人當企傚況族𦙍乎然流俗滔滔志紹其世者幾則張氏不其賢矣哉嗚呼廓是心用宏於徳曷量其至耶張氏勉乎哉烏知他日之吉塘不猶昔日之官塘乎又烏知諸塘不相觀而起乎張氏勉乎哉五峯朱氏族譜序五峯朱生邦政邦憲師友於予久故得其族之詳五世祖諱天瑞字國祥家豐城之杭橋後於姑因姓龔氏二生謀於同門周邦大咨於其尊據祖筆宗派事實作譜以復其姓而附先正草廬吳公邵庵虞公諸賢詩文於後國祥仕元鹽運司都目其從政也所在著聲草廬稱其為有用之器焉因官而家於撫子孫克世其美二生志皆存乎祖徳者族之衍蓋未艾也予獲覩杭橋譜其先本孫氏而嗣於朱竊惜其並列二族而未暇斷以大義如南軒所記又聞此特入嗣一派耳其舊族固衆也國祥其入嗣之末歟抑舊族之末耶湖莽李氏族譜序劍江之北曰湖莽李氏世居之按説文莽文從四屮衆草也湖地草衆固然或改作茫失之矣李之先來自臨川可見之世曰勝曰䚸曰孜代承於善孜次子從字伯順生五代晉天福丁酉卒宋天聖乙丑當是時居湖莾葢七八世矣伯順於兄弟敦遜讓於衆務施徳寛厚人也三子珪琮珝琮析小塘珝析大陂琮子秉珝子襄珪孫冕皆以儒術登仕籍秉與司馬公范蜀公為同年冕於晏元獻為甥舅於蔡君謨王荆公為寮屬率際當時名賢以薫徳而厲行自是衣冠接武族益著矣譜續於紹定間應龍士華再續於晦可刻梓於燾元季亡於兵訪得故刻於煨燼之餘訛其大陂之派與故老考補於甲午嵗者鑑也刻直圖於國朝洪武甲戌者鑑與徳扶及進也正統丁夘旭佐杲光輩命其子弟奎恪遵歐陽法重為譜先文之僅存者正其訛誤闕其疑以附於圖而續増事蹟繼焉㳺從之暇致諸父祖之懇示予請題而旭等繼至蓋拳拳乎爾祖者而恪也五七載始克遂迺志云潭江潘氏家譜序吳興潘君宏道訓導臨川郡庠訪予種湖之上而遣子學焉再訪予小陂風雪中又聨鑣石井先隴而豋金石之臺以其故頗及其先之槩潘氏世居烏程之潭江宏道尊府君祥卿洪武辛未始婿苕溪某莊而家焉既而潭江之族悉厄於疫祥卿且弗永年故宏道近欲追世譜訊先塋有不可得之歎予為賦潭江先址詩以述其情意謂雖無以髣髴吾先矣然即桑梓之地以顧瞻烟雲竹樹而徘徊焉亦足暢孝思之萬一云耳抑使後之人知潭江嘗為潘氏居也宏道未之惬馳書以咨鄉之耆舊尚兾聞其大較焉既不可得矣則譜其可知命使來告曰丐君要之一言仁矣哉君子之用心且曰不敢輙有附益惟傳信是尚尤得作者之體云宏道考績伊邇便道東歸拜潭江之涘時有新製宜飛以示我種湖高街韓氏族譜序韓為種湖舊姓尚矣予復居故里於韓為同社韓之彦曰永春愛敬於我三載如一日季父孟暄猶永春也二公懼丘壠之或蕪以湮也率衆修治而封樹焉懼昭穆日逺而日忘也謹祀田以勤拜掃焉懼族屬日繁而日踈也合少長以篤其倫焉復作譜以為紀載之本而屬予為序予以二公相與之厚也故不辭而為之書高畬吳氏族譜序吳氏由鄱陽馬鞍山徙進賢軍山湖之梭渚是為諱蟾府君三子昇燦晃昇析黄源晃析楓林燦生梅坡梅坡生九一九一生長一長一生大一大一生仲二仲二三子其季庚三由梭渚徙南昌鍾陵鄉之高畬庚三生祥卿祥卿生伯亨伯亨生嗣賢嗣賢娶宫氏生貞貞早失怙曠於學問既長恒感慨欲從師食貧養親未暇也年四十始㳺吾門同儕久益敬愛之予嘗贈以覲親之詞而題其柏舟之堂兹復序其族之譜云棠溪黃氏族譜序嚮予拜掃於紫石之坑識地主黃君克從吳君旭高今年秋克從以其所作族譜屬旭高將其中子亢宗來謁黃本姓金其先處州人當宋高宗南渡時金氏以武臣鎮臨川居城西隅子孫因家焉莫詳何代以逃難易今姓孝宗隆興間有細二府君者徙崇仁頴秀鄉之棠溪是為棠溪黄氏克從之先大父逺山公懼忘其本初也克從生即名以金少長且屬譜焉其用心厚矣與其表姓於名孰若復其姓之為愈哉克從既繼作譜之志矣推命名之意以復姓惟在一斷云爾彭原李氏族譜序昔先子學邑庠時受詩於困學李先生繼受春秋於先生尊府中山君子小子與弼於聞孫子儼族孫公迪皆辱愛焉而公迪數來講於學去年秋公迪致子儼君之命以其族之譜來屬序按李氏系出南唐當南唐之二世以大弟景達為撫州大都督封齊王居郡城曹家巷之慶延坊則齊王固始遷之祖而舊譜以宜春王從謙為第一世者誤矣譜創於六世孫翠蘿居士自是代有譜焉十二世孫叔權十四世孫志道十五世孫義安咸増修之而叔權謂舊譜往往簡畧遂推源尋派訪求悉紀善矣志道以書官書名寓勸懲為尚史例時之序引者同聲相和以為真得史氏法夫譜牒不為尊祖敬宗收族而作徒為予奪之書耶其間固有非勸非懲而著之若法院李等抑又何歟設子孫不幸大義當絶如包孝肅公所戒之類自當不繫諸譜又奚名為乎哉義安又謂丁元季兵燹器物圖籍無寸遺偶得先譜於兵士之手遂加葺理干戈搶攘之秋拳拳譜牒而先緒賴以不墜者義安之功也其義例法歐陽氏則自子儼二君始族雖散處而情誼相屬者世守祀田子儼君嵗一舉祀而㑹族之禮行焉故也欵洽之際盍益相朂於無忝爾祖哉務東周氏家譜序周吾母家也世居務東有文五府君者娶裴氏府君殁二子皆幼鞠於舅氏遂因舅姓而家於裴坊今四世矣周君顔仲與其從子元昂作譜以復其姓而偕周氏婿傅君汝恭往詢其世務東則族之耆舊皆已物故子孫多散處於外文五府君而上莫得而考惟鄉隣尚能談周氏之盛皆曰樓下周焉嗚呼與弼十嵗别母京師㳺又十嵗歸母卒七寒暑踣地號天墓側欲絶不能今又四十年矣每瞻望裴坊雲物與經是山川心輙如割尚忍題斯譜耶尚忍題斯譜耶裴氏族譜序裴氏其先閩之全州人宋季以㳺宦流止撫之崇仁先譜亡逸已久近彦文君偕弟彦信君慨世系寥闊諸塋無所紀録迺命與弼為之序與弼周出也周之先以幼孤鞠於舅氏裴府君與弼幼來外氏辱府君家恵愛厚故不敢以不敏辭夫裴君伯仲譜牒已謹先壠可以不忘如魏公矣若其立身立徳如傳所云則尤裴君之素願而後人所當盡心也豐城戈氏族譜序戈氏世居臨川西鄉之七里原國朝洪武初由七里原析豐城之玉溪者諱純字祥重也宣徳中祥重諸孫瑛㳺予小陂於時戈氏豐裕矣瑛孟氏敏義相慈親主其家指甚衆而家肅雍也予間適水邉林下而瑛從焉因語之宜及是時以勉於學云今年夏敏義以其賢尊某所刻族系為譜譜成命瑛復有請焉子何言哉亦惟向所勉者以勉之耳然學豈直詞章誦説為哉俾稱戈氏族者不徒曰士人焉又曰君子焉為之子孫者不徒曰學為士人焉又曰學為君子焉不亦善乎苟惟措其心於言語文字之末而不免於猩猩鸚鵡之誚君子奚取焉抑豈予之所望而亦夫人所當戒也吕氏族譜序劍池之南曰塘下有吕族焉居有先後而派各不同也其一曰吕王廟者唐時派也其一曰成公之弟祖儉謫吉州罷官寓劍池之木𤓰林子世隆由木𤓰林而來裔子傑之居舘下也嘗致其尊公開先先施之辱於予乃六月丁丑肅將其族姓之書不逺百里冒暑謁告曰惟世代之念敢踵門而陳懇又曰先譜流落叔世紅巾之變雖幸存於某氏而購未得也故祠有碑勒臨江孔氏之文兵燹殘闕無足徴自寺丞而上據家蔵謄録系圖而書自寺丞而下據家世授受而書蓋其族有徳玉翁者元季寓鍾陵洪武中來往故里當此時年八十餘約其生當在元中葉前耳目所接去宋未逺凡世代遷徙之由經履之槩歴歴能道而國初鄉隣遺老往往知其世者亦多傳至於開先始紀諸冊非開先之留心不日逺而日徽哉大矣子繼述之勤也三復之餘掩巻而歎曰嗚呼秦漢而後繼孔孟絶學者程朱氏而已而申公父子際程成公兄弟際朱千載一時之慶重萃吕氏一門何其盛哉予小子猥以不腆之辭厠名芳籍之末又何幸歟而子孫能不興起其仰止之心而激昂其修徳之志也耶吳營橋元氏族譜序元氏其先河南人字子晳者唐永泰中由進士令崇仁子孫世居衙後之米倉巻今則官易其地以為縣治之公宇而元氏亦家禮賢鄉之吳營橋矣邑志載縣南五步有令君遺愛碑刺史顔真卿為之書久亡令君之十五世孫宋咸淳進士凱字仲和號梅屋嘗續修其世譜既逸十八世孫璵字伯禹母黃氏讀書知史能記先系以傳自令君之二世至十二世則益盛矣十九世孫徳高命諸子貴淵貴沂貴源依舊系倣歐陽氏以譜焉予幼侍親京師聞先子每樂道元氏子孫來謁必喜曰二元之後蓋二元者伯禹伯常為邵庵文靖公之高第弟子也家蔵遺墨既遭元兵復罹水患殘編斷簡寶於諸孫貴澄氏竊溉芳潤未始不慨然起我高山之想而伯常贈雪樓之子之詩註云文憲嘗序先世文集則儒術固盛於二元之前矣又嘗親徳於徳高翁藹然故家文獻之裔間以譜序見屬既聞命矣而貴淵金玉三人者躍拜庭下蓋篤其先澤之心勝而忘予之淺薄也未幾翁暨冡嗣先後淪䘮予亦久淹於疾近貴源率諸子姓以譜來授則貴沂亦已逝矣感歎存殁之餘謹識而歸之長湖章氏族譜序章生獻嘗示以先文而知其為尚儒之族也獻弟朴從予拜胡先生於豫章其還也朴與從兄文英迓於南浦明日識賢尊定夫於嵩山而文英尊公清夫羣從競欲賓致長湖俊夫躍馬隔溪追莫及矣今年夏文英奉諸父之命來告以其族之世曰章氏世居臨川之白城派分南樓北店譜牒燬於兵不可追其代序矣吾祖諱震者由南樓婿豐城方岳洲之朱冐厥氏而家焉震生亨可亨可生原永徙南昌之長湖號桑洲白城檢校公於桑洲為族叔父而同為南樓派也檢校公元季平賊立功北店與檢校公之後無嗣已久而白城無復章氏之胄長湖一系僅存如綫惟負荷之弗任而無以永其家也謹因修譜復姓之初敢乞言焉吾聞章氏世讀書尚質而桑洲之規其𦙍曰勉為士毋淪於技又曰欽乃祖考篤爾同姓乃堂以隆祀而序族焉懿哉所垂之逺也桑洲逝而法如昨可嘉矣然流俗難祛而故步易失為之綱維防範者代可乏人哉此清夫章所為懼而有請也夫且所貴乎士者豈徒伊吾佔畢之謂必文行相資禮樂兼善然後無忝士之名茍華而不實豈君子所當勉哉嗚呼敦祖法崇實學章氏無疆之休其不在兹乎其不在兹乎狹源洪氏族譜序景泰庚午孟冬予㳺秋山之頭有立馬拱道側者問而知為洪生也後二日㳺其里因以訪之而識其族焉明日作朋走風雪來謝詢其世宋忠宣公之裔云未幾洪生奉先子伯朋所作族譜謁告曰先世居餘千嘗結昬豐城玕溪陳氏元有陳仲益者講授洪都髙祖伯仲㳺焉虞文靖公以女弟歸於我遂因玕溪以居而伸祖復餘千再世由玕溪析臨川之狹源先君著譜藁具即物故小子禎偕諸父作朋諸兄祥重相與掇拾遺墨就正有道願借重一詞於夫子九原為不忘矣嗚呼忠宣父子文學節義稱天下所謂曠百世而相感者歟接𦙍嗣披珠玉能不勃如歛容哉雖然譜輕重係乎人人賢否徴諸徳朂哉爾父兄子姓悉其心以象賢焉俾他日臨川之譜與餘干相交映而俱重則足慰作者心而奚假於予言周氏族譜序周君子瓛偕其族人公輔隠南及外氏子黃子良三人者以隠南尊公所修收族之譜相與刪訂而重修之以請序於予周氏世居邑南之文家橋静軒處士徙桑溪周君静軒之六世孫而公輔為七世孫隠南今徙沙堤云嗚呼世之於譜率多浮詞溢美以相高甚矣好誇之敝也夫惟犖落之士振其宗於徳義詩書之懿以不怠焉為足以顯其親於無窮而著其譜於不朽奚事乎馳其心於外哉周君其有感於斯歟族人子姓抑知勉矣夫鄉塘周氏族譜序豐城周順閒從㳺山間步月溪上因以及其家世焉其先臨川之戰平里人今居豐城縣西之鄉塘鄉塘之先由山塘而來舊譜火於洪武間不可知其遷徙之由矣僅存一圖於族人伯敬贅居之澳源按圖重為譜者伯張大猷也因是譜而加䆳密焉者尊公士肅仲父士倫也回禄災餘前蹟寥闊近代以來尚義而嗜學者累累有之而胡烈婦事尤壯偉皆著之譜矣傳謂先祖有善而弗知不明知而弗傳不仁嗚呼知而傳者固善擴充之以世其美者不尤善乎順也其倡而宗以力於世其美哉西廨彭氏族譜序五峯之西西廨之濱有彭氏焉其先都昌人不詳何時徙五峯字從善者樂施人也為橋凡八十由五峯之支出徙今地舊有譜流落田西曽氏久近彭君九璋命其子回從子俊咨於族人九經九鼎合族之長幼卑尊僉謀請於曽既逸矣輙次第其可見之世勒諸石且屋之為族譜之亭以展禮焉族之興也勃然矣嗚呼孰謂升降之幾而不繫於人哉予嘉彭君輩之鋭於首義而族之樂於隨也於是乎言興國汪氏族譜序興國汪氏鴻潛二子之學於予也其州牧樊侯不知予之無似徒以虚聲誤其辱鴻父兄宗族由侯故益激其尚徳之心焉而侯之與汪多矣鴻歸之九年潛復領其合族之歡心以諸兄從魁等所著世譜請於不徳之文汪氏世居興國之牌港仲敬府君由牌港徙樂平里之同步牌港之東有祖墓曰蔣三府君子孫世祭掃之豈興國始遷之祖與譜亡於兵無所徴必欲為之傅㑹是誣也今譜自可見之世而闕其疑得之矣潛之來鴻以親䘮沮潛與吾兒讀春秋凡兩月而歸家慶禮畢為我謝諸父兄而語諸鴻樊侯奬勵之重得不服膺書紳勉為令族以光爾祖而答賢侯耶事㑹難逢而時無再至其念之哉侯名繼金陵人去官久而民益思之云同安李氏家譜序李氏諱露奮者由鄱陽界田丞同安之同城子孫因家懐寧望城岡之檀冲中徙同安城北之南莊嶺永樂丙申予省覲太學次同安傳舍聞孫思誠招致南莊之上以教其二子性之宜之而季子尚在孩提也後三十有七年重訪舊㳺則思誠與冡嗣久物故宜之與季崇之克隆先訓博交當世縉紳以充其才性而以詩書華其户庭褒然為同安著姓可嘉也適成其族氏之編而請文焉予感夫逝者之不可作而重其後之有徴足為李氏慶也於是乎書述溪方氏族譜序方氏其先安陸人鎮國君文仕元為江西福建等處征蠻統制都元帥兼招討使封鎮國公子明威將軍仕撫州萬户府總管授世襲五世總管君伏節大明洪武初子孫家臨川之述溪與崇仁之郭墟予種湖故址於述溪桑梓連故得與方生文照㳺且嘗屬其世徳不可以無述也既而生以書經領薦教同安景泰癸酉七月壬午訪予同安城北南莊李氏之寓欣然以族氏書成告夫事患後時幾貴早斷世澤將斬之餘紀載少稽不逾逺莫究而遂忘其先耶懇乎生之用心也廓是心以念鎮國明威著功於其始而慨總管以節善其終追逸駕而貽嘉謀家法當如是矣同安黃氏家譜序子寓桐城何家圩嘗見禮於黃氏翠屏翁與仲子永常為論其世系之記述而知其族孫金之有志於斯也已而㑹金於秣陵欵洽連日夜乃記憶尊公菊忩所授次第之以請且曰十五載之心事云黃氏其先由鄱陽徙桐城之鹿兒城譜以兵燹而亡原仲府君國朝初徙近地之蔡家坂今同高曾之親聚處一地指逾三千食禄者日重而業儒者日多夫先積之徴如此而金也復倡其宗益隆於善方來之慶可量哉金為禮闈乙榜進士復㑹多士就試神京蓋將推其家族以達於邦宜愈自克矣同安丘氏族譜序予以尋醫問藥之故息肩桐城何家圩丘氏之里國子上舍生丘士安承其尊公志原之命賓致鯉庭以家譜請為序丘氏世居同安小南門同安坊元季之變志原大父濟民挈家逃難流寓同城考君仲華贅於邑南何家圩周氏因以為家志原君躬勤瘁以立其門户豐裕矣遣子學邑庠既升胄監仍隆師别墅以淑諸孫年過八十而篤勵之志不少懈古人云廣積不如教子丘氏有焉子孫其勿替引之哉上饒婁氏家譜序昔上饒周文婁諒承其父兄之命來㳺小陂未幾諒得疾歸行祖之贈有麗澤何時重起予之句後五年予自金陵經貴郡暫留賓舘接諸父兄子姓而觀厥世譜焉婁氏其先信陽人元季有韓子福者與其鄉人逃難南奔因家信城之盈濟坊在信陽故大家今上饒為著姓撫巻之餘病催歸志起予之云徒成虚語豈惟生有不豫而予亦焉能恝然哉雖然學之方凡目視耳聴口誦心惟善者從而否者改皆足以發吾聰明而崇吾徳業此古人所以貴於能自得師也況生也觀光禮闈俊㳺曰富樗散如予雖日同堂而共席奚能以資麗澤之萬一哉厠名芳籍愈以自歉耳上饒周氏族譜序周氏世居上饒古梁之周村譜亡於兵昭穆世次與其遺蹟子孫皆不能追憶矣惟傳聞宋有堂名天恩御為記亦不存焉近茂傑審理公嘗命族子文譜其可見之世正統戊辰文與其友婁諒㳺舘下以語予後五年予自金陵經貴郡青燈話舊婁氏之堂昔者之來䟦涉晨昏忘其飢渇蓋當是時惟懿徳是尚而不知踈薄之無足與徒虚譽是信而不知實徳則病是以誤生之辱也雖然予覆轍宜戒而生夙志不可以不篤世徳不可以不求堅金蘭之誼増華譜之重顧自力何如耳黃氏族譜序金谿黃衎黃衍氏一而族殊也近各著其世系以為之譜皆莫詳其所自來相承衎之先由南豐雙井徙臨川之厂下由厂下徙金谿之嵩湖衍之先由崇仁古塘徙金谿之程坊程坊與嵩湖桑梓連而衎衍締交密故誼同兄弟焉然平仲世希而善終者難是以嵗寒然後知松栢也豈惟交哉先正謂今之學者如登山麓方其迤邐莫不闊步及到峻處便逡巡茍能遇難而益堅何逺弗至也二生並學吾門有年矣慎斯言也以往輝黃氏之宗而生邑里之光也何有交云乎哉五峯黎氏家譜序嘗與故人黃季恒論五峯舊族因及其子婿黎淳家世淳亦間語焉黎氏浙人也再世仕臨川子孫遂家五峯三世諱益𦵏南鄉孟婆峯號尚書墳四世號月樓讀書尚書墳所𦵏十八里鋪號學士墳皆莫究其履歴之實月樓當宋末罷官復於尚書墳所搆日新書院以教授元累徴不起號南隠所居後名黎家坑五世諱謙六世諱友直中元鄉貢進士赴春官道卒七世字伯中是為淳曽祖故有譜近燬於其族人之手淳所譜特舊蔵神位及粗聞家世所傳耳其詳不可得而考矣惜哉使譜修於伯中時先譜固無恙而記憶為猶近今去伯中三十年矣更三二十年代序異而人事殊欲為之譜者不尤難乎淳也其於是舉良足嘉哉是為序舉林車氏族譜序車氏莫詳其所始世居臨川長寧鄉之稠源五府君者徙金谿歸徳鄉之舉林譜倡於十世孫用烈而贊襄於用正用彰用徹也五峯李公迪賓其西塾久予知車氏由公迪焉近進用烈嗣子泰業舘下復為請大書其堂曰尚義樓曰讀書既而予歸自金陵經車氏與公迪論文尚義之堂而顧瞻讀書之樓以歎曰車日大而舉林其日重乎蓋義者天爵之貴書乃聖言所在雍容是堂登降是樓者能不奮思以有作哉姓隨事顯地以人勝用昭師友之誼而壯厥孫謀族氏之光孰大焉因譜乞言序以朂之金谿南山傅氏族譜序金谿未縣時為臨川之上幕鎮傅氏其先有伯仲曰行廂行唐者由上幕之五岡析永奉鄉之硤口莊行唐居城上行廂居東岸東岸尋更名曰鱔行廂生師璵師瓊師瓊徙西山師璵季子曰某徙掩坑掩坑之四世曰商佐徙鶴溪鶴溪之六世曰公世徙南山師璵白鱔之五世曰安潛宋建炎初幕民應詔為社兵累功荐進秩授世襲勅云父子兄弟將權世世之相傳族黨比閭軍士人人之素習蓋西山之後曰安道及商佐安潛子根皆恊力濟功者白鱔之九世曰子雲鶴溪之五世曰陸俱事陸文安公南山之四世曰景賢從陸氏之後俊㳺文丞相開府江西辟玉山令以率義兵五世曰徳華漱陸餘潤於外氏即陸廢基建學舍堂以事三陸贖義莊以養士六世曰籌師草廬吳文正仕元中書省檢校使閩浙革命後歸休田里十二世曰芳因内兄車泰業舘下既而奉父祖命復屬泰以請序其族之譜譜始於祐續於籌雅晟其易歐氏法則自今日焉予嘗客歸自浙經芳里假宿連洋是為諸陸之鄉詢其遺蹤與其苖裔瞻盼其山川雲物而遲遲吾行者非以夫人之賢哉誠厥心以希賢焉安知曠百世而相感者不猶今之視昔也耶有懐往躅用䇿芳云荆溪吕氏族譜序寶塘之北汝水之西曰荆溪吕氏世居之厥初蓋由浮梁而來也其隣生吳曽氏致尊公子通之命告予以吕氏邦翰公翰兄弟者既納粟受旌矣而日駸駸於義事焉乃咨於其族之長本誠從父中良僉謀於族之長幼卑尊構奉先之堂修収族之譜屬里生陳達以譜請序嗚呼是舉也不其重矣乎程子之不忘本魏公之孝之大真知言哉然流俗滔滔知而信者恒少因吕請著之以諗來者云西汀鄧氏家譜序鄧氏其先由建昌而來也世居崇仁恵安鄉之西汀予嘗游止其地者數接其祖父子孫四世驩如也前之開業者事乎先子後之繩武者辱於不肖焉東平吳生世光近來小陂雪忩話舊嘉鄧氏既有田以供其祀復為譜以謹其世予時契闊西汀一十載矣聞善相喜嗟歎久之創譜者廣淵徴予言者騏與長而贊襄者吳生也譜無夸事文略浮辭貴傳信焉耳唐山戴氏族譜序景泰丙子唐山戴君子穎倡義作祀先之堂天順戊寅春仲氏子顒偕其族孫亨慶正同修其世譜來屬題系出唐刺史叔倫幼子芮舊圖世次有疑今斷以南唐始遷之祖諱英字邦彦𦵏本里之百畆阡者為第一世予以王程星火未暇詳覽耳目所接則元有字元叔號元齋者富而重儒六子皆承家學字懋純號山雪者為第五洪武初教諭邑庠先子所事也字仲本號務本者為諸孫訓導西齋經業尤邃山雪冡嗣仲暘君豪烈尚義子㑹君者為元齋曽孫敦厚莊重邑士侯孟恒稱為鄉里人物之冠數君子者前後輝映而唐山之名四馳増重鄉邑矣子穎君居族之長而長幼服其徳子顒君建讀書之閣而子孫無敢慢堂之成通族之力譜之修二三子之志云荆溪華氏族譜序華氏少一府君者由南豐徙居崇仁恵安鄉之荆溪至五世曰顯宗者析本里之清塘昔友人黃季恒嘗從予省墓紫石坑經荆溪指華氏伯良之居曰是蓋素仰先生者盍一訪諸予辭未遑也後十載重經焉質諸其隣友吳子通氏而黃君之言為信時黃君物故久而平時誤嚮往予者率晨星矣惟伯良年過七十而迎候康强適華庭新構境物春明暄妍之至童稚咸欣而嗣子廣告予以疇昔之夜實夢夫子染翰於斯宛然今日也予既答以紀夣之詩而伯良相好無已也復偕其族人正倫屬門人王忠彭回來請序其族氏之書云孫坊孫氏族譜序天順戊寅春予將有北京之行遍省先塋經孫坊孫紹先氏得暫叙世好既而紹先以其世譜請予不腆之文蓋令祖清所翁先友也先子寄詩有藕花溪畔竹林幽步屧西風記昔㳺之句予兒時拜儀表於先子官舍翁既歸鄉辱為忘年之交鄙詞致奠有云抱衾裯以共宿語達旦而不寐又云當春暮之趨庭辱縞紵之深意且祖妣寔惟孫氏為志廣之親派而與恭者念予尤厚夫既叨友朋之誼重以親戚之好安敢吝於紹先之勤哉孫氏派析豐城奠居種坊後裔蕃衍著孫坊之名焉世有祀田族嵗一合僉欲作祠而未遂也祠成他日歸田又當為之記云種湖章氏家譜序章氏祥四府君由五峯壻南鄉之官員嶺中二府君由官員嶺壻種湖因以為家季子軫以去族日逺迺考譜於五峯故里藹然孝敬之心惜遺老凋謝無所於咨僅詳曽祖而止然能不謬所從以免崇韜之誕又以見軫之賢也謂予有里閈之好師友之誼請為序焉胡氏族譜序友人胡子貞持其族譜一通見示且曰昔國初宗老子為公之修譜也一以祖宗視之而收其族不以族之貧富異其心故吾一派獨以貧而見系於全譜者公之力也予聞而嘉子為公之仁族子貞之知感皆非淺之為丈夫者矣為子貞者其率夫同派之親漸摩乎禮樂涵泳乎詩書日新又新上可追前代聲華之美下可貽子孫無窮之謀又何貧富之足論哉若夫齊家之要睦族之方具有聖賢成法可攷而知褒然而倡在子貞固宜勉翕然而和又衆人所當踴躍也豐城胡氏族譜序豐城胡清雖未識而問遺嘗相及情固通也清卒之五年弟源以其族譜來請序胡氏世居成都濯錦橋諱諒者與韓昌黎同年進士仕汀州守長子讓仕撫州幕屬因家臨川之大塘撫州之孫可朋由大塘徙豐城厚郭之富塘富塘之十四世曉峯居士徙銅湖曉峯子庭瑞徙渼港庭瑞孫宗玉徙邑南是為清祖也清近以市之隘也卜宅同造而源仍在邑家世遷徙不常易迷所自為兄弟憂故著譜謹本支而未暇旁及勢然也譜成其族人九韶友人于彦實與有力焉長山晏氏族譜序昔者長山晏海氏謁予小陂從游近地之覆船岡大同峽詠歸甚歡也繼學於種湖率弟漳與其羣從淵源連厥外姻纍纍而來海方悉其力於蚤夜而得病歸矣予寄詩有頡頏多少金蘭友日日賢關遲早來之句海竟抱伯道之悲以謝於世不相聞問者十載洧溟紹其家學於小陂之三年漳復攜其子彦相與切磋之而涇亦繼至豈獨慰予之思抑以快九泉之志焉既而漳等奉諸父宗衡宗敬之命以所修族譜請序又悔平生所願而未遂者固予所樂道也晏氏其世次顯晦遷徙不常諱墉者唐咸通中舉進士卒官江西始著籍高安墉生延昌自高安徙臨川長樂鄉之沙河延昌生郜郜生旦固諌清亮聰貞漸固生殊是為元獻公旦以子貴累贈少保濟南郡公旦生洵以兄殊薦主洪州豐城簿累官至某官贈光禄大夫開國侯劉沆雅所推重洵生奕䕃授大理評事徙長山奕生承承生紹休知道州江化縣紹休生光元免各以經學顯號稱三晏元常州司法嘗尉淮隂治劇有聲元生澈秘書校勘澈生紱績績字伯庸嘗續修其世譜黃義剛善之紱生執中執中生慧老慧老生安民安民生霆霆生夢洙夢洙生天祐天祐生繼殊繼殊生璉琦琰璿璣自洵以下雖粗見歴官而事功多無所稽通其旁支可知大歸者頴洵輩凡十餘人嗚呼晏氏可謂多才矣任繼序之重者能無高山景行之心哉樂安草堂易氏族譜序天順戊寅春將有北京之行樂安易生祐為使永豐還且别矣復留止焉語及先世遷徙之由既而與其族兄純以譜見屬蓋諱柬者兄弟三人自建昌南昌竹由市而來宋靖康乙巳柬主崇仁簿子孫家天授鄉齊城里之杭橋字仲謀者家齊城里之草堂今屬崇仁字仲裔者家臨川恵安鄉之西舘今屬崇仁仲謀生煥臣煥臣生光明光明生文貴文貴生處仁處仁生仕勝仕勝生以仁為純祐之曽祖代以耕學相承嗚呼予素慕樂安山水之秀而未獲㳺荷邑彦之過知於我而多未識因易譜而厠不腆之文豈不大汚於名山勝水而重辱我知己也哉㯊溪饒氏家譜序昔予復居種湖時隣翁饒志堅氏遣諸孫燁來學燁乃予所命之名而字之曰子光也天順戊寅正月辛未燁偕其同里生曽正范拱衝雪小陂問訊京師之行而正也告予以一承諸父兄之意屬序其家之譜饒氏其先由南豐社背徙臨川南鄉之種湖素以淳謹稱於鄉而燁者予蓋假名與字朂以輝華其身於其家於其族而不知燁之用心為何如也日月逝邁感念今昔悵然書以復之餘姚楊氏族譜序餘姚楊侯文琳㕘政江西之三年奉勅以軍務臨敝郡束書遣使命僕曰吾先河南汴州人諱僖府君者宋高宗時扈從南渡遂家越之餘姚世系荐罹兵燹乃者譜自六世祖辛三府君而下生娶卒𦵏行諱官歴粗具願序于君焉豈惟感存殁於一門且頼永光斯譜矣噫此楊侯之謙徳知我之過誤也昔楊侯初遷秩畫省時適僕叨聘寓金臺興道致治之誠溢於承顔接辭之頃尋徵輿論夙著蘭臺夫以瀟洒出塵之資藴瑰瑋奮抜之志篤兹以往名門華譜安得不益大而益重矧族之後人觀感而興起者固不可量𤨏𤨏瞽説徒為贅焉耳豐城曲江熊氏族譜序豐城之北曲江之濱有熊氏焉曰松澗先生字子超者為第一世松澗而上及松澗而下其遷徙之由與夫官歴隠徳之跡代遭兵燹無可徴矣惟世傳一系於十七世孫豫章之家亦不免於殘闕焉十六世孫崇夀嘗以所聞見生娶卒𦵏述諸簡牘十七世孫婉因系與述倣歐陽氏圖而譜之貴箎從弟用端樂於鋟梓婉承親命屬所知張循戴禄徴予文予以病辭婉懇請之必欲得而後已先正云人之所以與天地日月相為長久者元不在此則文之有無何關得䘮矧不佞如予者奚文之足云嗚呼流俗滔滔知徳者鮮安得起雲谷於九泉以咨所謂長久者哉上饒祝氏族譜序祝氏世居上饒其鄉靈峯佐溪之鳳凰墩故儒家諱高字維東者贅某鄉渭川姜啓詵氏遂冐其姓啓詵年老無子維東力勸圖後啓詵固辭且曰暮境尚冀息耶維東扳諸姻戚固以請遂得妾生子維東屬纊之日顧諸子鼎新付新等曰姜氏似續幸有人矣爾其復吾姓修家乘丐文作者季子永新近以諸兄命從其鄉先生婁克貞謁予小陂致先子之屬文詞非予所長縱强為之空言何補然則其學道乎道凝厥躬是謂有徳道徳之懿為世禎祥以顯父母貽孫謀君子能事孰大於此詩曰無競維人祝生勉乎哉送按察使原侯序江西提刑按察使陽城原侯初由正統乙丑進士歴浙江廣西二道監察御史嘗巡按江西及審刑撫安北直𨽻諸州遷今官三載矣報政伊邇霜臺諸賢最乃績曰所在著㢘能之譽以僉憲同安程侯嘗辱於崇仁吳與弼也授之簡而命以文夫㢘者徳之符能者才之施徳一而才二才施於所宜施也其在已為吉人端士其示人如青天白日人之仰之如景星慶雲其及物如和風甘雨焉然學有純疵志分淑慝從古以來負聪明卓犖之資而枉其才者多矣若吾原侯者善於用其才也歟揚休光動羣寮豈偶然而已哉抑聞儒者逢時生靈之慶聖明在上正豪俊有為之秋功高社稷名重丘山又僕之私於吾原侯者焉送進賢邑宰吕廷和序竊嘗論邑宰之美必以武城單父晉城為巨擘焉一則絃歌播聞一則不下堂而治一則學者風靡三邑生靈何幸際於斯日也有民社之責者聞風能無興起桐廬吕侯廷和之宰進賢也名其退食之所曰正心治之左曰善教右曰善政社學曰㴠養良心非志於希賢者乎三載考績將赴天官願攀轅者衆口一辭亦可以見秉彛之在人心固無古今之異矣職其邑之教者蔡貴沈經凃瓚三君子具書命使請言以為贈夫言宓二子親炙聖人之化程伯子亦學聖人之學者學固當以聖人為依歸去聖雖逺微言尚存玩其言以得其心何逺之不可到哉日知其所無月無忘其所能吾於吕侯是屬臨川岡上李氏族譜序鄉者予以家難滯五峯諸生車泰車亨輩相與周旋僑寓旬時李希者由泰而來也且欲以成其族氏之書而請文為序以慰通族尊祖敬宗之心屬者四三子講學小陂復申前懇李氏其先由南豐雙井遷臨川積善鄉之嘉村五世諱發由嘉村遷湖東七世諱安祥諱榘諱立極遷近地之岡上諱祀諱榮仍湖東代為淳謹之族夫謹家牒而不忘乎先塋固孝之大而立身揚名尤先務之急豈惟族黨之光抑一方風俗所繫古語云富貴易得名節難保可不念哉臨川鳳棲原周氏族譜序周氏其先世居建康句容之鄢家巷號梅忩者徙南康蓮花峯下梅忩生定式宦㳺建昌之南豐因家焉定式生純仁贅五峯黃知軍氏遂家郡城之仁孝坊純仁生文明仕元兩淛鹽運司提舉文明生立禮鹽運司丞立禮生彦海達海達海主饒之樂平簿嘗修其世譜虞文靖公為之序七子曰伯莊者生仲謙贅窑前胡氏曰伯宗者主南昌進賢簿生仲彬由五峯贅鳳棲原許伯高氏遂家於樓前四子叔烱叔煥叔燦叔熺予往旴江兩經其地皆假宿叔煥叔熺氏伯仲不知予之無似而過於崇重焉留周之詩有但得主人能好客幾時無事又重來之句許詹二生嘗從宿者偶論疇昔則伯氏久物故而家庭之誤愛我者猶昨也未幾叔烱嗣子麟咨於季父叔熺偕從弟茂輝介詹生來請題其續修之譜噫予老且衰兼北京之行在邇重來既不可擬而離别之思方殷惟周氏充誤愛不徳之心以益培其所秉之彛則豈直光周氏之族抑以快予之私云天順戊寅閏貳月辛巳同郡康齋吳與弼書於小陂東忩時宿雨初霽韶華滿目佳興與人同也外孫寧夀給紙墨雖秃筆無鋒刃然情思則暢云康齋集巻九
