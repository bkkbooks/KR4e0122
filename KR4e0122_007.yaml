body:
  text: 康齋集卷七明吳與弼撰詩甲申元日列炬蕭蕭宿雨鳴開軒冉冉曉雲晴新春又拜唐虞化舊學重燖孔孟情題慈訓堂剩採隋和詠斷機洛陽芳躅指程子之母孰同歸奉盈執玉今猶昔姓字宜垂奕葉輝贈程李二生赴京老態偏於故舊深聨翩二妙重遙臨春風共有朝天興穩步青雲聽好音即事萬事蹉跎忝士林虛名孤負秉彛心寒爐剩辱花封炭進賢吕茂宰春廪遙承皂蓋金廣信金郡侯秋夜懷舊玉階金殿沐恩濃舜日堯天不世逢遲莫豈勝多病際夜吟身在夢魂中藝谷車亨請大書藝谷以為尊公用軾之扁且請賦焉詩曰謀生不惜滿籯金富買羣書子孫讀杖藜何處可娛人時訪藝香遍幽谷梅月軒鄱陽高致一軒開雪砌霜簷月映梅銀世杳然天似水暗香疏影夢初回蘭軒羣經醲郁德惟馨內重由來外自輕軒即是蘭蘭即我人誰不仰國香清雪窠桃李家家春滿林伊誰一寫雪窠心請看風急天寒夜聽唱蒼松翠柏吟中和齋堂堂大本固無偏達道雍雍自粹然氣質萬殊非我性克治何惜日乾乾饒循生辰初度欣逢有立年兩家具慶總怡然黃柑緑橘開新薦博帶峩冠秩此筵風俗固宜由我厚典章應只在人傳從今日與二三子細講髙堂十七篇贈祁門四生朱鄉遙憶舊年懷今喜名邦四子來寄語家山多俊秀好將朱學賸栽培贈孔昭橋門北舍日相親鄉國參商四十春偶爾小陂風月夕細談舊夢兩情真宿墨池傅氏洗墨池邊又一臨西風重感百年心當時弟子俱華髮細話牀頭雪夜深午㸑白沙寺沿道逢人問白沙樵蘇喜達老禪家竹林清趣微吟罷素壁題名日未斜宿桃昱寺白沙已度詢桃昱短景天寒日久斜松竹園林清淨處髙眠都似未離家午㸑壁邪寺停午衝泥到壁邪石壇花木又僧家清香一炷簾櫳靜含笑揮毫向日華宿湖溪吳氏客舍曾留詠籃輿今息肩芝蘭多繼武金玉總怡然燈花吟坐久忘眠銀燈花燦然明朝風雨霽行李早言還喜晴風雨怯途窮疲軀歸興濃寒衾孤夢覺旭日滿窗紅别謝步遺編已返司成宅行李言還賤士家紅日清霜新雨後高吟隨處看梅花江頭敘别口占信宿高居賸好懷江頭逺送合門來雲帆若遇東流便更有新詩為爾裁宿白沙寺壁上重歌昨日詩古橋送客立多時天低又恐雲生雨半夜疏星愜素期書東寮壁雲卧東寮夜寒裝北返時欲留他日迹素壁更題詩宿北澤廟當年歇雨暫棲遲千里琴書適楚時此日重經來問宿雙峯對罷夜談詩宿陳鳯鳴氏會心境界無非樂得意軒窗即是家霜樹糢糊連碧落雲山隱約隔紅霞石橋感興石橋小立感懷多借問當年事若何不識天人相勝理朔風凄烈漫長歌陳傅二廣文携酒登仙遊山勝會難逢真快哉晴明風日共登臺玉壺細酌題詩罷緑水青山歸去來留吳營元氏花封歸轎正駸駸駐節亭前日向沉莫怪有孤投轄意一詩聊慰逺迎心乙酉元日銀燭煌煌壽域開衣冠濟濟拜蓬萊寒泉細汲春窗硯又喜微詞頌泰階雪夜衾裯加厚尚愆和慨彼牛衣更若何信是萬緣皆有命達人心事漫長歌東窗即事積雪經旬倦出村日將名教淑諸孫疏狂每恨知非晚性命誰人可得聞課寶賢隆新二孫改罷新詩課二雛鴈行端拱侍寒爐朝朝聖訓宜深服養正工夫信在初感興問學無功行莫修過情聲聞負朋遊回頭難返西飛景逐日徒增老去憂璿慶生辰三樂堂中朋盍簪玉壺清話共春襟新功更有新詩朂克己良規各洗心孫生景福復來接果不肖忽七十有五而生亦六十有五矣感思今昔遂成此句妙手頻來奪化工幾回笑語共春風筋骸容易成遲莫百歲光隂一夢中奉陪判簿劉侯登皇華亭萬落千村社雨晴人心天氣共和平閭閻希識花封貴爭仰皇華嶺上亭三月十三月下感懷戊寅此夕月華清步月溪頭惜别情濫沭皇恩天共闊餘齡猶幸一身輕成化乙酉三月十三夜東門玩月有懷往事因成此句天順戊寅此夜諸孫同乃祖母步月東門賤子將去京時也閣中感懷一瞥浮生似夢過男兒德業竟如何回看夙志寧無感萬事悠悠東逝波閣夜淡月巡簷罷虛窗發興濃區區一何幸生長典墳中妹壻徐士英久逝多病未遑致芻春夜有懷遂成此句欲成哀些久愆和慘慘悲風奈若何幾度竹窗春思亂感君氣誼負君多書罷將就寢燈花燦然漫成此句書罷倦忘眠銀燈花燦然道心方炯炯詩思更綿綿撫景時雖邁謀生事貴專古人如可作日願執其鞭哭同窗黃于珩憶昔官居白下窗讀書同几坐同牀忍看華髮交期盡一炷清香淚幾行隆孫誕日賦詩為壽十月初二戊寅此日次南康乙酉兹晨壽爾觴養正工夫宜百倍朂哉高舉早升堂寒夜偶成自嘆生來聞道晚誰憐老去立身難塵窗不寐微吟處霜月澄澄夜未闌東遊饒州稿東遊口占授小兒及諸生二首推窗已喜疏星爛隔竹猶貪缺月明素達行雲流水趣琴書又作小春行一息猶存未敢間幾車行李又江山逐時舊典供朝夕隨地新詩賦往還宿經舍渡族里卑尊暢夙心篷窗僮御課新吟虛舟到處棲身好依舊青燈坐夜深長山晏氏問疾曾飛晏海詩更從羣從敘宗支他日長山疑夢處諸生濟濟夜眠遲章山傅氏常憶章山吉士情傅剛為庶吉士久逝偶乘良便造君庭諸子來長山迎至其家揮毫還慰平生誼濟美堂前好弟兄太平寺連日禪房晝夢濃人情物理靜時功宵來更擬尋瀟灑淨几明窗寫訓蒙朱子訓蒙詩又絶句石炭紅生夜正遲銀燈花爛未眠時客身無恙心虛寂細寫閩山性命詩喜晴隂風號怒客心悲添火加衣養病時黃卷埋頭不知午滿窗紅日又題詩寢息偶成人事全稀心似水書程多暇日如年任教大野風仍壯漫喜寒爐火正然載渴載飢都委命時行時止一由天小陂程課無勞計想見諸孫各勉旃離太平寺二首十日禪房養性靈晴光又喜一陽生明朝何處尋梅去特向新詩記太平雲箋璀璨翰如飛剩載詩書使者歸共喜江頭新雨霽重臨舴艋又囊衣夜發龍頭山正羡沙頭縮項鯿上流忽聽夜行船滿湖柔櫓和鳴處萬里青宵月向圓鄱陽懷古西風斜日次鄱城細憶當年仗義名似此男兒真罕比微詞何處弔芳馨發磨刀口問得前程去莫遲月篷催著夢中衣湖山一覽陽應復早向梅花賦式微晝寢夢小兒鳴琴勝遊欲罷動歸心晝夢時聽驥子琴日用只知為善惡平生不識滿籯金獅子山獅子磯頭一棹過客邊心事近如何寒更往轍知非切暖日遺編得意多觀語類後作平生朱訓不離紳舟上微言月夜親又喜朱鄉山水近幸哉亦是及門人景德舟中幾展寒衾未忍眠殘燈旋剔又舒編雖云甚矣吾衰也一息猶存合勉旃至日閉關旅食浮梁日歸夢寒更景德舟天心見處從羲覔物理窺時向邵求晚起道上行人繫客心燈花忽喜照更深寒衾睡穩歸懷好今日良朋定盍簪别舊生祈門謝復謝希林饒晉今日良朋果盍簪還家各務惜分隂新春有約龍潭上好與兒曹共此心發景德鎮十日窑頭繫客船靜中黃卷夜忘眠開頭正值陽來復水色山光媚晚天重經獅子山陽復春來一棹還簡編新課日希顔船頭火伴時相命掩卷推篷又看山獨夜懷古懷古心期孰與論客邊程課自朝昏梅花溪上春光好一味新功勵子孫鄱陽舟中傷九韶時傍鄰舟向日吟天涯忽動故園心始知一失鍾生耳宜絶當年伯氏琴重宿磨刀石緣岸人家富竹林猗猗偏稱客哦吟若為覔得梅花伴好結嵗寒三友心煮粥禦寒五更炊黍候行舟端為霜嚴風更遒但得寸心存養熟自然天理日周流種湖比鄰相勞結伴歸時正快哉娟娟新月照吟懷殷勤更辱鄰舟問何日重過故里來宿簷石團團紅日欲銜山喜得鄉人作伴還繫纜汀沙回首處饒河孤棹渺茫間燈花晴色歸程日向前銀燈花復照遺編兒孫接處無他喜往復新詩三十篇宿魚門夢裡光隂一擲梭壯懷偏感舊遊多昻藏空有男兒志滿鬢秋霜奈若何吳氏會景樓東去書程日有功西歸臨眺更從容兩間真意無窮外一點虛靈變態中宿漸嶺俯仰浮生一轉蓬不眠興緒月明中茫茫盡是迷途轍碌碌何時得反躬贈吳璽北歸并序謝家步東溪吳璽字邦玉者先正文正公草廬之族也豫嘗為乃祖題東溪書舍焉成化乙酉冬璽相豫東遊往復二旬殷勤備至又送至桂林乃别裁此為贈兩旬髙誼動人多又共西歸信宿歌記得桂林分手語龍潭春色早相過宿打石港讀書有益專心晚克己無功積悔多從此更加鞭䇿力餘生一味致中和即事行李初從千里回塵窗旋掃養靈臺微言玩罷更何事時向溪頭訪早梅題程希善梅月舊館多情坐夜闌清晨梅月為誰寒載瞻負荷孜孜處玉殿承恩始拜官挽李章平生積學未經施玉折徒增士友悲存順沒寧男子事晨窗慰爾五峯詩重宿連樊橋胥氏連樊橋畔重投裝清夜迢迢故意長樓閣玲瓏春滿眼梅花新句賦晨窗重宿下窑寺暝色忙衝倦客旋寒燈又宿下窑禪憶從天上歸來日明月清霜夜半船饒州稿止此次集慶亭詩韻偶共朋遊話五峯乃知世上有豪雄但憐南北雲泥逈徒向青霄仰下風奉寄李學士曾向韶華惜寸隂直期心契古人心竟無定力勝塵鞅空有虛名玷士林書為病來荒素業詩因老去倦長吟如何黃閣仍留念白雪陽春辱逺臨曉枕作德性難馴學力微空憐蘧瑗晚知非從今何以酬餘齒博約須令莫暫違寄秦參政淨几明窗尚友軒道情詩思共悠然春宵幾度相思夢霽月光風各一天小兒初度家幸平康為樂天世遵清白矢心堅園林百果春如海几閣羣書日似年贈别程庸牛演庸任雲南同知演任贑州千户雲南萬里正新任贑上千山復舊官武略共瞻中土重文韜總喜逺隅安壺漿柳柏春風軟燈火藝窗夜雨寒慎勿輕為兒女態功名留與後人看下窑寺贈牛演丙戌晴山聨騎度花隂駐勒頻傾故舊心彼美禪關清夜宿玉壺春酒又同斟宿桂家洲疾風吹浪蹴雲浮捩柁停橈泊桂洲巨舫得依深繫纜孤篷髙枕夜無憂吳氏南軒寢息隨時忘陸沉銀箋揮罷自長吟庭前花草宜人處生意新霑雨露深枕上偶成靜夜迢迢客夢回髙吟清興正悠哉窺窗更喜銀河爛定有晴光燭九垓重宿九蓮寺曾寓禪房十日居重來不見舊時書間窗一榻春宵夢細憶流年二紀餘分枇杷絲頭柑歸種曉露春泥劚石苔逺分蒼翠入雲哉靈根細沃南歸處杖䇿扶兒日日來夜興晝寢房中應接稀青燈夜雨獨吟時但令心廣身長泰不管東皋歸去遲喜晴極目長天宿雨收客窗春興轉悠悠滿庭花草同人意流水行雲任去留大司成頥庵先生二郎君懷珠玉下顧次韻奉酬客窗重篤弟兄忱竹樹交加午院深喜極翻令清淚墮凄風折盡百年心曉枕一榻平安客慮稀夢回春漏正遲遲東阡西陌嬉逰處欹枕孤吟記此詩遊園杖䇿遊園處乘風坐沼時生涯從淡淡歸計任遲遲萬事信隨遇一身當自持熟思今古轍至善是吾師對月照日東升月隨緣北住人寸心元似水兩鬢任如銀得失幾無定榮枯事有因素諳名教旨敢不日書紳九蓮寺南軒食罷間來對橘花春風庭院寂無譁浮雲流水何心計幽興饒時即是家對竹生涯忘旅泊出户又斜曛雪檻沉吟久青青對此君即事送别禪關話别遲舊生重誦舊吟詩相看霜鬢空衰謝從古深功貴及時客夜徐步吟苔砌遙空對塔燈禪扃終日卧病骨暫時輕寵辱元無繫詩書素有情心隨身共止庶以達吾生饒氏東閣香南山上僑居日金鳯橋西小憩時虛閣明窗清晝永雲箋留字更留詩即事舊館欣重宿新晴愜令辰塵紛無所繫花鳥自相親嘉惠諸生盛清樽院主頻素聞亨困旨貴在熟吾生對雨書懷形容雖老矣蹤迹任飄然夏雨淹三市春風憶九蓮豫章寺名觀生時學易習靜日同禪利用崇吾德忘機不識圓寶應雜詩四首萍梗何勞計簟瓢且寓居清心宜雨樹供病慶時蔬身憊多便枕神疲少近書故人頻問訊吾道近何如隨遇安時命尋幽養性靈登臨多古意講誦有儒生所貴知通塞尤宜適寢興當為斯是理不必計枯榮逺近搏空翼髙低接樹花曉煙香正妙新霽日初斜積學如攻木無謀似算沙知非吾輩晚堪鄙又堪嗟隱几焚香罷巡簷待月來客懷不落莫詩興頗悠哉處世憐無賴為儒愧匪才先師去日逺蒙吝藉誰開覩桐林書屋余知州規與友琴軒李州判勉小簡藹然故意感而有作一簡諄諄辱愛多知君微恙少愆和佇看勿藥來新喜重向桐林共放歌橙蔥蒨亭亭愛一橙日供清趣映簷楹明朝回首懷萍梗記得沉吟此際情偶過北院講罷殘經思已荒徐經别院暫倘佯靜來春意君知否晝寢房櫳日正長寢起不堪人事日匆匆老病惟便一味慵徙倚間庭高枕後遙看西塔夕陽紅重過北院幽僻禪房又獨來窗邊襟抱靜中開薰風爽氣飄晴幔緑樹濃隂轉午臺甥館五月初四日端午懷甥館蒲觴兩度斟徘徊經茂草誰共黍離情初五日寶應逢重午甥門憶往年形容愁裏異時序夢中遷倚玉人何在為箕事渺然客窗吟不寐展轉曙鐘天坐塍間看耕出户頻頻候月升扶笻欵欵看秋耕世間萬事惟勤好只恐兒孫未我聽新移蜜檀柑金橘皆已結實日供清趣蜜柑二顆逢時雨金橘盈枝更可人借問山家那有此新年分得下窑寺名春飼魚碧沼淡怡神遺編暫一伸病軀何所事時作飼魚人紀夢二妙聨英清且間高蹤那得到柴關哦吟曉枕思君處簷雨蕭蕭秋夢還沼上獨坐病眼昏花少近書時從碧沼坐觀魚支頥細憶平生志行止何能與道俱自訟平生立志在希顔逸駕那知不易攀餘生碌碌嗟何及羞看青編凡聖關朱子云物格知至處便是凡聖之關語類仙逰山訪古餘情詠緑隂金風滿徑滌煩襟靜觀萬物生生意契我虛靈無事心小憩下窑寺竹裏嶰谷沉沉足午涼郤枝寂寂散秋香會心不覺孤吟久信是間中日月長塔下小立候小兒輩寢起乘風步屧遲緑隂清晝獨吟時遙空極目青雲表乾鵲聲聲為阿誰題鳯橋書屋并序臨川饒大誠世為南塘大族先考士榮遷五峯之金鳯橋今為五峯人豫既賦其東閣復屬筆于西孰云衆理森嚴盡在書朝經暮史志何如須將萬事皆依理先聖前賢定不迂贈余知州昨日高談聽友琴李州判號友琴軒今朝細語向桐林余有桐林書屋幾時更遂龍潭約淨几明窗敘夙心奉寄舊侯鶴州周使君英辭頻辱賁荒墟逆旅曾勞枉使車閩嶠阻深龜鶴逺時看玉佩與瓊琚和康節清風吟長短髙詞播大篇誰知妙處在無言微涼一動煩歊外流水桃花共杳然夢黃季恆别却安樂窩逺為羈旅客夢我平生人形容宛如昔饒二令淡菴解組歸來老布衾遐齡細和淡菴吟菜根釅醋男兒事車馬輕裘故舊心杏林清趣為過省躬題昨夜東風動九垓董林生意滿根荄欲知化育功深淺細看嬌紅次第開憶家小陂晴色映佳晨和氣融融近小春遙想諸孫稱慶處相看俱念客邊人分棲鳯竹吳氏南軒棲鳯竹雨餘膏沐帶花分明朝冉冉龍潭上佇見千兒與萬孫發漸嶺寸心無怨亦無尤何處棲身不自由焉有間情牽瑣瑣逡巡學德是吾憂泊周家渡朔風微雨月朦朧周渡相將夜落篷內省秪應隨遇好前程不必計窮通不寐客夢醒時宵向分欲將行止共誰論黃流褻味君休問只管吾心存不存舟中即事紅葉連村歸興濃黃柑帶雨更玲瓏倚篷小立蒼茫外詩在雲煙杳靄中重宿下窑寺入院間吟對雨時夢醒貪看月流輝驅馳倦客西歸晚不待雞鳴急早炊旴江謝郡侯遣鍾掄潘玉來習鄉射禮二生歸裁此以贈之彌月龍潭講禮回從容行李不須催黃堂風采超今古何處閭閻不看來贈陳崇書教諭考績赴天官藝閣蘭燈利斷金驪駒朝唱白頭吟恩波闊處多魚鴈細寫歲寒松柏心至日次杜韻翼翼趨朝候鼓催共瞻小往大應來新功煆煉當思奮夙志驍騰孰肯灰欲見天心時訪柳間窺物理獨尋梅平生几案惟書册談笑何曾到酒杯曉枕作黃卷新功日又加愈知聖道浩無涯長更寧忍貪高枕爭奈昏昏兩眼花夜枕作一德蹉跎不易成空憐兩鬢久星星雪窗欹枕無眠夜誰共新功觀我生雪夜晚眺寶鏡團團挂碧霄翠屏隱隱隔平橋回頭更會梅邊境緩步微吟擊壤謡即事又出柴關踏雪晴養心隨處抱遺經含英咀實嘗聞命莫向塵寰枉此生夜枕作腳板何曾夢孔顔百川東逝可西還須當痛惜桑榆日莫把光隂當等間勇驅山塞海未是勇借問如何學日新斂收不可斂之氣伏櫪安流勇乃貞宿西廨彭氏詩成頻聽曙雞聲却喜靈臺一點明須識宴安真鴆毒足知憂患乃吾生平生雅志在希顔歲晚工夫始識難但保寸心長似鐵何妨萬水與千山次桂家林繫纜沙頭朋盍簪新吟兼唱舊時吟懷開不覺笑談久總是平生鐵石心責躬中歲知非已過時老來空賦責躬詩一生總被虛名誤千慮難逃實德疵無計可回前日月有功終作後男兒戰兢盡此桑榆力衛武朝朝是我師重宿太平寺琴書欣有託故舊念重逢蹤迹炎涼異心期禮樂同寒夜獨坐夜半殘燈坐不眠孤吟霜月小寒天昏昏病眼時無恙又託精誠向簡編獨坐尋得幽偏養性靈衰年惟喜少逢迎簡編隨意間舒卷盡日禪房一味清省躬一身衰謝渾無賴萬事蹉跎總不能何以激昻偷惰氣博文約禮是餘生觀語類為政以德章感程子而作尤人只見無虛日罪已何曾有實功莫把寸心矜立雪但專一味暮春風喜晴偶來知己話忘疲撥盡寒爐别去遲開户忽驚晴送喜旋添雪水寫新詩雪夜雪滿園林風滿軒聖賢對語夜忘眠新知滋味私欣處何幸蒼蒼假我年宿朱坊華顛客子已還家夜讀扁舟燈又花料得餘生無别喜聖經賢傳是生涯宿沙河夢回試省有何思只念因循學過時幾向平常猶易失志當造次愈難持次桂家林夜宿江岸傅氏避風雨已喜琴書達桂林却愁風雨打寒衾漫移棲息投安處又稱青燈夜讀心次桂林渡宿江岸吳氏蒼山古渡認松林寓宿江皋舍館深少長肅雍揮翰罷銀燈花映讀書心次小陂頭登陸寒衝暝色小陂頭烈火黃柑禮數優歸去摩挲青玉案獨慚鐵畫與銀鈎曉枕作義利須明判兩途斬釘截鐵是嘉謨不於生死路頭悟何以能為大丈夫夜枕作四簷風雪夜漫漫今古興懷事幾般數口幸然無凍餒羣生寧免少飢寒夜枕作失便宜是得便宜倚伏循環不必疑俯仰但令無愧怍前程一聽老天為賀彭九彰落成新居穆卜髙居諧吉兆翬飛華棟協清朝三陽交處天心泰百福臻時瑞氣饒讀易絶句丁亥消息盈虛萬不齊等間誰識此心微春窗燈火無言處剛悔因仍學易遲病後作老來日月信無多擬向春風詠太和局促塵窗淫雨裏一年桃李病中過病起遊園並遊無侣又春風况復兼旬百病攻幸有餘芳晴爛熳微吟緩步太平中客夜黃州橋畔閣澄澄近水遙山映晚晴髙枕自知行李倦清風明月是平生即事曉牧清溪課二雛從來養正在於初詠歸虛閣間眠處又喜新知叶聖謨即事浴罷歸來月滿林又從虛閣學澄心萬緣有命宜隨遇不用逢人話陸沉寢起寢息將興日射窗又憑吟几納微涼乾坤闊達身心寂信是間中興緒長偶題無事時來自得亭秋風淅淅晝隂清尋常在世無他技精白于天是此生辰孫誕日鳯閣歸來嵗二更庚辰之載汝才生又逢初度裁新什祝爾詩書與日增寧壽同日同時生辰孫既有新詩律寧壽那無善祝規流俗浮情休借問先民遺範是依歸即事灌罷時蔬又坐亭遊魚潑潑沼澄澄天光雲影徘徊處誰共當年一鑑情卧自得亭養病時來沼上眠託身物外自悠然區區為幸誠多也隨處先師有格言曉枕萬事悠悠東逝波秋風搖落興如何曉窗寂歷無言處獨唱蒼松翠柏歌陳僉憲挽章高第弟子項判府命賦絳帳當年交有道青襟遺愛感無窮門生故吏今重見誰共摩挲慨古風關西楊煥然每見漢碑有門生故吏之稱輒摩挲興歎與豫章吳生沼上亭子話舊兩地關心久别情相招亭子話平生青藜緩步歸來好細詠新詩對短檠曉枕作危者平兮易者傾聖謨宜敬不宜輕獨憐暮景無多了篤實新功敢暫停數日桂花香丹桂秋香又一年老懷不必思華顛聞香隨處堪乘興浮世升沉一聽天沼上芙蓉花開玩易亭中歸去遲芙蓉忽喜映清池流年自換人依舊為已工夫日百之次己卯嵗芙蓉花詩韻忽驚花吐興無涯認取平安是我家萬事不須間著意只應隨分閲年華又偶成萬緣由命不須愁晚節蹉跎是我憂羲畫周文同坐卧夕陽西去水東流偶成富貴無心生有涯朝昏務去是矜誇高眠玩易微吟處又對芙蓉滿眼花玩月萬事無端不繫情讀書終日掩柴扃金風動地頑雲散四望青霄霽月明候饒循暝倚虛庭玩偶竒紛紛涼月滿絺衣悠然真意無言表忽報階前客子歸與吳貞遊東陂石泉初冬天氣已嚴霜霽色家家穫稻忙紅樹題詩歸步緩不知何處是仙鄉和田園樂氷泮雪消舜日含哺鼓腹堯天南畝萬蓑春雨東皋千井朝煙隆孫誕日人生須作好男兒德業從來貴及時虛度光隂真可惜幾時能聽老夫詩寒夜霜葉燒殘更寂歷寒灰撥盡獨沉吟細看隱隱雲留象默感生生造化心夜讀感懷為聖為賢當日事流風餘韻後人思殘魂何以酬初志允出名言兹在兹閣夜金雞已報霜天曙藝閣重歌紫陌吟誦金臺吟稿百嵗光隂渾似夢十年身世若為心至日即事化日曈曈照曙筵儒衣秩秩拜鈞天杖藜碧澗談經罷梅柳迎春又一年同諸孫出村觀雪景塵窗黃卷日埋頭時喚諸孫度雪橋極目長村雲漸薄幾多寒餒望青霄即事墻角溪頭日日來境幽偏稱病中懷簡編隨處微吟罷時探梅花次第開雪夜懷恪一輩為求糴旴江風急天寒念逺遊唱籌何日問歸舟四方幸喜多青眼觀主宜人不必憂曉窗偶成希賢希聖事何如頑鈍之資費琢磨素服前言焉敢惰但憐來日苦無多雪夜懷堅二時在旴江獨憐遊子未歸時夜半無眠有所思稚子弱妻風雪裏孤村心事夢依依題玉灣李大章午風亭賤迹何勞紀名園自足揚午風新氣象喬木舊輝光德義聲猷逺詩書興緒長經過時有賦題向鄭公鄉立春感懷戊子日日潛心向伏羲曉窗高詠立春時梅花滿樹方驚眼又對千紅萬紫時擬呈趙劉二侯衡茅衰卧正呻吟枉沐旌麾欲降臨稍待條風向明媚逺從花塢候車音劍山酆氏淑景亭藏世系碑新碣峩峩結架雄支流雖異本原同載瞻載仰翬飛表春在乾坤浩蕩中藍頭書屋為新喻何琛題新種藝香屋數椽青山緑水映華顛欲知自下升髙處人十能之已必千曉枕作二首滿眼梅花看未飽朱櫻處處又舒紅一年好景休孤負細認洋洋發育功兩眼昏花日抱疴書程全減睡魔多春深何處無顔色李白桃紅奈若何即事一春多病倦遊嬉又對鶯啼燕語時疏竹短墻流水曲衆芳深處詠歸遲坐東門外樟樹根脈脈春流一澗盤新晴錦繡萬花攢小詩留與兒孫誦老大曾於此考槃自得亭即事一亭瀟灑隔紛囂坐卧於斯興自饒雨後落紅殷滿地崇桃相對尚妖嬈自得亭對雨書懷剛恨平生學聖難餘齡程課肯容慳洛閩幸有階梯在精白斯心日夜攀題弋陽吳茂宰雙白軒物則民彛本粲然奈何多蔽損其天誰憐雙白同吾意遙賦新章更勉旃中秋玩月次舊韻永樂己亥庚子寓五峯甥館正統庚申辛酉壬戌寓種湖景泰癸酉寓安慶天順丁丑寓吕坊寺戊寅寓新橋驛癸未寓歙縣成化丙戌寓五峯戊子中秋月又圓小陂新雨淨風煙襟期美惡元由我身世浮沉一聽天細數流光懷旅次獨醒殘夢立簷前達生知命應須服慎勿憧憧役莫年宿斯和嶺徐氏青山投宿問斯和安樂真同邵氏窩幸記松楸鄰貴里雲仍奕葉假經過奉柬彭澤族里小春新霽快行裝力病由來拜響塘十三府君墓寄語華宗賢後裔先塋宜護不宜傷宿種湖筍輿遙自響塘歸故里歡迎逐夕暉青燈緑酒綿綿話總念桑榆見靣稀宿羅原岡彭澤迢迢宿種湖羅原岡上又停車夜分獨散青霄步一點靈臺合太虛偶成年將八十待何為賢有良謨聖有規逐日孜孜無别想幸時相賞莫相違即事己丑滿圃芳菲積雨摧東陽新霽病懷開兒扶杖䇿間遊處尚有殘紅待我來璿慶生辰二月良辰大壯綺筵開細酌諸生介壽杯珍重相觀而善處麟經羲畫養靈臺寄嚴陵張太守金臺髙誼連三月嚴瀨離情又六年駐馬江干何日遂暮雲春樹夢相牽自得亭二首曉立雞聲月晝坐緑隂風兩行名教旨千古此心同一塵不動處萬籟無聲時高卧清風裏微吟自得詩不寐老去逾憐學聖難日新程課敢容慳細思夙昔無眠處涼月紛紛五夜闌挽豫章胡昭璧水才華夙分深九蓮髙誼古人心衡茅新約成春夢何處凄涼問斷金東軒即事東軒髙卧處竹影亂虛簷借問軒中事新功細學謙八月十四夜玩月滿林涼月映更初髙枕虛窗玩易餘老去倦為湖海客年深幸託竹松居知幾漸覺工夫密安分寧論活計疏企仰聖謨頻浩歎襟期何日得純如挽饒州吳别駕男兒何者是豪雄德義存心任轉蓬雖死猶生雙白志亷頑立懦仰英風次前己丑暮秋拙吟以䇿餘齒舊迹沉吟久新功感慨多形容空老去抱負竟如何顔孟雖相逺路岐寧敢他先民有成憲程課日漸磨九日次杜韻當年謝病辭金闕此日髙登在鳯臺嘉禮特蒙天使盛客懷時向故人開程庸浮沉轉盼成今古寒暑驚心幾往來萬事蹉跎空白髮餘齡程課為誰催懷閻巡檢承以羲軒羣聖之道見朂夜拏舟伴宿戊寅此日接吳航歷敘羲軒重大方伴宿跪辭勞夢想尺書何日達南陽隆孫初度十月前日殷勤話夢蘭兹晨喜氣藹門闌鵬程萬里男兒事夙夜孜孜學孔顔康齋集卷七
