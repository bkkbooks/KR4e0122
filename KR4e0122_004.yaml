body:
  text: 康齋集卷四明吳與弼撰詩讀韓子辛未重雲密雨鎖春寒病思無端強自寬逝矣古人心獨在遺編一一靜中看寄謝王醫博高危諸醫士李王諸親友驥子南遊學舜絃春城淹疾友琴軒神功深賴陽和力杜云陽和醫百草青眼頻煩故舊憐題黃氏花萼樓神京曽忝仲聮行鄉國相於季氏良花萼樓深春晝永自天多福一穰穰題水竹居結架媚間曠敻然面寥廓水環白雲隈竹帶青山郭雲霞生我衣魚鳥同人樂曰豫固靜者煮茗相賓客意遣憺忘歸會心溺灑落緬懷恍如夢賦詩酬舊約程庸承府主命李觀光章取則皆集小陂講顔子喟然之章賦此以勉焉二生忽喜後先來無德相資愧爾才黃卷有師當自勉關閩濂洛是梯階朱子云四子六經之階梯近思録四子之階梯牧大同原楊林坑即事壬申既輟黃嵐遊却入同原嬉三陽時向交暖律回春暉人情惜舊好物熊含新輝悠哉四聖心靜向林間窺單騎日日來飄飄淡忘歸偶攜二三子麗澤同針規與諸生説兑卦與楊珉遊大同原豫逰原方憩林薄適楊生來訪欣然賦此林西日月長講罷無餘事東臯䇿吾馬聊爾川原憩風景惟暮春煙芳媚初霽理會塵外心道酣淡中味惠然嘉友來共此無懷世枕上作蕭然陋巷日希顔獨把遺經靜處攤準擬朝來風日好遍隨晴色踏青山以事入城假宿西廨彭氏癸酉細雨斜風困馬蹄年過六十未知非客窗輾轉難成寐定力何能一庶幾暫寓程庸氏屈府主王侯賁臨夜承郎君伴宿春風堂上降鸞凰瑞氣祥煙日正長翠竹碧梧歌不足高燒銀燭夜煌煌間中偶述花木沈沈庭寂寂蒼苔盡日稀行迹支賾窗下一沈吟人間幾片韓山石絶句於三峯尖之中峯架以小木覆以雜薪為牧所之涼棚一棚新架白雲端四達天風九夏寒野性慣隨樵牧侣時時來此獨危冠東坑幽澗一水泠泠逗密林無名花草匝幽隂苔磯終日不知暑滌盡平生擾擾心題菊窗清霜籬落任天真可信虛窗别有春陶屈依稀千載後餐英裛露豈無人遊金陵藁宿熊璣氏七月江湖逺適為求醫首寓高齋愜故知良夜好天忘倦處清風明月細談詩發孔家渡茫茫新漲漾晴洲華髮寧知非勝遊未了平生山水債又從臨汝附扁舟次打石港當年曽此泊晴灣細讀鄒書不立巖牆之下章向夜殘始信萬緣端有命欲為君子却誠難哭傅秉彛獨步來尋洗墨池秋風禾黍正離離一丘舊隱成春夢非慟夫人而為誰守風青草洲青草洲邊幾日留風來北極正颼颼箇中欲問行藏意未達中庸是我憂日與程喜説中庸答舟人過家徒竊虛名實陸沈殷勤空負秉彛心那由回得西風馭截日深功斷自今南康舟中滿懷今古悵悠悠舉目江山盡勝遊華髮又堪來幾度可無新句詠清秋志喜裊裊風帆快客程良朋時共話平生忽驚蜀浪半江濁又接淮山一帶青重宿南莊四十年前此寓居華顛重宿意何如不堪潦倒渾無似謾托狂歌寄我吁龍井道中八月石壁話龍湫青山夢裏遊長亭新霽雨隨處詠高秋次練潭半野雲煙薄長空新月多息肩知有處燈火練潭河橫山雙港道中晴色添詩况山名認上音無勞鄉國夢日詠古人心閣中即事盡日文章慨作家眚冥樓閣寂無譁雲山時獨攬秋色風露誰同玩月華窗間獨坐閣上詩應罷窗間月復明好懷未忍寐端坐憶平生贈江淵久重才華識俊英偶從此地共茅亭幾時更對何鄉榻細寫江東渭北情八月十二夜何家墟玩月訪古微私不易酬心期江漢日悠悠行藏信有平生分謾向涼天詠素秋牆下對淮山獨坐徐步間來藉草吟淮山靣靣感人深若為飛度晴嵐表一覽中原暢夙心十四夜同李進士玩月别却鄉園縱遠觀前期浩蕩路漫漫何如今夜高秋月萬里清光此共看别何家墟道中口占授宜之占去聲隱度其辭以授人曰口占昨夜巡簷同霽月今朝聮轡共秋山恍思三十年前夢信是人生會合難寄贈李春天柱峯前憶舊知江湖秋興總如飛金臺早得春消息好寄東風汝水西貽南莊李氏淮水秋風歸興濃片帆日指大江東滿門長幼俱青眼華髮何時又一逢獨步江岸江岸逶迤獨步來日光恰喜密雲開能消幾兩南風力咫尺青霄是鳳臺次西梁磯屬和州西梁磯下繫孤蓬磯自峩峩水自東蓂莢不知經幾换幾人曽此詠和風登西梁磯尾暫縱稜層咫尺蹤江山一覽已增雄脫令病骨生輕翰飛步危巔又不同江邉獨步咫尺金陵到尚難朔風猶未退狂瀾平蕪渺渺不知處獨數江南江北山具慶堂為桐城黃金題愛汝清溪壽二親雲箋晴染坐生春九天會沐恩波濶戲綵堂前百福新永感堂為桐城朱善題欲報劬勞慨昊天青燈耿耿思綿綿顧我舊遊揮客淚與君同廢蓼莪篇别金陵道次五顯舊遊口占授章余李三友客中欣遇二三生送送無端故國情佳麗山川同一覽樓臺高下鳳凰城旅次曉立江湖日夜數歸期乾鵲聲聲曉為誰籬菊忽驚銀燦爛畦蔬時接翠葳蕤次東館頭上元縣地侵星問道高橋側斜日息肩東館頭欲卜前程知有在霽行潦止不須愁宿杜家村杜家橋外杜家村細雨斜風暮到門多謝主人憐老大盤飱杯酒夜溫存句容樊知州宅飽聽邦民頌去思玉樓人去已多時陽春白雪慚吾輩流水高山弔子期宿徐村跋涉泥途不憚劬晚晴又得旅懷舒清溪濯足看山罷松竹林頭認寓居宿案頭丹陽地癖性從來厭市墟息肩時託近鄉居金風禾黍秋連野緑栁池塘月照廬發丹陽遙牽高纜别丹陽明日青山指浙江謂我何求寧足校寸心對越是蒼蒼舟中九日去年九日遙思子今日重陽子憶親自昔懷居非達士由來安土屬吾人吕城壩雲散青霄月放明時聞前岸浩歌聲平生湖海希蹤迹始向丹陽識壩名戚墅鋪武留地晴穫農人喜安流舟子間平林戚墅鋪逈野浙西山蘇州絶句次唐詩韻二首萬態循環故復新塵寰知换幾回春我來又發姑蘇詠可信浮漚等昔人斜風細雨菊花天今夜何知此水眠他日舊鄉談舊迹青山却意夢中船過吳江縣一棹吳江上寒煙楓落時無才堪賦詠聊誦古人詩次嘉興程程客路問前蹤又繫城頭檇李篷懷古心期何處寫一江煙浪雨冥濛舟中曉望吳江欲盡越山來東日融融霽景開桑柘稻粱連沃壤人煙村落在無懷長安壩崇德地崇德橋頭暮刺船迢迢江岸帶星牽長安壩上停篙處楊栁隂中伴月眠望越中山牽路晴明不憚難船頭時見越州山前程信有自然妙莫把天心當等間平林舟中杭州地二首盡日舟行不見山離離香稻映柴關倚篷獨詠凝晴望何處雲端一翠鬟平林山後又看山知在錢塘勝槩間老大薄遊顔獨厚絶無新句膾人寰晝夢覺作一枕平安晝夢濃起題紅葉數青松老於世態無心處到處身疑是夢中錢塘絶句曽擬錢塘吊古詞薄遊今乃戲於斯西風何限平生思斜日從誰一詠之錢塘留柬程庸凖擬名山復並遊朔風無奈日颼颼金陵已失連枝喜吳會仍為落葉愁南指片帆應迅速北來行李莫淹留丹楓黃菊同歸夢定約三衢與信州觀湖先聲隱隱逺如雷高浪排空雪作堆欲記新題何處寫伊誰一醉菊花杯發錢塘鄉音無寐共清宵昨夜與鄉人月下話之得伴何妨歸路遙夜半開頭更唤夢月明如晝競乘潮即事西風淒切濕雲多東日朦朧午始和佳菊叢叢誰採擷好山處處自吟哦子陵釣臺王孫舊是布衣倫嵗晚如何又屈身不有先生高致在滔滔俱羡拂鬚人即事舟人唱曲吹簫殊勝蠻音聒耳也歌聲才罷又簫聲暢我孤篷客裏情他日欲知牽路處丹楓黃菊亂山青大浪灘洪武間先君奉命往福建有大浪灘謠先君遺墨識名灘使節曽經此往還改罷新詩吟未了舟人又指富春山近衢州水原將盡話西江紅葉歸心日夜忙猶愛越山看不飽焉知孤棹尚他鄉過衢州夜半朔風遒灘聲急去舟推篷雲月裏髣佛看衢州題徐氏村居跋涉遙尋玩易蹤幽棲近在縣南峯松篁共聽今宵雨禮樂多存太古風俯仰浮生一夢寐相看華髮兩龍鍾酒酣細和辛夷什丹桂叢蘭思正濃别徐希仁彼此浮生類轉蓬青山端似夢中逢明朝努力加餐飯又隔南雲少便鴻常山道中後先已喜轎咿啞驛路泥乾不憚賒回首故人程漸逺青山從此白雲遮玉山舟中獨坐船頭愛日光好風又喜片帆揚雲山簇簇緣誰碧岸菊叢叢為我黃與周文婁諒二生自歎虛名忝士林殷勤孤負二生心莫雲春樹他年夢傑閣高軒記短吟發廣信雙棹飄飄逐急流青衫獨自立沙頭明朝矯首東雲外須憶雲峯是勝遊曉發舟師晴唤急前程短棹侵星帶月明却憶宵來何處宿孤衾和夢聽歌聲宿橫石橫石岡頭路人疲日又斜平林茅屋近有店即為家次上清迢迢還鄉路程程日逐西雞鳴時問境十里是金溪野橋小憩晴日催歸路平橋又息躬雲峯四靣碧霜葉一溪紅孔方道中逆旅程難進疲肩重日增歸期無用數俯首事孤征宿小嶺旋糴山田米來供野店炊一枝聊暫寄不必問為誰小嶺店中即事雲白山青路回頭却已遙故人應在邇詩話定今宵童子餽蔗童赤依誰氏悠悠念爾翁殷勤霜蔗贈知我困途窮白水寺危石疏松一水寒軒楹正在水中間平安半榻還鄉夢却憶千山與萬山同公迪飲車氏嚴瀨扁舟話舉林詩情遙向故人深一杯賓館論文酒細寫高山流水心瑤湖渡斜日明官渡平沙散馬蹄一生勞面北短卒急征西宿周圻氏千里歸心逐月明平林曲徑欵柴扄故人問藥入城郭愛子難兄共短檠次種湖鄉鄰宗黨總欣欣旋摘霜柑意甚真送送長村不知逺華顛應念客歸人還鄉道中晴山今日是歸期正值橙黃橘緑時囊篋不論羞澀否示兒聊僅百篇詩寄上饒汪秀才郡中諸俊彥客裏微軀病莫任金蘭多負秉彝心不眠幾動山隂興無鴈能飛懶拙吟登東坑稍箕窠最高峯寒窗倦局促兹晨脫樊籠逺隨伐木伴暘谷舒孤蹤竒峯發高興迤邐緣霜叢沃咽有山果爽袂來天風是時雨初霽心賞超鴻濛黃李四生習易小陂寒窗旬月間六經風雪賦此以勞之新功近喜四生深夙夜沈潛四聖心六出六經功愈苦凍毫特賦雪窗吟新正峽中作甲戌積雨逢春却好晴石橋又聽澗泠泠沙頭飲馬間停轡時止時行理本平贈饒李四生雪夜勞以酒而勗以詩緑酒酬高誼新詩祝逺程各堅松柏操共固嵗寒盟偶述病來文籍久相拋間看松篁雪後梢懶性避人非敢傲平生厭結口頭交即事濯罷清流似浴沂輕風拂靣課農歸北窗一覺羲皇夢又喜雍容事講帷題石泉莫訝涓涓勢在蒙隂崖應與八溟通試看萬折趨東處何險能紆逺到功源中即事匹馬長源又獨來野園時見菊將開忽驚往嵗看花處天外孤吟越徼回仰止堂詩并序乙亥景泰癸酉豫歸自浙擬假道塘坑一訪饒氏迪功公故迹而弗果華裔烈與尊公景德慨念不已豫亦為之悵然也莫景駸駸斯遊恐莫遂矣姑為賦其仰止之堂少答誤辱之勤云其詞曰紫陽餘韻著清江主一流風有叔暘桃李莫矜新錦繡松筠須復舊氷霜題黻丘李公迪其先彭原中山人徙居黻嶺之下五六世矣公迪出贅五峯而以舊里為號不忘乎初也何處雲嵐是黻丘中山近在屋西頭五峯風月諳來久誰道鄉關日在眸寄李全父子董帷奕葉託情深又喜曽玄屢盍簮珍重前模須仰止一經端勝滿籯金夢與三人觀漲擬同訪朱子丙子曠百千秋相感深依依不識是何心金雞忽報春窗曙惆悵殘魂帶病吟胡氏落成族譜序連雲藝棟夙蜚聲又喜來仍建此亭勗爾詩書舊針砭待看金石倍光晶題周氏竹陂梅仙峯側緑青青渭水瀟湘共杳冥試借琅玕來暮倚洞門風露接蓬瀛病中口占授瑞康寧壽不覺行年七十近忽驚卧病二旬多絶勝明月清風夜人在呻吟夢裏過贈何生潛還番禺家慶新歡動里閭黃花緑酒厦渠渠客窗日月何多也羲畫麟經伴起居詩罷憶陳生寓意汝歸榮覲樂無涯聽唱良朋契濶詩中道若逢煩寄語雪窗高榻待多時適上饒藁飲黃衍氏後先輿馬盛衣冠訪古詢今到考槃早向龍潭資麗澤一緘為我報平安宿楓山車氏莊明月清風夜殊非逺别時薰衣茶宴罷為爾細談詩楓山道中口占授車胡二生惆悵楓山道當年此息肩重來如昨日時序夢中遷宿南山傅氏春閲南山文冬訪南山屋盤旋佳主人蒼崖蔚松竹宿上清真應觀細雨長途暝投裝處處艱何如高枕夜清興在兹山貴溪道中口占寄車傅二生一杯何必盡君歡知己須將古道看客路喜逢風雪霽詩筒早為寄平安楊林橋野水平橋路行行霽景開地名時記取他日或重來貴溪邑庠作昨夜淒風霰鳴屋今宵月滿清江曲預欣明發行李輕早趂茅簷弋陽宿弋陽道中日短前途逺天寒問宿忙亂雲迷望眼細雨濕行裝宿晚港茅店跋涉泥途困棲遲茅店安長風收細雨淡月四更寒晚港鋪四野同雲暝長村細雨飛橋傾人病涉凍水栗寒肌宿宋村次唐人韻茅店又安眠前程聽自然餘魂知有幾不必問流年旅夜感懷經過今古客一日幾千強旅店無眠夜高山慨紫陽坑口鋪回頭候火伴遲遲行復歇山鋪時問名隂崖忽逢雪宿上饒婁氏怡老堂梧竹交加映晚晴清風蘭砌有餘馨重來賓館酣春酒高詠南山萬古情宿古梁周文氏石徑盤盤逗碧流喬林鬱鬱拂雲稠幾年心事空相繫今日題詩向此丘别周村雲山端似夢中遊藝館高情兩日留莫景重來恐難必臨行餘興又登樓西塘道中贈二周生長途遊子急前期情色無心管别離緑水青山勞逺餞梅花新句為君題工樓店即事六首且淹山店雨莫計前路岐路岐泥潦深跋涉令心悲斗室息微軀店大圍羣僕凍雨淒風行路難且攤黃卷從吾欲僮御忡忡怯風雨得借茅廬即堪處但令疏食無乏供琴劒何妨淹逆旅筆硯為伍書作朋寒簷不覺朝昏改靜中滋味將語誰一日詩情濶於海一室他鄉逺四簷寒雨聲主人憐夜永添火坐深更雨歇月朦朧中宵卜去蹤夙興僮御喜爭詫曉雲紅迷途山路少人行憑誰一問津迷途應已逺返復枉傷神歸興計程不日踏鉛山借問行人去路難君子見幾寧有俟浩然歸興白雲間宿橫峯龎眉齊考兩如賓欲把香醪慰逺人報道聞糟也應醉一枝聊息夢中身好趁瓜期雨又來蕭蕭入夜滴羈懷雲行潦止元無係且賦新詩和酒杯重經晚港鋪官橋傾圯不知年官渡行人苦渡錢奉勸行人無用較從來虧客仰誰憐弋陽道中望圭峰諸山峭拔立雲端能生逆旅歡但惜世無摩詰手不能移向畫圖看應林道中奉懷紫陽夫子昔誦夫子詩今履夫子路夫子一去夜漫漫往復行人自朝莫安仁道中奉懷紫陽夫子此為正岸東行路高句藏心亦有年今日偶來親舊迹七閩惆悵白雲邊宿白沙吳瑀氏時瑀任陜西都司斷事歸坂驅馳逐落霞筍輿迢遞到君家春來應有西飛雁多病新詩不足誇令弟從官去難兄好客深青燈白沙夜詩律細論心小漿鋪道中借問歸程漸不多煙村風景倍融和誰家童子嬉牛背入谷時聽放牧歌夢桃花旅夢一枝斜嫩紅初吐花無端春信息知爾報儂家夢舟得風何許一歸篷停篙泝便風草堂應咫尺清夢月明中題新路口鋪我僕痡時將絶糧長亭忽喜近黃塘青襟胄子知無恙準擬談詩共夜窗題李章藝香閣字向金陵書閣從五峯坐緑酒共深更劇談忘爾我閣上遺經凡幾編好惜分隂勗新課題程庸讀書閣旅思搖搖倦淹泊息肩重喜登新閣閣中無物不堪誇舉目咫尺皆真樂賦詩不盡析薪情負荷丁寧二雛學宿山家午㸑辭景雲夜宿投庵下山中俗朴長幼淳也解聞風禮賢者自愧虛聲誑世間到處令人誤驚詫訪饒烈三首逆旅初從逺嶠回迂途風雨為君來高軒一到留詩别莫阻歸心向酒杯莫阻歸心向酒杯憐君意氣更遲回龍潭麗澤荒蕪久好約良朋次第來好約良朋次第來百年時序日相催分隂須惜更須惜不學何由造達材主翁莫歸中心欲投轄風雨催歸鞍夢迫大刀頭長歌雙玉盤奉柬塘坑諸親友久客寧容忘式微瓜期日念去遲遲聞君好爵端孤負棹雪山隂定有時道中口占授饒烈饒嶽風雨聮鑣逺送時高談雄辨解人頤知君自有男兒志肯負平生師友期仲父前程日見功逺追祖德爾宜同從今好篤男兒志莫負皇天降此衷經馬茨塘雲景漸清和琴書此地過不須留客飲且喜為君歌宿西廨彭氏宿雨天清路不賒高堂緑酒映燈花金雞聲裏微吟覺歸夢分明先到家上饒藁止此題戈氏玉溪書閣常説螢窗在玉溪何如今夜此題詩相逢莫只談金好無競維人貴有兒稅場墟道中口占授戈英驥子當年此載歌金蘭氣誼感君多西風老鬢寒山曲斜日仍同律吕和早禾陂道中口占授戈英傍午蒙開日漸融暫停輿馬步從容平生山水應深樂指點遙空杳靄中别戈英送送晴村兩贈詩高歌足以慰離思龍潭懸待春消息早致雙魚慎勿遲宿嵩山華髮蕭蕭候我勤峩冠博帶氣溫淳兒孫競託重遭遇昨夜燈花報喜新長湖章氏絶句金昆已矣悵鴻冥玉季森森兩眼青躍馬隔溪曽失意揮毫今日却多情口占授章獻章朴先後籃輿送我勤交情嵗久見漓淳弟兄歸去皆傳語事業應須日又新荷塘口占授族孫福寧古市衝雺濕山橋踏月忙隔林詢白塔隱几卧荷塘塘坑絶句雞鳴踏月復前期愛日如烘霽雨時青眼滿堂春似海揚州詩興溢南枝鴈塘道中人事周旋愧不遑嵗云莫矣趁歸忙筍輿傲兀長鬚困蓑笠欹危度野塘除夜次唐詩韻銀燈守嵗未應眠一聽陽春小兒輩歌詩自灑然更祝明朝風日好梅花滿眼踏新年丁丑元日不肖前丁丑上學先君此年五月赴京往事渾如夢春風忽又新浮生空白髮依舊一瞢人記先君詩云夢社方五嵗已解誦詩書兄弟恩雖重師生禮必拘齋居應密邇路徑不縈紆由此能勤學終當作大儒人日贈丘孔曼人日題詩雪滿篁寫向伊人念舊鄉惆悵百年前故事高曽筆硯接南窗先生高士號南窗春夜述懷多病無安枕長吟更短吟園林初雨歇花栁已春深身世雙秋鬢乾坤獨苦心明朝風日好何處快登臨曉枕作四時更代謝萬事相翕張升沈任吾運何須較短長風雨塵窗不知老日進遺編誦幾行莫春行學不講德不修二者誠吾憂日親古賢聖殘膏賸馥供涵泳青春告莫我不聞落花飛絮從紛紛喜晴陽春正二月霖雨何其多午窗斂暝色高陸揚洪波昨宵乃何宵高天衆星羅清朝太陽升萬象成熙和餘花須載酒因之一長歌後坊坑風景和明春服新緩吟疑在曽沂瀕行臨磐石遲回久時有低飛鳥近人舊遊感興既歷覆船岡更嬉西岸甽俯仰舊遊心光隂迅一瞬夢中作煙消霧散海濶天高歷塊過都乃見爾曹石泉望靈峯有懷周婁二生杖䇿間來步夕陽雲峯遙望意何長峯前二妙相暌久魚鴈東西兩渺茫夕涼獨坐緩步階徐愛夕涼微吟隱几久虛堂行穿山月紛紛白庭散簷花細細香山庭夜坐庭樹隂隂過雨涼氷輪正照坐中央等間真意須當認莫學浮生一樣忙六月十七日沼上玩月碧沼溶溶月照懷好風時送嫩涼來細思黃卷自警編多新益懿行嘉謨實快哉豫書月臺字月既畢臺字誤落筆而為一又書鈎以足之惜無出處也徐思曩在石泉時東窗對一鈎之月在缺月五更頭寒光皎清夜之句感懷曽對東窗月一鈎五更心事淡如秋蹉跎不覺空霜鬢爭奈年華似水流沼上對月又對青霄月一鈎金波玉露正宜秋自應暮景重加勵遮莫年華似水流雞鳴候曉坐對東林殘月宛然昔者之景又續鄙句坐對東林月一鈎寒光皎皎近清秋當年心事今何在碌碌那堪日下流避暑普濟堂三伏炎蒸午倍瘥長原疊嶺困經過竹林深院宜人處氷簟清風一氣和同宗人嗣昶輩拜羅原岡先隴清風朝辭上壽坊溽暑午拜羅原岡岡頭卜兆三百祀鬼神守護雷潭傍澄空一矚醉心目楚山崒嵂吳江長避暑刀峯祠竹裏投裝暑正隆緩尋幽事向刀峯芃芄香稻連疇緑㶁㶁寒流一澗通宿吕家壕先隴右畔李宅眷眷先塋是夙心肩輿又事逺追尋行雲流水良隨遇胡文定公云世事當如行雲流水隨所遇而安可也步月看星此竹林同族拜吕家壕先隴昨日虛勞逺候迎竹間今喜欵柴荆西風一激荒山隴何限慈孫孝子情宿吕坊寺罷浴清溪步夕涼四簷風月宿僧堂依稀却憶高曽上桑梓連隂是故鄉遊園呼童時作後園遊淡日涼風踏素秋花映東西紅錦繡果連南北緑雲稠贈饒鎮遊襄陽湖海平生志山林老病身何由出商徼同爾望西秦中秋夜玩月次許郢州詩韻四海同瞻此夜圓樓臺漸喜出雲煙蟾光玉潔秋中候桂影氷清雨後天吟處紛紛侵卧內夢回穆穆滿庭前詩成惟有踈星伴萍梗明年憶去年即事借得禪房久寓居間中轉覺日舒舒二三童冠相於好卧聽琅琅小學書離寺遙為松楸此寓居清風明月二旬餘宵來紅葉催歸夢明月青山是舊廬同宗人允基拜羅岡先隴古寺相尋兩度來孝思共寫百年懷西風紅葉桐園曲四望青天一快哉對月偶成夕陽扶杖步前庭歸踏繁隂霽月清靈府偶然無一物靜中意思驗周程即事浮世升沈一聽天竹窗養病日高眠杖藜偶散東林步丹桂秋香又一年曉枕作多病蘇來體自輕吟邊又喜氣和平行雲流水曽聞命何用君平卜此生諸生助移門樓詩以勞之魚貫相於冠與童浩歌聲裏氣如虹明朝飽挹溪山勝多賦新詩頌爾功牧南岸嶺次橫渠先生韻碌碌浮生一夢中並遊無侣古今同偶因晴牧間行好絶壁孤吟萬壑風夜讀滕元發墓志尹開封時民有王穎者為鄰婦隱其金閲數尹不能辨穎憒悶至病傴杖而訴於公公呼鄰一問得其情追其金還穎穎奮身仰謝失傴所在投杖而走見者大駭理枉能令傴者伸古今何處覔斯人沈吟無計起公死徒向塵編感興新同晏洧遊鋪前山小春天氣暖如烘山果漫山黑間紅緩步崇岡清眺罷悠悠歸詠夕陽中遊山歷獅子石馬鞍山至峽而止客歸曽此眺層巔獨步重來十五年人事幾多隨候革山光水色自依然勝遊欲罷駕言還山水盤回趣更玄試問丹青難狀處朗吟人在白雲邊同小兒遊山自後坊西岡觜登山度坳入原歷獅子石而歸陳達遇于原中同行幸得身間心自休呼兒時作小春遊千山莫景難描畫磐石何妨又少留遊山由二峯尖至西坑原頭而歸為愛雲山深復深筋骸粗健強登臨一般真意誰能辨矯首蒼茫獨詠心勝地曽經託趣深和風晴日喜重臨筋骸又老四三載何限依依悵舊心遊山童冠相呼作勝遊經霜山果正優優林泉好處將詩買康節詩紅日銜山詠未休三峯亭一亭危構接雲煙亭罷基存境宛然重賦新詩留故事清風從此更誰邊牧後坊遮莫風霜暮景侵又因晴牧事幽尋鄰童供命諸生侍一曲真詮擊壤吟後坊牧歸林泉隨處境幽幽爭奈浮生不暇遊日日杖藜歸去晚野心端被白雲留同諸生登聶家尖尋常多愛此峯遊蹤迹疏來已十秋他日會心峯愈勝小詩難寫興悠悠與諸生授康節詩道傍石好詩歌罷樂忘憂不管浮生歲月遒忽意莫春曽此坐獨吟時喜鳥相求曉枕作飢寒難免切身憂富貴由來不可求日用信從吾所好萬緣有命豈人謀曉枕感懷二十年前嘗辱此趨安以年彌高而德彌邵見譽年高德邵是難能曽辱良朋妄見稱碌碌光隂空二紀不堪惆悵憶平生傷傅秉彝竹窗琴劒寓經旬洗墨池邊迹已陳惆悵玉樓吟望久眼中那復覓斯人曉枕作窮通夭壽寧非命消息盈虛自是天試詠黃流歌玉瓉諄諄箋注慨前賢饒烈使名長春問訊日暮途遙旅宿無衾惻然成詩暝色馳驅山正深投裝安問有無衾解衣雖荷主人眷寧慰風霜永夜心獨坐偶成為已工夫何處尋須知至要在于今它山之石能攻玉寧問陽舒隂慘心自警日日寒簷讀我書觀生愈似挂鈎魚人情固莫分輕重事體焉能知卷舒百行自應誠是本一身端合道為樞聖賢龜鑑昭昭在爭奈靈臺不易虛閲去年日録簿此日寓婁諒氏悵然成詩去年今日正陽生覓句論文暫鯉庭北鴈不來西夢切杖藜何處問君平贈程李二友又報衝泥二妙來逺傳天使意悠哉寒爐擁罷霜簷立明月清風共此懷題談大參慶壽堂北闕恩波浸正深南山瑞氣福駢臨奎光明月春盈卷總是萊衣愛日心奉題程僉憲清風亭世間何沴善侵陵強者誰歟抗鬱蒸萬姓低垂炎海裏灑然天表見斯亭康齋集卷四
